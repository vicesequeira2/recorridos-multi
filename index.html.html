    <style>
        :root{--bg:#080d14;--card:#0d1520;--accent:#0ea5e9;--border:#1a2940;--text:#e2ecf8;--muted:#5a7a9a;--green:#22c55e;--red:#ef4444;}

        body{background:var(--bg);color:var(--text);overflow:hidden;}
        .shell{max-width:420px;margin:0 auto;height:100vh;display:flex;flex-direction:column;position:relative;}
        .hdr{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;}
        .hdr-row{display:flex;justify-content:space-between;align-items:center;}
        .brand{font-size:18px;font-weight:900;letter-spacing:-0.5px;}
        .brand span{color:var(--accent);}
        .watermark{font-size:11px;font-weight:900;color:#0ea5e9;letter-spacing:3px;text-align:center;padding:5px 0;background:#0ea5e912;border-bottom:1px solid #0ea5e930;user-select:none;}

        .prog-wrap{position:sticky;top:0;background:var(--bg);z-index:5;padding:6px 0 10px;}
        .prog-text{display:flex;justify-content:space-between;font-size:11px;font-weight:800;margin-bottom:5px;color:var(--accent);}
        .prog-bar{height:6px;background:var(--border);border-radius:10px;overflow:hidden;}
        .prog-fill{height:100%;background:var(--accent);transition:width 0.3s ease;}
        .mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
        .mod-item{padding:18px 10px;border-radius:12px;border:1px solid var(--border);text-align:center;cursor:pointer;background:var(--card);position:relative;}
        .mod-icon{font-size:26px;margin-bottom:6px;display:block;}
        .mod-name{font-size:11px;font-weight:700;}
        .ot-card{background:#1e1111;border:1px solid #451010;padding:14px;border-radius:12px;margin-bottom:10px;border-left:4px solid #ef4444;position:relative;}
        .ot-id-badge{position:absolute;top:8px;right:8px;font-size:9px;font-weight:900;color:#ef4444;background:#ef444420;padding:2px 6px;border-radius:4px;}
        .btn-ot-close{background:var(--green);color:white;border:none;padding:10px;border-radius:8px;font-weight:800;font-size:11px;cursor:pointer;width:100%;margin-top:8px;}
        .check-card{background:var(--card);border:1px solid var(--border);padding:12px 14px;border-radius:10px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;}
        .check-btns{display:flex;gap:6px;}
        .check-btns button{padding:10px 13px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-weight:800;font-size:11px;cursor:pointer;}
        .active-si{background:#22c55e15!important;border-color:var(--green)!important;color:var(--green)!important;}
        .active-no{background:#ef444415!important;border-color:var(--red)!important;color:var(--red)!important;}
        .pill-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
        .pill{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:9px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;}
        .pill.active{background:var(--accent);color:white;border-color:var(--accent);}
        .input-f{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;color:white;font-size:15px;margin-bottom:14px;outline:none;resize:none;}
        .footer-fixed{position:absolute;bottom:0;left:0;right:0;padding:16px;background:linear-gradient(transparent,var(--bg) 40%);z-index:10;}
        .btn-save{width:100%;padding:17px;background:var(--green);color:white;border:none;border-radius:16px;font-weight:900;font-size:15px;cursor:pointer;}
        .btn-save:disabled{opacity:.15;filter:grayscale(1);}
        .btn-excel{width:100%;padding:14px;background:var(--accent);color:white;border-radius:12px;border:none;font-weight:800;margin-top:10px;cursor:pointer;}
        .timer-val{font-size:50px;font-weight:900;text-align:center;margin:10px 0;}
        .btn-timer{width:100%;padding:15px;border-radius:10px;border:none;font-weight:900;cursor:pointer;margin-top:8px;}
        .start{background:var(--accent);color:white;} .stop{background:var(--red);color:white;}
        .fade-in{animation:fadeIn .3s ease;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .centered{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:30px;text-align:center;}

        .tab-btn{flex:1;padding:11px;border:none;background:transparent;font-weight:900;font-size:12px;cursor:pointer;border-bottom:3px solid transparent;}

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const CAJEROS  = ["Siman Sotano","Hooligan's Izq","Holligan's Cen","Hooligan's Der","Siman Terraza","Rosti","Katrin izq","Universal","Chilis izq","Chilis der","Katrin der"];
const ENTRADAS = ["Entrada Nesting","Entrada 2 Zapote","Entrada 1 Zapote","Entrada 1 Arturo Calle","Entrada 2 Arturo Calle","Entrada 2 Rosti","Entrada 1 Katrin","Entrada 2 Katrin","Entrada 1 Rosti"];
const SALIDAS  = ["SALIDA NESTING","SALIDA 2 ZAPOTE","SALIDA 1 ZAPOTE","Salida 1 Arturo Calle","Salida 2 Arturo Calle","SALIDA REVERSIBLE ARTURO CALLE","SALIDA 1 ROSTI","Salida 2 Roti","SALIDA UNIVERSAL"];
const MODULOS  = [
    {id:"cajero",    label:"Cajero",           icon:"🏧", color:"#0ea5e9"},
    {id:"entrada",   label:"Entrada",           icon:"🚗", color:"#22c55e"},
    {id:"salida",    label:"Salida",            icon:"🚦", color:"#f97316"},
    {id:"indicador", label:"Indicador",         icon:"⏱",  color:"#a855f7"},
    {id:"ot",        label:"Orden Trabajo (OT)",icon:"🔧", color:"#f43f5e"},
    {id:"limpieza",  label:"Limpieza",          icon:"🧹", color:"#fbbf24"},
    {id:"almuerzo",  label:"Almuerzos Valet",   icon:"🍽",  color:"#e879f9"},
];
const CHECKS_CAJERO  = [{id:'ups',label:'UPS'},{id:'dat',label:'Datafono'},{id:'mini',label:'Mini PC'},{id:'qr',label:'Lector QR'},{id:'imp',label:'Impresora'},{id:'pap',label:'Papel'},{id:'lim_chk',label:'Limpieza'},{id:'anc',label:'Anclaje'},{id:'pan',label:'Pantalla'},{id:'int',label:'Intercom'}];
const CHECKS_ENTRADA = [{id:'asta',label:'Asta'},{id:'loop',label:'Loop'},{id:'imp_ent',label:'Impresora'},{id:'tiq',label:'Tiquetes'},{id:'lpr_ent',label:'LPR'},{id:'ctr',label:'Cam Trasera'},{id:'cfr',label:'Cam Frontal'},{id:'ups_ent',label:'UPS'}];
const CHECKS_SALIDA  = [{id:'asta_sal',label:'Asta'},{id:'loop_sal',label:'Loop'},{id:'qr_sal',label:'Lector QR'},{id:'lpr_sal',label:'LPR'},{id:'ctr_sal',label:'Cam Trasera'},{id:'cfr_sal',label:'Cam Frontal'},{id:'ups_sal',label:'UPS'}];
const ALL_CHECKS = [...CHECKS_CAJERO,...CHECKS_ENTRADA,...CHECKS_SALIDA];
const fbKey = s => s.replace(/[.#$\/\[\]]/g,'_');

const USUARIOS = [
    {nombre:"Christopher", password:"1",    rol:"Técnico"},
    {nombre:"Gustavo",     password:"2",    rol:"Ciclo"},
    {nombre:"Vicente",     password:"admi", rol:"Administrador"},
    {nombre:"Joel",        password:"3",    rol:"Coordinador"},
    {nombre:"Geovanny",    password:"4",    rol:"Recorridos"},
    {nombre:"Monitoreo",   password:"5",    rol:"Monitoreo"},
];
const ICONS_U = {Christopher:"🔧",Gustavo:"🔄",Vicente:"🧠",Joel:"📋",Geovanny:"👁",Monitoreo:"🖥",Valet:"🅿️"};
const COLOR_U = {Christopher:"#0ea5e9",Gustavo:"#22c55e",Vicente:"#f59e0b",Joel:"#a855f7",Geovanny:"#f97316",Monitoreo:"#06b6d4",Valet:"#06b6d4"};

const VALE_P = [
    {nombre:"Marlon Centeno",   minA:65, minC:15, cafe:true},
    {nombre:"Johan Carvajal",   minA:65, minC:15, cafe:true},
    {nombre:"Daniel Zuñiga",    minA:80, minC:0,  cafe:false},
    {nombre:"Esteban Gonzalez", minA:65, minC:15, cafe:true},
    {nombre:"Gustavo Salas",    minA:80, minC:0,  cafe:false},
    {nombre:"Outsorcin 1",      minA:65, minC:15, cafe:true},
    {nombre:"Outsorcin 2",      minA:65, minC:15, cafe:true},
];

const COLS_EXCEL = ["USUARIO","ROL","FECHA","HORA","MODULO","ACCION","ORDEN_ID","UBICACION","RESULTADO","NOTAS",
    "UPS","Datafono","Mini PC","Lector QR","Impresora","Papel","Limpieza","Anclaje","Pantalla","Intercom",
    "Asta","Loop","Tiquetes","LPR","Cam Trasera","Cam Frontal"];

const COLS_ALMUERZO = ["PERSONA","TIPO","FECHA","HORA_SALIDA","HORA_REGRESO","A_TIEMPO"];

const ALMUERZO_VIEWERS   = ["Vicente","Joel","Monitoreo","Geovanny"];
const ALMUERZO_OPERATORS = ["Vicente","Joel","Monitoreo"];

function canAccess(m, u) {
    if (m.id === "almuerzo") return ALMUERZO_VIEWERS.includes(u.nombre);
    if (["Monitoreo"].includes(u.nombre)) return m.id === "ot" || m.id === "almuerzo";
    if (["cajero","entrada","salida"].includes(m.id)) return ["Vicente","Geovanny","Christopher"].includes(u.nombre);
    return true;
}

/* ═══════════════════════════════════════════════════════════ APP */
function App() {
    const [usuario,     setUsuario]    = useState(null);
    const [ready,       setReady]      = useState(false);
    const [screen,      setScreen]     = useState("home");
    const [modulo,      setModulo]     = useState(null);
    const [form,        setForm]       = useState({});
    const [history,     setHistory]    = useState([]);
    const [activeOTs,   setActiveOTs]  = useState([]);
    const [vales,       setVales]      = useState([]);
    const [timer,       setTimer]      = useState(0);
    const [timerOn,     setTimerOn]    = useState(false);
    const [sync,        setSync]       = useState("ok");
    const [newKeys,     setNewKeys]    = useState(new Set());
    const [otAlert,     setOtAlert]    = useState(null);
    const [onlineU,     setOnlineU]    = useState([]);
    const [selMod,      setSelMod]     = useState(null);
    const [clock,       setClock]      = useState("");
    const [diaTab,      setDiaTab]     = useState("hoy");

    const timerRef  = useRef(null);
    const prevLen   = useRef(0);
    const prevOTLen = useRef(0);
    const fbReady   = useRef(false);
    const actxRef   = useRef(null);

    /* Clock */
    useEffect(()=>{
        const t=()=>setClock(new Date().toLocaleTimeString("es",{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
        t(); const id=setInterval(t,1000); return()=>clearInterval(id);
    },[]);

    /* Wait for Firebase */
    useEffect(()=>{
        const c=setInterval(()=>{ if(window._fb){clearInterval(c);fbReady.current=true;setReady(true);}},100);
        return()=>clearInterval(c);
    },[]);

    /* Unlock audio */
    useEffect(()=>{
        const u=()=>{ if(!actxRef.current) actxRef.current=new(window.AudioContext||window.webkitAudioContext)(); if(actxRef.current.state==='suspended') actxRef.current.resume(); };
        document.addEventListener('touchstart',u,{passive:true}); document.addEventListener('click',u);
        return()=>{ document.removeEventListener('touchstart',u); document.removeEventListener('click',u); };
    },[]);

    /* Firebase subs */
    useEffect(()=>{
        if(!ready) return;
        const {db,ref,onValue}=window._fb;
        const s1=onValue(ref(db,"registros"),snap=>{
            const d=snap.val(); if(!d){setHistory([]);prevLen.current=0;return;}
            const arr=Object.entries(d).map(([k,v])=>({...v,_fbKey:k})).sort((a,b)=>(b._ts||0)-(a._ts||0));
            if(arr.length>prevLen.current&&prevLen.current>0){ const f=arr.slice(0,arr.length-prevLen.current).map(r=>r._fbKey); setNewKeys(new Set(f)); setTimeout(()=>setNewKeys(new Set()),2500); }
            prevLen.current=arr.length; setHistory(arr);
        });
        const s2=onValue(ref(db,"activeOTs"),snap=>{
            const d=snap.val(); if(!d){setActiveOTs([]);prevOTLen.current=0;return;}
            const arr=Object.entries(d).map(([k,v])=>({...v,_fbKey:k}));
            if(arr.length>prevOTLen.current&&prevOTLen.current>0){ playSound(); const n=arr[arr.length-1]; setOtAlert({loc:n?.loc,det:n?.det}); setTimeout(()=>setOtAlert(null),6000); }
            prevOTLen.current=arr.length; setActiveOTs(arr);
        });
        const s3=onValue(ref(db,"presencia"),snap=>{
            const d=snap.val();
            const list=d?Object.values(d).filter(v=>v.nombre&&v.nombre!==""):[];
            setOnlineU(list.map(v=>v.nombre));
        });
        const s4=onValue(ref(db,"vales"),snap=>{
            const d=snap.val(); if(!d){setVales([]);return;}
            setVales(Object.entries(d).map(([k,v])=>({...v,_fbKey:k})));
        });
        return()=>{s1();s2();s3();s4();};
    },[ready]);

    const playSound=useCallback(()=>{
        try{ const ctx=actxRef.current||new(window.AudioContext||window.webkitAudioContext)(); actxRef.current=ctx; if(ctx.state==='suspended') ctx.resume();
            [523,659,784,1047].forEach((f,i)=>{ const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.type='sine'; o.frequency.value=f;
                const t=ctx.currentTime+i*0.18; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.5,t+0.05); g.gain.linearRampToValueAtTime(0,t+0.2); o.start(t); o.stop(t+0.22); });
        }catch(e){}
        try{navigator.vibrate&&navigator.vibrate([150,80,150,80,300]);}catch(e){}
    },[]);

    const setF=(k,v)=>setForm(f=>({...f,[k]:v}));

    const openMod=m=>{ setModulo(m); setForm({ot_tipo:"ABRIR ORDEN DE TRABAJO",ot_id:"OT-"+Math.random().toString(36).substr(2,4).toUpperCase()}); setTimer(0); setTimerOn(false); if(timerRef.current) clearInterval(timerRef.current); setScreen("form"); };

    const toggleTimer=()=>{ if(timerOn){clearInterval(timerRef.current);setF("timer_val",(timer/1000).toFixed(2));}else{const s=Date.now()-timer;timerRef.current=setInterval(()=>setTimer(Date.now()-s),10);} setTimerOn(!timerOn); };

    const calcProg=()=>{
        if(!modulo) return 0;
        if(form.ot_tipo==="CERRAR ORDEN DE TRABAJO") return form.ot_detalle?100:50;
        let t=1,a=0;
        if(form.cajero||form.entrada||form.salida||form.lim_loc||form.ot_ubicacion||form.ind_loc) a++;
        if(modulo.id==='limpieza'){t+=2;if(form.lim_cat)a++;if(form.lim_estado)a++;}
        const chk=modulo.id==='cajero'?CHECKS_CAJERO:modulo.id==='entrada'?CHECKS_ENTRADA:modulo.id==='salida'?CHECKS_SALIDA:[];
        chk.forEach(c=>{t++;if(form[c.id])a++;});
        if(modulo.id==='indicador'){t++;if(form.timer_val)a++;}
        if(modulo.id==='ot'){t++;if(form.ot_detalle)a++;}
        return Math.round((a/t)*100);
    };

    const save=async()=>{
        if(!fbReady.current){alert("Firebase no listo");return;} setSync("busy");
        const {db,ref,push,set,get}=window._fb;
        const now=new Date();
        const loc=form.lim_loc||form.ot_ubicacion||form.cajero||form.entrada||form.salida||form.ind_loc||"General";
        const cr={}; ALL_CHECKS.forEach(c=>{if(form[c.id]) cr[fbKey(c.label)]=form[c.id];});
        const rec={_ts:Date.now(),USUARIO:usuario.nombre,ROL:usuario.rol,ORDEN_ID:form.ot_id||"-",
            FECHA:now.toLocaleDateString("es"),HORA:now.toLocaleTimeString("es"),MODULO:modulo.label,
            ACCION:modulo.id==='ot'?form.ot_tipo:"REVISIÓN",UBICACION:loc,
            RESULTADO:modulo.id==='indicador'?`${form.timer_val}s`:modulo.id==='limpieza'?"LIMPIO":"OK",
            NOTAS: [form.ot_rapido, form.ot_detalle].filter(Boolean).join(' · ') || form.obs || "-",...cr};
        try{
            await push(ref(db,"registros"),rec);
            if(modulo.id==='ot'){
                if(form.ot_tipo==="CERRAR ORDEN DE TRABAJO"){
                    const sn=await get(ref(db,"activeOTs")); if(sn.val()) Object.entries(sn.val()).forEach(async([k,v])=>{ if(v.ot_id===form.ot_id) await window._fb.remove(ref(db,`activeOTs/${k}`)); });
                } else { await push(ref(db,"activeOTs"),{ot_id:form.ot_id,loc,det:[form.ot_rapido,form.ot_detalle].filter(Boolean).join(' · ')||form.ot_tipo,fecha:rec.FECHA,_ts:Date.now()}); playSound(); }
            }
            setSync("ok"); setScreen("success");
        }catch(e){console.error(e);setSync("err");alert("Error: "+e.message);}
    };

    const downloadXLS=async()=>{
        const pw=prompt("Ingrese la clave de acceso:"); if(pw!=="2026"){if(pw!==null)alert("Clave incorrecta.");return;}

        const wb=XLSX.utils.book_new();

        // Hoja 1: Recorridos
        const rows=history.map(({_fbKey,_ts,...r})=>{const o={};COLS_EXCEL.forEach(c=>{o[c]=r[c]!==undefined?r[c]:"-";});return o;});
        if(rows.length){
            const ws=XLSX.utils.json_to_sheet(rows,{header:COLS_EXCEL});
            ws['!cols']=COLS_EXCEL.map(c=>({wch:Math.max(c.length+2,14)}));
            const rng=XLSX.utils.decode_range(ws['!ref']||"A1");
            for(let C=rng.s.c;C<=rng.e.c;C++){const cell=XLSX.utils.encode_cell({r:0,c:C});if(!ws[cell])continue;ws[cell].s={font:{bold:true,color:{rgb:"FFFFFF"},sz:11},fill:{fgColor:{rgb:"0D4F9E"}},alignment:{horizontal:"center",vertical:"center"},border:{top:{style:"medium",color:{rgb:"093080"}},bottom:{style:"medium",color:{rgb:"093080"}},left:{style:"thin",color:{rgb:"093080"}},right:{style:"thin",color:{rgb:"093080"}}}};}
            for(let R=1;R<=rng.e.r;R++) for(let C=rng.s.c;C<=rng.e.c;C++){const cell=XLSX.utils.encode_cell({r:R,c:C});if(!ws[cell])ws[cell]={t:"s",v:"-"};ws[cell].s={font:{sz:10},alignment:{vertical:"center"},fill:{fgColor:{rgb:R%2===0?"DCE9FF":"FFFFFF"}},border:{top:{style:"thin",color:{rgb:"BBCFEE"}},bottom:{style:"thin",color:{rgb:"BBCFEE"}},left:{style:"thin",color:{rgb:"BBCFEE"}},right:{style:"thin",color:{rgb:"BBCFEE"}}}};}
            XLSX.utils.book_append_sheet(wb,ws,"Recorridos");
        }

        // Hoja 2: Almuerzos — siempre en el mismo orden de columnas
        const valesCerrados = vales.filter(v=>v.regreso);
        const almRows = valesCerrados.map(({_fbKey,_ts,...v})=>{
            const row={};
            COLS_ALMUERZO.forEach(c=>{
                if(c==="PERSONA")    row[c]=v.persona||"-";
                else if(c==="TIPO")  row[c]=(v.tipo||"-").toUpperCase();
                else if(c==="FECHA") row[c]=v.fecha||"-";
                else if(c==="HORA_SALIDA")  row[c]=v.salida||"-";
                else if(c==="HORA_REGRESO") row[c]=v.regreso||"-";
                else if(c==="A_TIEMPO")     row[c]=v.aTiempo?"SÍ":"NO";
                else row[c]="-";
            });
            return row;
        });
        // Siempre crear la hoja aunque esté vacía
        const wsA = XLSX.utils.json_to_sheet(almRows.length ? almRows : [Object.fromEntries(COLS_ALMUERZO.map(c=>[c,"-"]))], {header:COLS_ALMUERZO});

        {screen==="almuerzo"&&<AlmuerzoScreen vales={vales} soloLec={!ALMUERZO_OPERATORS.includes(usuario.nombre)} onVolver={()=>setScreen("home")} fb={window._fb}/>}

    );
}

function SelConteo({label,items,active,onSelect,counts={}}){

/* ── VALE PARKING ── */
function ValeScreen({vales,soloLec,onVolver,fb}){
    const [clock,setClock]=useState("");
    const [saving,setSaving]=useState(null);
    const [tab,setTab]=useState("almuerzo");

    useEffect(()=>{
        const t=()=>setClock(new Date().toLocaleTimeString("es",{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
        t(); const id=setInterval(t,1000); return()=>clearInterval(id);
    },[]);

    const hoy=new Date().toLocaleDateString("es");
    const personas=tab==="cafe"?VALE_P.filter(p=>p.cafe):VALE_P;
    const getVale=(nom,tipo)=>vales.find(v=>v.persona===nom&&v.fecha===hoy&&v.tipo===tipo&&!v.regreso);
    const restan=(v,min)=>{if(!v?.salida)return null;const[h,m,s]=v.salida.split(":").map(Number);const now=new Date();return((h*60+m)*60+(s||0)+min*60)-((now.getHours()*60+now.getMinutes())*60+now.getSeconds());};
    const fmt=s=>{const a=Math.abs(Math.floor(s/60)),b=Math.abs(s%60);return`${a}:${String(b).padStart(2,'0')}`;};

    const regSal=async nom=>{
        if(!fb)return; setSaving(nom+tab);
        const hora=new Date().toLocaleTimeString("es",{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        await fb.push(fb.ref(fb.db,"vales"),{persona:nom,fecha:hoy,tipo:tab,salida:hora,regreso:null,_ts:Date.now()});
        setSaving(null);
    };

    const regReg=async(v,min)=>{
        if(!fb)return; setSaving(v.persona+tab);
        const hora=new Date().toLocaleTimeString("es",{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        const[sh,sm,ss]=v.salida.split(":").map(Number);
        const[rh,rm,rs]=hora.split(":").map(Number);
        const ok=((rh*60+rm)*60+(rs||0)-(sh*60+sm)*60-(ss||0))<=min*60;
        const{_fbKey,...rest}=v;
        await fb.set(fb.ref(fb.db,`vales/${_fbKey}`),{...rest,regreso:hora,aTiempo:ok});
        setSaving(null);
    };

    const hist=vales.filter(v=>v.fecha===hoy&&v.regreso&&v.tipo===tab);
    const TC=tab==="almuerzo"?"#f97316":"#06b6d4";

    return <div className="fade-in" style={{height:'100%',display:'flex',flexDirection:'column'}}>
        {/* Header */}
        <div style={{background:'var(--card)',borderBottom:`3px solid ${TC}`,flexShrink:0}}>
            <div style={{background:'#ef444418',borderBottom:'1px solid #ef444430',padding:'10px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <button onClick={onVolver} style={{background:'#ef4444',border:'none',color:'white',fontSize:13,fontWeight:900,padding:'10px 16px',borderRadius:12,cursor:'pointer'}}>← SALIR</button>
                <div style={{fontWeight:900,fontSize:13}}>🅿️ VALE PARKING</div>
                <div style={{fontSize:13,fontWeight:900,color:TC}}>{clock}</div>
            </div>
            <div style={{display:'flex'}}>
                <button className="tab-btn" onClick={()=>setTab("almuerzo")} style={{color:tab==="almuerzo"?'#f97316':'var(--muted)',borderBottomColor:tab==="almuerzo"?'#f97316':'transparent'}}>🍽 ALMUERZO</button>
                <button className="tab-btn" onClick={()=>setTab("cafe")} style={{color:tab==="cafe"?'#06b6d4':'var(--muted)',borderBottomColor:tab==="cafe"?'#06b6d4':'transparent'}}>☕ CAFÉ</button>
            </div>
        </div>

        <div className="scrollable">
            <div className="label-sec">{tab==="almuerzo"?"🍽 ALMUERZO":"☕ CAFÉ"} · {hoy}</div>

            {personas.map(p=>{
                const min=tab==="almuerzo"?p.minA:p.minC;
                const v=getVale(p.nombre,tab);
                const r=v?restan(v,min):null;
                const sv=saving===p.nombre+tab;
                const fuera=v&&r!==null;
                const excedido=fuera&&r<=0;

                return <div key={p.nombre} style={{
                    borderRadius:14,
                    marginBottom:10,
                    overflow:'hidden',
                    border:fuera?(excedido?'2px solid #ef4444':'2px solid #f59e0b'):'1px solid var(--border)',
                    boxShadow:fuera?(excedido?'0 0 12px #ef444430':'0 0 12px #f59e0b30'):'none'
                }}>
                    {/* Nombre + estado */}
                    <div style={{background:fuera?(excedido?'#ef444418':'#f59e0b18'):'var(--card)',padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <div>
                            <div style={{fontWeight:900,fontSize:15,color:fuera?(excedido?'#f87171':'#fbbf24'):'var(--text)'}}>{p.nombre}</div>
                            <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,marginTop:2}}>{min} MIN PERMITIDOS</div>
                        </div>
                        {/* Estado badge */}
                        {!fuera && <span style={{fontSize:11,fontWeight:900,color:'#22c55e',background:'#22c55e15',padding:'5px 12px',borderRadius:20}}>✅ EN PUESTO</span>}
                        {fuera && !excedido && <div style={{textAlign:'right'}}>
                            <div style={{fontSize:11,fontWeight:900,color:'#f59e0b'}}>⏳ FUERA</div>
                            <div style={{fontSize:13,fontWeight:900,color:'#fbbf24',fontVariantNumeric:'tabular-nums'}}>{fmt(r)}</div>
                        </div>}
                        {excedido && <div style={{textAlign:'right'}}>
                            <div style={{fontSize:11,fontWeight:900,color:'#ef4444'}}>🔴 TARDE</div>
                            <div style={{fontSize:13,fontWeight:900,color:'#f87171',fontVariantNumeric:'tabular-nums'}}>{fmt(r)} extra</div>
                        </div>}
                    </div>

                    {/* Acción */}
                    {!soloLec && (
                    <div style={{padding:'0 16px 14px',background:fuera?(excedido?'#ef444408':'#f59e0b08'):'var(--card)'}}>
                        {!v ? (
                            /* Botón SALIDA grande y claro */
                            <button onClick={()=>regSal(p.nombre)} disabled={sv}
                                style={{width:'100%',padding:'15px',background:TC,color:'white',border:'none',borderRadius:12,fontWeight:900,fontSize:14,cursor:'pointer',opacity:sv?0.5:1,marginTop:2}}>
                                {sv ? '⏳...' : tab==="almuerzo" ? '🚶 REGISTRAR SALIDA ALMUERZO' : '☕ REGISTRAR SALIDA CAFÉ'}
                            </button>
                        ) : (
                            /* Botón VUELVE DE ALMUERZO prominente */
                            <div>
                                <div style={{fontSize:10,color:'var(--muted)',marginTop:8,marginBottom:6,fontWeight:700}}>Salió a las {v.salida}</div>
                                <button onClick={()=>regReg(v,min)} disabled={sv}
                                    style={{width:'100%',padding:'16px',background:excedido?'#ef4444':'#22c55e',color:'white',border:'none',borderRadius:12,fontWeight:900,fontSize:14,cursor:'pointer',opacity:sv?0.5:1,boxShadow:excedido?'0 0 16px #ef444450':'0 0 16px #22c55e50'}}>
                                    {sv ? '⏳...' : tab==="almuerzo" ? '✅ VUELVE DE ALMUERZO' : '✅ VUELVE DE CAFÉ'}
                                </button>
                            </div>
                        )}
                    </div>
                    )}

                    {/* Solo lectura */}
                    {soloLec && fuera && (
                    <div style={{padding:'8px 16px 12px',background:excedido?'#ef444408':'#f59e0b08'}}>
                        <div style={{fontSize:10,color:'var(--muted)',fontWeight:700}}>Salió: {v.salida}</div>
                    </div>
                    )}
                </div>;
            })}

            {/* Historial */}
            {hist.length>0 && <div>
                <div className="label-sec">📋 HISTORIAL HOY · {tab==="almuerzo"?"ALMUERZO":"CAFÉ"}</div>
                {hist.map((v,i)=>(
                <div key={i} style={{background:v.aTiempo?'#22c55e12':'#ef444412',border:`1px solid ${v.aTiempo?'#22c55e40':'#ef444440'}`,borderRadius:10,padding:'10px 14px',marginBottom:7,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div>
                        <div style={{fontWeight:900,fontSize:12}}>{v.persona}</div>
                        <div style={{fontSize:10,color:'var(--muted)'}}>🚶 {v.salida} → ✅ {v.regreso}</div>
                    </div>
                    <div style={{fontSize:22}}>{v.aTiempo?'✅':'🔴'}</div>
                </div>
                ))}
            </div>}
        </div>
    </div>;
}

        setSaving(null);
    };

    const regReg = async (v, min) => {
        if(!fb)return; setSaving(v.persona+tab);
        const hora=new Date().toLocaleTimeString("es",{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        const[sh,sm,ss]=v.salida.split(":").map(Number);
        const[rh,rm,rs]=hora.split(":").map(Number);

                        {/* Acción */}
                        {!soloLec ? (
                            !v ? (
                                <button onClick={()=>regSal(p.nombre)} disabled={sv}
                                    style={{background:TC,color:'white',border:'none',padding:'11px 16px',borderRadius:12,fontWeight:900,fontSize:12,cursor:'pointer',opacity:sv?0.5:1}}>
                                    {sv?'...':tab==="almuerzo"?'SALIDA 🍽':'SALIDA ☕'}
                                </button>

                                <button onClick={()=>regReg(v,min)} disabled={sv}

                        )}

                        <div style={{fontSize:10,color:TC,fontWeight:700}}>Salió a las {v.salida}</div>
                    </div>}
                </div>;

            {/* Historial */}
            {hist.length>0 && <div>
                <div className="label-sec">📋 HISTORIAL HOY · {tab==="almuerzo"?"ALMUERZO":"CAFÉ"}</div>
                {hist.map((v,i)=>(
                <div key={i} style={{background:v.aTiempo?'#22c55e12':'#ef444412',border:`1px solid ${v.aTiempo?'#22c55e40':'#ef444440'}`,borderRadius:10,padding:'10px 14px',marginBottom:7,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div>
                        <div style={{fontWeight:900,fontSize:12}}>{v.persona}</div>
                        <div style={{fontSize:10,color:'var(--muted)'}}>🚶 {v.salida} → ✅ {v.regreso}</div>
                    </div>
                    <div style={{fontSize:22}}>{v.aTiempo?'✅':'🔴'}</div>
                </div>))}
            </div>}
        </div>
    </div>;
}

                    <input type="text" name="username" value={sel.nombre} readOnly style={{display:'none'}} autoComplete="username"/>
                    <div style={{position:'relative',marginBottom:12}}>
                        <input className="input-f" style={{marginBottom:0,paddingRight:46}} type={show?"text":"password"} name="password" placeholder="Contraseña..." value={pw} autoFocus autoComplete="current-password" onChange={e=>{setPw(e.target.value);setErr("");}} onKeyDown={e=>e.key==='Enter'&&go()}/>
                        <button type="button" onClick={()=>setShow(!show)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--muted)',fontSize:18,cursor:'pointer'}}>{show?'🙈':'👁'}</button>
                    </div>
                    {err&&<div style={{background:'#ef444420',border:'1px solid #ef444450',borderRadius:10,padding:'10px 14px',marginBottom:12,fontSize:12,fontWeight:700,color:'#ef4444',textAlign:'center'}}>⚠️ {err}</div>}
                    <button type="submit" className="btn-save">INGRESAR →</button>
                </form>
            </div>}
        </div>
    </div>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
