function DashboardEjecutivo({history, hoyH, ayerH, hoy, ayer, diaTab, setDiaTab, activeOTs, selMod, setSelMod}){
  const datos = diaTab==="hoy"?hoyH:ayerH;
  const label = diaTab==="hoy"?hoy:ayer;
  
  const totalRegistros = datos.length;
  const totalOTsAbiertas = activeOTs.length;
  const totalNOs = datos.reduce((acc,h)=>{
    if(h.MODULO !== "Orden Trabajo (OT)"){
      ALLCHK.forEach(c=>{if(h[fk(c.label)]==="NO") acc++;});
    }
    return acc;
  },0);
  const otsCerradas = datos.filter(r => r.MODULO === "Orden Trabajo (OT)" && r.ACCION === "CERRAR ORDEN DE TRABAJO").length;
  
  const totalItemsRevisados = datos.reduce((acc,h)=>{
    if(["Cajero","Entrada","Salida"].includes(h.MODULO)){
      ALLCHK.forEach(c=>{
        if(h[fk(c.label)]==="SI" || h[fk(c.label)]==="NO") acc++;
      });
    }
    return acc;
  },0);
  const porcentajeOK = totalItemsRevisados > 0 ? Math.round(((totalItemsRevisados - totalNOs) / totalItemsRevisados) * 100) : 100;
  
  const tasaResolucion = totalOTsAbiertas + otsCerradas > 0 ? Math.round((otsCerradas / (totalOTsAbiertas + otsCerradas)) * 100) : 0;
  
  // Estadísticas de limpieza
  const limpiezas = datos.filter(r => r.MODULO === "Limpieza");
  const totalLimpiezas = limpiezas.length;
  
  // Calcular frecuencia de limpieza por ubicación
  const limpiezasPorUbicacion = {};
  limpiezas.forEach(l => {
    const ubicacion = l.UBICACION;
    if(ubicacion && ubicacion !== "General"){
      limpiezasPorUbicacion[ubicacion] = (limpiezasPorUbicacion[ubicacion] || 0) + 1;
    }
  });
  
  // Promedio de limpieza (veces por ubicación)
  const ubicacionesConLimpieza = Object.keys(limpiezasPorUbicacion).length;
  const promedioLimpieza = ubicacionesConLimpieza > 0 
    ? (totalLimpiezas / ubicacionesConLimpieza).toFixed(1) 
    : 0;
  
  // Determinar si el promedio es aceptable (más de 1.5 veces por ubicación en el día)
  const promedioAceptable = promedioLimpieza >= 1.5;
  const estadoLimpieza = promedioAceptable ? "✅ ACEPTABLE" : "⚠️ REQUIERE ATENCIÓN";
  const estadoColor = promedioAceptable ? "#22c55e" : "#f97316";
  
  const [showOTs, setShowOTs] = useState(true);
  const todasOTs = datos.filter(r => r.MODULO === "Orden Trabajo (OT)");
  
  const pm = MODS.filter(m=>m.id !== "ot" && m.id !== "almuerzo").map(m=>({
    ...m,
    n: datos.filter(h=>h.MODULO===m.label).length,
    registros: datos.filter(h=>h.MODULO===m.label)
  })).filter(m=>m.n>0);
  const maxN = pm.length ? Math.max(...pm.map(x=>x.n)) : 1;
  
  const getDetalleRevision = (registro) => {
    if(registro.MODULO === "Limpieza") return "🧹 Limpieza realizada";
    if(registro.MODULO === "Indicador") return `⏱ Tiempo: ${registro.RESULTADO}`;
    if(registro.MODULO === "Orden Trabajo (OT)"){
      if(registro.ACCION === "ABRIR ORDEN DE TRABAJO") return `🔧 OT ${registro.ORDEN_ID}: ${registro.NOTAS || registro.UBICACION}`;
      if(registro.ACCION === "CERRAR ORDEN DE TRABAJO") return `✅ OT ${registro.ORDEN_ID} cerrada: ${registro.NOTAS || "Solucionada"}`;
    }
    if(registro.MODULO === "Cajero" || registro.MODULO === "Entrada" || registro.MODULO === "Salida"){
      const itemsNO = [];
      ALLCHK.forEach(c => {
        if(registro[fk(c.label)] === "NO") itemsNO.push(c.label);
      });
      if(itemsNO.length > 0) return `⚠️ Fallas: ${itemsNO.join(", ")}`;
      return "✅ Todo en orden";
    }
    return registro.NOTAS && registro.NOTAS !== "-" ? registro.NOTAS : "Revisión completada";
  };

  const getIconoEstado = (registro) => {
    if(registro.MODULO === "Limpieza") return "🧹";
    if(registro.MODULO === "Indicador") return "⏱";
    if(registro.MODULO === "Orden Trabajo (OT)"){
      if(registro.ACCION === "ABRIR ORDEN DE TRABAJO") return "🔧";
      return "✅";
    }
    let tieneNO = false;
    ALLCHK.forEach(c => {
      if(registro[fk(c.label)] === "NO") tieneNO = true;
    });
    if(tieneNO) return "⚠️";
    return "✅";
  };

  const getColorEstado = (registro) => {
    if(registro.MODULO === "Orden Trabajo (OT)"){
      if(registro.ACCION === "ABRIR ORDEN DE TRABAJO") return "#ef4444";
      return "#22c55e";
    }
    let tieneNO = false;
    ALLCHK.forEach(c => {
      if(registro[fk(c.label)] === "NO") tieneNO = true;
    });
    if(tieneNO) return "#ef4444";
    if(registro.MODULO === "Limpieza") return "#fbbf24";
    if(registro.MODULO === "Indicador") return "#a855f7";
    return "#22c55e";
  };

  return(
    <div style={{marginTop:14}}>
      <div style={{display:'flex',background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,marginBottom:12,overflow:'hidden'}}>
        <button onClick={()=>setDiaTab("hoy")} style={{flex:1,padding:'11px',border:'none',fontWeight:900,fontSize:12,cursor:'pointer',background:diaTab==="hoy"?'var(--accent)':'transparent',color:diaTab==="hoy"?'white':'var(--muted)'}}>📅 HOY · {hoyH.length}</button>
        <button onClick={()=>setDiaTab("ayer")} style={{flex:1,padding:'11px',border:'none',fontWeight:900,fontSize:12,cursor:'pointer',background:diaTab==="ayer"?'#a855f7':'transparent',color:diaTab==="ayer"?'white':'var(--muted)'}}>🗓 AYER · {ayerH.length}</button>
      </div>

      <div className="label-sec">📊 DASHBOARD EJECUTIVO · {label}</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10,marginBottom:16}}>
        <div className="ejecutivo-kpi">
          <div className="ejecutivo-numero" style={{fontSize:28}}>{totalRegistros}</div>
          <div className="ejecutivo-label">TOTAL REGISTROS</div>
        </div>
        <div className="ejecutivo-kpi" style={{borderColor:totalOTsAbiertas > 0 ? '#ef4444' : '#22c55e'}}>
          <div className="ejecutivo-numero" style={{fontSize:28,color:totalOTsAbiertas > 0 ? '#ef4444' : '#22c55e'}}>{totalOTsAbiertas}</div>
          <div className="ejecutivo-label">OTs ABIERTAS</div>
        </div>
        <div className="ejecutivo-kpi">
          <div className="ejecutivo-numero" style={{fontSize:28,color:'#f97316'}}>{totalNOs}</div>
          <div className="ejecutivo-label">TOTAL FALLAS (NO)</div>
          <div className="ejecutivo-tendencia" style={{background:porcentajeOK >= 90 ? '#22c55e20' : '#f9731620', color:porcentajeOK >= 90 ? '#22c55e' : '#f97316'}}>
            ✅ {porcentajeOK}% OK
          </div>
        </div>
        <div className="ejecutivo-kpi">
          <div className="ejecutivo-numero" style={{fontSize:28,color:'#a855f7'}}>{tasaResolucion}%</div>
          <div className="ejecutivo-label">TASA RESOLUCIÓN OTs</div>
        </div>
      </div>

      {/* PROMEDIO DE LIMPIEZA */}
      <div className="limpieza-stats">
        <div className="stat-label" style={{marginBottom:8}}>🧹 ESTADÍSTICAS DE LIMPIEZA</div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div>
            <div className="stat-label">TOTAL LIMPIEZAS HOY</div>
            <div className="stat-number" style={{fontSize:22}}>{totalLimpiezas}</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div className="stat-label">UBICACIONES LIMPIADAS</div>
            <div className="stat-number" style={{fontSize:22,color:estadoColor}}>{ubicacionesConLimpieza}</div>
          </div>
        </div>
        <div style={{background:'var(--border)',borderRadius:8,padding:'10px',marginTop:4}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,fontWeight:700,color:'var(--text)'}}>📊 Promedio de limpieza por ubicación:</span>
            <span style={{fontSize:18,fontWeight:900,color:estadoColor}}>{promedioLimpieza} veces</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:6}}>
            <span style={{fontSize:11,color:'var(--muted)'}}>Meta recomendada: 1.5+ veces por ubicación/día</span>
            <span style={{fontSize:11,fontWeight:800,color:estadoColor}}>{estadoLimpieza}</span>
          </div>
        </div>
      </div>

      {/* SECCIÓN DE ÓRDENES DE TRABAJO */}
      {todasOTs.length > 0 && (
        <div style={{marginBottom:16}}>
          <div onClick={()=>setShowOTs(!showOTs)} className="section-header" style={{background:'var(--card)',borderColor:'var(--accent)',borderLeft:'4px solid var(--accent)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:16}}>🔧</span>
              <span style={{fontSize:13,fontWeight:900,color:'var(--accent)'}}>ÓRDENES DE TRABAJO</span>
              <span style={{fontSize:11,color:'var(--muted)',background:'var(--border)',padding:'2px 6px',borderRadius:10}}>{todasOTs.length}</span>
            </div>
            <span style={{fontSize:16,color:'var(--accent)',transition:'transform .2s',transform:showOTs?'rotate(180deg)':'rotate(0deg)'}}>▼</span>
          </div>
          
          {showOTs && (
            <div className="ot-subsection">
              {todasOTs.map((ot,idx)=>(
                <div key={idx} className="timeline-item" style={{borderLeftColor:ot.ACCION==="ABRIR ORDEN DE TRABAJO"?'#ef4444':'#22c55e',background:ot.ACCION==="ABRIR ORDEN DE TRABAJO"?'#1e1111':'#0d1e0d'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontSize:14}}>{ot.ACCION==="ABRIR ORDEN DE TRABAJO"?'🔧':'✅'}</span>
                      <span style={{fontSize:12,fontWeight:900,color:ot.ACCION==="ABRIR ORDEN DE TRABAJO"?'#f87171':'#22c55e'}}>{ot.ORDEN_ID}</span>
                    </div>
                    <span className={ot.ACCION==="ABRIR ORDEN DE TRABAJO"?"badge-warning":"badge-ok"}>{ot.HORA}</span>
                  </div>
                  <div style={{fontSize:12,color:'var(--text)',marginBottom:4}}>📍 {ot.UBICACION}</div>
                  <div style={{fontSize:10,color:'#94a3b8'}}>👤 {ot.USUARIO}</div>
                  {ot.NOTAS && ot.NOTAS !== "-" && <div style={{fontSize:10,color:'var(--muted)',marginTop:4,fontStyle:'italic'}}>📝 {ot.NOTAS}</div>}
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* MÓDULOS */}
      {pm.map(m=>{
        const pct = Math.min((m.n/maxN)*100,100);
        const isOpen = selMod === m.label;
        return(
          <div key={m.id} style={{marginBottom:12}}>
            <div onClick={()=>setSelMod(isOpen?null:m.label)} style={{background:isOpen?`${m.color}12`:'var(--card)',border:`2px solid ${isOpen?m.color:'var(--border)'}`,borderRadius:14,padding:'12px 14px',cursor:'pointer',transition:'all .2s'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:44,height:44,borderRadius:12,background:`${m.color}25`,border:`1px solid ${m.color}50`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>{m.icon}</div>
                <div style={{flex:1}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                    <span style={{fontSize:14,fontWeight:800,color:isOpen?m.color:'var(--text)'}}>{m.label}</span>
                    <span style={{fontSize:22,fontWeight:900,color:m.color}}>{m.n}</span>
                  </div>
                  <div style={{background:'var(--border)',borderRadius:10,height:8}}><div style={{height:'100%',borderRadius:10,background:`linear-gradient(90deg,${m.color},${m.color}99)`,width:`${pct}%`}}></div></div>
                </div>
              </div>
            </div>
            
            {isOpen && m.registros.length > 0 && (
              <div className="fi" style={{marginTop:6,padding:'8px',background:`${m.color}06`,borderRadius:12}}>
                {m.registros.map((r,idx)=>(
                  <div key={idx} className="timeline-item" style={{borderLeftColor:getColorEstado(r),marginBottom:8}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontSize:16}}>{getIconoEstado(r)}</span>
                        <span style={{fontSize:13,fontWeight:800,color:getColorEstado(r)}}>{r.UBICACION}</span>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span className={getIconoEstado(r)==="⚠️"?"badge-no":"badge-ok"}>{r.HORA}</span>
                        <span style={{fontSize:10,color:'var(--muted)'}}>👤 {r.USUARIO}</span>
                      </div>
                    </div>
                    <div style={{fontSize:11,color:'var(--text)',marginBottom:4}}>{getDetalleRevision(r)}</div>
                    {r.NOTAS && r.NOTAS !== "-" && r.NOTAS !== "OK" && !(r.MODULO === "Cajero" || r.MODULO === "Entrada" || r.MODULO === "Salida") && (
                      <div style={{fontSize:10,color:'var(--muted)',fontStyle:'italic',marginTop:4,paddingTop:4,borderTop:'1px solid var(--border)'}}>📝 {r.NOTAS}</div>
                    )}
                    {(r.MODULO === "Cajero" || r.MODULO === "Entrada" || r.MODULO === "Salida") && (()=>{
                      const itemsNO = [];
                      const itemsSI = [];
                      ALLCHK.forEach(c => {
                        if(r[fk(c.label)] === "NO") itemsNO.push(c.label);
                        else if(r[fk(c.label)] === "SI") itemsSI.push(c.label);
                      });
                      if(itemsNO.length > 0 || itemsSI.length > 0) return(
                        <div style={{marginTop:6,display:'flex',flexWrap:'wrap',gap:4}}>
                          {itemsNO.map(item=>(
                            <span key={item} style={{background:'#ef444420',color:'#ef4444',padding:'2px 8px',borderRadius:12,fontSize:9,fontWeight:700}}>❌ {item}</span>
                          ))}
                          {itemsSI.slice(0,3).map(item=>(
                            <span key={item} style={{background:'#22c55e20',color:'#22c55e',padding:'2px 8px',borderRadius:12,fontSize:9,fontWeight:700}}>✅ {item}</span>
                          ))}
                          {itemsSI.length > 3 && <span style={{fontSize:9,color:'var(--muted)'}}>+{itemsSI.length-3}</span>}
                        </div>
                      );
                      return null;
                    })()}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ============================================================
// APP PRINCIPAL
// ============================================================

// ══════════════════════════════════════════════════════
// PANEL MONITOREO — Vista principal para rol Monitoreo
// Incluye: módulos habituales + OTs de cámaras + almuerzos
// ══════════════════════════════════════════════════════


// ══════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════
// PANTALLA MÓDULO CÁMARAS PERIMETRALES
// ══════════════════════════════════════════════════════
function CamarasModScreen({usuario, activeOTs, camRevisiones, camSiguiente, camConfig, clock, fb, openMod, hoy, onVolver, camPendienteGlobal}){
  const CC="#06b6d4";
  const esAdmin = usuario?.nombre==="Vicente";

  // Estado local
  const[countdown,setCountdown]=useState("--:--");
  const[pct,setPct]=useState(0);
  const[sigTs,setSigTs]=useState(null);
  const[segsRestantes,setSegsRestantes]=useState(9999);
  const[saving,setSaving]=useState(false);
  const[step,setStep]=useState(null);          // null | "ok" | "falla"
  const[revManual,setRevManual]=useState(false);
  const[notaAnomalia,setNotaAnomalia]=useState(""); // descripción de la anomalía
  const[filtroHist,setFiltroHist]=useState("hoy");  // "hoy" | "semana" | "todo"

  const pendiente = !!camPendienteGlobal;
  // Sync sigTs desde prop del padre
  useEffect(()=>{ if(camSiguiente) setSigTs(camSiguiente); },[camSiguiente]);

  // Countdown cada segundo
  useEffect(()=>{
    if(!sigTs)return;
    const tick=()=>{
      const diff=Math.max(0,Math.floor((sigTs-Date.now())/1000));
      setSegsRestantes(diff);
      const m=Math.floor(diff/60), s=diff%60;
      setCountdown(diff===0?"00:00":`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`);
      const total=30*60*1000; // intervalo fijo 30 min
      setPct(Math.min(100,Math.round(((total-Math.max(0,sigTs-Date.now()))/total)*100)));
    };
    tick();
    const id=setInterval(tick,1000);
    return()=>clearInterval(id);
  },[sigTs,camConfig]);

  // ── KPIs
  const histHoy=camRevisiones.filter(r=>r.fecha===hoy);
  const totalOK=histHoy.filter(r=>r.estado==="ok").length;
  const totalAnom=histHoy.filter(r=>r.estado==="anomalia").length;

  // Racha: días consecutivos sin anomalías (hacia atrás desde hoy)
  const rachaOK=(()=>{
    if(histHoy.some(r=>r.estado==="anomalia")) return 0;
    const fechasUnicas=[...new Set(camRevisiones.map(r=>r.fecha))].sort((a,b)=>{
      const pa=a.split("/").reverse().join("-"), pb=b.split("/").reverse().join("-");
      return pb.localeCompare(pa);
    });
    let dias=0;
    for(const f of fechasUnicas){
      if(f===hoy){if(histHoy.length>0&&!histHoy.some(r=>r.estado==="anomalia")) dias++;continue;}
      const del=camRevisiones.filter(r=>r.fecha===f);
      if(del.length===0) break;
      if(del.some(r=>r.estado==="anomalia")) break;
      dias++;
    }
    return dias;
  })();

  // Tiempo promedio de respuesta del día (minutos)
  const tiempoPromResp=(()=>{
    const conTiempos=histHoy.filter(r=>r.horaAlerta&&r.horaAtencion);
    if(!conTiempos.length) return null;
    const total=conTiempos.reduce((s,r)=>{
      const[ah,am,as2]=(r.horaAlerta||"0:0:0").split(":").map(Number);
      const[bh,bm,bs2]=(r.horaAtencion||"0:0:0").split(":").map(Number);
      return s+Math.max(0,(bh*3600+bm*60+bs2)-(ah*3600+am*60+as2));
    },0);
    return Math.round(total/conTiempos.length/60);
  })();

  // ── Historial filtrado
  const histFiltrado=(()=>{
    if(filtroHist==="hoy") return histHoy;
    if(filtroHist==="semana"){
      const hace7=Date.now()-7*24*60*60*1000;
      return camRevisiones.filter(r=>r.ts&&r.ts>=hace7);
    }
    return camRevisiones.slice(0,60);
  })();

  // Semáforo de tiempo de respuesta
  const colorTiempo=(mins)=>{
    const esc=camConfig?.escalamiento||10;
    if(mins<=Math.floor(esc/3)) return "#22c55e";
    if(mins<=Math.floor(esc*2/3)) return "#f97316";
    return "#ef4444";
  };

  // ── Guardar revisión
  const guardarRevision=async(opcion)=>{
    const _fb=fb||window._fb;
    if(!_fb)return;
    setSaving(true);
    try{
      const ahora=new Date();
      const hora=ahora.toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
      const fecha=ahora.toLocaleDateString("es");
      const{db,ref,push,get}=_fb;
      let horaAlerta=hora;
      try{
        const snap=await get(ref(db,"cam_estado"));
        const d=snap.val();
        if(d&&d.horaAlerta) horaAlerta=d.horaAlerta;
      }catch(e){}
      const nota=opcion==="ok"
        ?`Revisión OK — Alerta: ${horaAlerta} · Atendida: ${hora}`
        :`Anomalía — Alerta: ${horaAlerta} · Atendida: ${hora}${notaAnomalia.trim()?` — Detalle: ${notaAnomalia.trim()}`:""}`;
      await push(ref(db,"cam_revisiones"),{
        estado:opcion==="ok"?"ok":"anomalia",
        horaAlerta,horaAtencion:hora,
        notas:opcion==="ok"?"":notaAnomalia.trim(),
        fecha,usuario:usuario.nombre,ts:Date.now()
      });
      await push(ref(db,"registros"),{
        USUARIO:usuario.nombre,ROL:usuario.rol||"Monitoreo",
        FECHA:fecha,HORA:hora,
        MODULO:"Cámaras Perimetrales",
        ACCION:opcion==="ok"?"REVISIÓN OK":"ANOMALÍA DETECTADA",
        UBICACION:"Cámaras Perimetrales",
        NOTAS:nota,_ts:Date.now()
      });
      if(window._camArrancar) window._camArrancar();
      if(opcion!=="ok"){
        setSaving(false);setRevManual(false);setStep(null);setNotaAnomalia("");
        const otMod=MODS.find(m=>m.id==="ot");
        if(otMod&&openMod) setTimeout(()=>openMod(otMod),50);
        return;
      }
    }catch(e){alert("Error al guardar. Intente de nuevo.");}
    setSaving(false);setRevManual(false);setStep(null);setNotaAnomalia("");
  };

  return(
    <div className="fi" style={{height:"100%",display:"flex",flexDirection:"column",position:"relative"}}>

      {/* ══ MODAL REVISIÓN ══ */}
      {revManual&&(
        <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:"#000000e8",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:20,overflowY:"auto"}}>
          <div style={{width:"100%",maxWidth:360,background:"#0d1520",border:`2px solid ${step==="falla"?"#ef4444":step==="ok"?"#22c55e":CC}`,borderRadius:20,padding:22}}>
            <div style={{textAlign:"center",marginBottom:16}}>
              <div style={{fontSize:32,marginBottom:4}}>📹</div>
              <div style={{fontSize:15,fontWeight:900,color:CC}}>REVISIÓN DE CÁMARAS</div>
              <div style={{fontSize:10,color:"#5a7a9a",marginTop:3}}>{hoy} · {clock} · {usuario.nombre}</div>
            </div>

            {/* Paso 1 — elegir estado */}
            {!step&&(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <button onClick={()=>setStep("ok")}
                  style={{padding:"16px",background:"#22c55e20",border:"2px solid #22c55e",borderRadius:14,color:"#22c55e",fontWeight:900,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                  <span style={{fontSize:22}}>✅</span> Todo en orden — Sin novedad
                </button>
                <button onClick={()=>setStep("falla")}
                  style={{padding:"16px",background:"#ef444420",border:"2px solid #ef4444",borderRadius:14,color:"#ef4444",fontWeight:900,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                  <span style={{fontSize:22}}>⚠️</span> Se detectó una anomalía
                </button>
                <button onClick={()=>{setRevManual(false);setStep(null);setNotaAnomalia("");}}
                  style={{padding:"10px",background:"transparent",border:"1px solid #2a4060",borderRadius:12,color:"#5a7a9a",fontWeight:700,fontSize:11,cursor:"pointer"}}>
                  CANCELAR
                </button>
              </div>
            )}

            {/* Paso 2 — OK: confirmar */}
            {step==="ok"&&(
              <div>
                <div style={{background:"#22c55e12",border:"1px solid #22c55e40",borderRadius:12,padding:"14px",marginBottom:14,textAlign:"center"}}>
                  <div style={{fontSize:28,marginBottom:4}}>✅</div>
                  <div style={{fontSize:13,fontWeight:900,color:"#22c55e"}}>Sin novedad</div>
                  <div style={{fontSize:10,color:"#94a3b8",marginTop:4}}>Se registrará la revisión en el historial.</div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setStep(null)} style={{flex:1,padding:"12px",background:"var(--border)",border:"none",borderRadius:10,color:"var(--text)",fontWeight:900,fontSize:11,cursor:"pointer"}}>← ATRÁS</button>
                  <button onClick={()=>guardarRevision("ok")} disabled={saving}
                    style={{flex:2,padding:"12px",background:"#22c55e",border:"none",borderRadius:10,color:"white",fontWeight:900,fontSize:13,cursor:"pointer",opacity:saving?0.5:1}}>
                    {saving?"⏳ GUARDANDO...":"✅ CONFIRMAR"}
                  </button>
                </div>
              </div>
            )}

            {/* Paso 2 — ANOMALÍA: campo de descripción + confirmación */}
            {step==="falla"&&(
              <div>
                <div style={{background:"#ef444412",border:"1px solid #ef444440",borderRadius:12,padding:"12px",marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:900,color:"#ef4444",marginBottom:8}}>⚠️ DESCRIBE LA ANOMALÍA</div>
                  <textarea
                    rows={3}
                    placeholder="¿Qué se observó? (cámara sin imagen, imagen borrosa, movimiento sospechoso, etc.)"
                    value={notaAnomalia}
                    onChange={e=>setNotaAnomalia(e.target.value)}
                    style={{width:"100%",background:"#0c1018",border:"1px solid #ef444440",borderRadius:8,padding:"10px",color:"white",fontSize:12,outline:"none",resize:"none",fontFamily:"inherit",lineHeight:1.5}}
                  />
                  <div style={{fontSize:9,color:"#ef4444aa",marginTop:4}}>Opcional pero recomendado — ayuda a los técnicos a priorizar.</div>
                </div>
                {/* Anomalías recientes como referencia */}
                {camRevisiones.filter(r=>r.estado==="anomalia"&&r.notas).slice(0,2).map((r,i)=>(
                  <div key={i} style={{background:"#1a0d0d",border:"1px solid #ef444425",borderRadius:8,padding:"7px 10px",marginBottom:6,cursor:"pointer"}} onClick={()=>setNotaAnomalia(r.notas)}>
                    <div style={{fontSize:8,color:"#ef4444aa",fontWeight:700,marginBottom:2}}>ANOMALÍA RECIENTE — toca para copiar</div>
                    <div style={{fontSize:10,color:"#fca5a5"}}>{r.notas}</div>
                  </div>
                ))}
                <div style={{background:"#1a0e00",border:"1px solid #f9731430",borderRadius:10,padding:"9px 12px",marginBottom:12,fontSize:10,color:"#fca5a5",lineHeight:1.5}}>
                  🔧 Se abrirá una OT urgente para los técnicos.
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setStep(null)} style={{flex:1,padding:"12px",background:"var(--border)",border:"none",borderRadius:10,color:"var(--text)",fontWeight:900,fontSize:11,cursor:"pointer"}}>← ATRÁS</button>
                  <button onClick={()=>guardarRevision("falla")} disabled={saving}
                    style={{flex:2,padding:"12px",background:"#ef4444",border:"none",borderRadius:10,color:"white",fontWeight:900,fontSize:13,cursor:"pointer",opacity:saving?0.5:1}}>
                    {saving?"⏳ GUARDANDO...":"⚠️ CONFIRMAR ANOMALÍA"}
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ══ HEADER ══ */}
      <div style={{background:"var(--card)",borderBottom:`3px solid ${CC}`,flexShrink:0}}>
        <div style={{background:`${CC}10`,borderBottom:`1px solid ${CC}25`,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <button onClick={onVolver} style={{background:"#ef4444",border:"none",color:"white",fontSize:13,fontWeight:900,padding:"10px 16px",borderRadius:12,cursor:"pointer"}}>← SALIR</button>
          <div style={{textAlign:"center"}}>
            <div style={{fontWeight:900,fontSize:14,color:CC}}>📹 CÁMARAS PERIMETRALES</div>
            <div style={{fontSize:9,color:"var(--muted)",fontWeight:700}}>{hoy}</div>
          </div>
          <div style={{fontSize:14,fontWeight:900,color:CC}}>{clock}</div>
        </div>
      </div>

      <div className="scrollable">

        {/* ══ TIMER CARD ══ */}
        <div style={{background:pendiente?"#1a0808":`${CC}08`,border:`2px solid ${pendiente?"#ef4444":`${CC}30`}`,borderRadius:16,padding:"18px 20px",marginBottom:14,textAlign:"center"}}>
          {/* Vicente puede ver el countdown Y atender revisiones pendientes */}
          <div style={{fontSize:11,fontWeight:800,color:pendiente?"#ef4444":"var(--muted)",marginBottom:6,letterSpacing:1}}>
            {pendiente?"🔴 REVISIÓN PENDIENTE":esAdmin?"📹 SISTEMA DE MONITOREO":"PRÓXIMA REVISIÓN EN"}
          </div>

          {/* Countdown grande — visible para todos */}
          {!pendiente&&(
            <>
              <div style={{fontSize:"clamp(34px,10vw,50px)",fontWeight:900,color:pct>80?"#f97316":CC,letterSpacing:2,fontVariantNumeric:"tabular-nums",lineHeight:1}}>{countdown}</div>
              <div style={{fontSize:10,color:"var(--muted)",marginTop:8}}>
                Cada 30 min · {String(Math.floor(camConfig?.horaInicio||9)).padStart(2,"0")}:{(camConfig?.horaInicio||9)%1===0.5?"30":"00"} – {String(Math.floor(camConfig?.horaFin||21.5)).padStart(2,"0")}:{(camConfig?.horaFin||21.5)%1===0.5?"30":"00"}
              </div>
            </>
          )}
          {pendiente&&(
            <div style={{fontSize:13,fontWeight:800,color:"#fca5a5",margin:"8px 0"}}>Es hora de realizar la revisión perimetral</div>
          )}

          {/* Barra de progreso */}
          <div style={{marginTop:10,height:5,background:"var(--border)",borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:pendiente?"#ef4444":pct>80?"#f97316":CC,borderRadius:4,transition:"width 1s"}}/>
          </div>
          {!pendiente&&sigTs&&<div style={{fontSize:9,color:"var(--muted)",marginTop:4}}>{pct}% del intervalo transcurrido</div>}

          {/* Botón de revisión — Vicente también puede atender */}
          {(pendiente||segsRestantes===0)&&(
            <button onClick={()=>{setRevManual(true);setStep(null);setNotaAnomalia("");}}
              style={{width:"100%",padding:"14px",background:"#ef444418",border:"2px solid #ef4444",borderRadius:12,color:"#ef4444",fontWeight:900,fontSize:13,cursor:"pointer",marginTop:14,display:"flex",alignItems:"center",justifyContent:"center",gap:10,animation:"blink 1.5s infinite"}}>
              <span style={{fontSize:20}}>🔴</span> ATENDER REVISIÓN PENDIENTE
            </button>
          )}
        </div>

        {/* Botón manual para Monitoreo cuando no hay alerta activa */}
        {!esAdmin&&!pendiente&&segsRestantes>0&&(
          <div style={{marginBottom:14,opacity:0.45,pointerEvents:"none"}}>
            <div style={{width:"100%",padding:"14px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,textAlign:"center"}}>
              <div style={{fontSize:11,fontWeight:900,color:"var(--muted)"}}>🔒 PRÓXIMA REVISIÓN EN</div>
              <div style={{fontSize:26,fontWeight:900,color:"var(--muted)",marginTop:4,fontVariantNumeric:"tabular-nums"}}>{countdown}</div>
            </div>
          </div>
        )}

        {/* Recordatorio escalado si hay pendiente sin atender por más de 5 min */}
        {pendiente&&(()=>{
          const _fb2=fb||window._fb;
          if(!_fb2||!camSiguiente)return null;
          // El tick pone siguiente = ts + 30min cuando vence
          // Así que el tiempo sin atender = 30min - segsRestantes del nuevo ciclo
          // Pero más simple: usar el horaAlerta guardado — aquí no tenemos ese dato local
          // Mostramos el recordatorio simplemente si hay pendiente > 0 segs
          const minSinAtender=Math.floor((30*60*1000-Math.max(0,(camSiguiente-Date.now())))/60000);
          if(minSinAtender<2)return null; // dar 2 min de gracia
          const urgencia=minSinAtender>=10?"CRÍTICO":minSinAtender>=5?"URGENTE":"RECORDATORIO";
          const uc=minSinAtender>=10?"#ef4444":minSinAtender>=5?"#f97316":"#f59e0b";
          return(
            <div style={{background:`${uc}12`,border:`2px solid ${uc}`,borderRadius:14,padding:"12px 14px",marginBottom:14,animation:"blink 1.5s infinite"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:22}}>⏰</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,fontWeight:900,color:uc}}>{urgencia} — {minSinAtender} min sin atender</div>
                  <div style={{fontSize:10,color:"var(--muted)",marginTop:2}}>Registra la revisión para cerrar esta alerta</div>
                </div>
              </div>
            </div>
          );
        })()}

        {/* ══ KPIs DEL DÍA ══ */}
        <div className="label-sec">📊 HOY · {hoy}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:8}}>
          <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:"14px 10px",textAlign:"center"}}>
            <div style={{fontSize:28,fontWeight:900,color:CC}}>{histHoy.length}</div>
            <div style={{fontSize:9,color:"var(--muted)",fontWeight:700,marginTop:2}}>REVISIONES</div>
          </div>
          <div style={{background:totalAnom>0?"#ef444410":"#22c55e10",border:`1px solid ${totalAnom>0?"#ef444430":"#22c55e30"}`,borderRadius:12,padding:"14px 10px",textAlign:"center"}}>
            <div style={{fontSize:28,fontWeight:900,color:totalAnom>0?"#ef4444":"#22c55e"}}>{totalAnom>0?totalAnom:totalOK}</div>
            <div style={{fontSize:9,color:"var(--muted)",fontWeight:700,marginTop:2}}>{totalAnom>0?`ANOMALÍA${totalAnom>1?"S":""}`:histHoy.length>0?"TODO OK":"SIN DATOS"}</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:14}}>
          <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:900,color:rachaOK>0?"#22c55e":"var(--muted)"}}>{rachaOK}</div>
            <div style={{fontSize:9,color:"var(--muted)",fontWeight:700,marginTop:2}}>DÍAS SIN ANOMALÍA</div>
          </div>
          <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:900,color:tiempoPromResp!=null?colorTiempo(tiempoPromResp):"var(--muted)"}}>
              {tiempoPromResp!=null?`${tiempoPromResp}m`:"—"}
            </div>
            <div style={{fontSize:9,color:"var(--muted)",fontWeight:700,marginTop:2}}>T. RESP. PROM.</div>
          </div>
        </div>

        {/* ══ HISTORIAL ══ */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div className="label-sec" style={{margin:0}}>📋 HISTORIAL</div>
          <div style={{display:"flex",gap:5}}>
            {[{k:"hoy",l:"Hoy"},{k:"semana",l:"7 días"},{k:"todo",l:"Todo"}].map(f=>(
              <button key={f.k} onClick={()=>setFiltroHist(f.k)} style={{padding:"4px 10px",borderRadius:10,border:`1px solid ${filtroHist===f.k?CC:"var(--border)"}`,background:filtroHist===f.k?`${CC}20`:"var(--card)",color:filtroHist===f.k?CC:"var(--muted)",fontWeight:800,fontSize:10,cursor:"pointer"}}>
                {f.l}
              </button>
            ))}
          </div>
        </div>

        {histFiltrado.length===0&&(
          <div style={{color:"var(--muted)",fontSize:12,padding:"20px 0",textAlign:"center",background:"var(--card)",borderRadius:12,border:"1px solid var(--border)"}}>
            {filtroHist==="hoy"?"Sin revisiones hoy":"Sin registros en este período"}
          </div>
        )}

        {histFiltrado.map((r,i)=>{
          const[ah,am,as2]=(r.horaAlerta||"0:0:0").split(":").map(Number);
          const[bh,bm,bs2]=(r.horaAtencion||"0:0:0").split(":").map(Number);
          const mins=r.horaAlerta&&r.horaAtencion?Math.round(((bh*3600+bm*60+bs2)-(ah*3600+am*60+as2))/60):null;
          const esOK=r.estado==="ok";
          return(
            <div key={r._fbKey||i} style={{
              background:esOK?"#22c55e08":"#ef444408",
              border:`1px solid ${esOK?"#22c55e25":"#ef444425"}`,
              borderLeft:`3px solid ${esOK?"#22c55e":"#ef4444"}`,
              borderRadius:12,padding:"12px 14px",marginBottom:8
            }}>
              {/* Fila principal */}
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:18,flexShrink:0}}>{esOK?"✅":"⚠️"}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:900,color:esOK?"#22c55e":"#ef4444"}}>
                    {esOK?"Sin novedad":"Anomalía detectada"}
                  </div>
                  <div style={{fontSize:10,color:"var(--text3,#5a7a9a)",marginTop:1}}>
                    📅 {r.fecha} · 👤 {r.usuario||"Sistema"}
                  </div>
                </div>
                {/* Badge de tiempo de respuesta con semáforo */}
                {mins!=null&&mins>=0&&mins<999&&(
                  <div style={{textAlign:"center",flexShrink:0}}>
                    <div style={{fontSize:13,fontWeight:900,color:colorTiempo(mins)}}>{mins}m</div>
                    <div style={{fontSize:8,color:"var(--text3,#5a7a9a)",fontWeight:700}}>RESP.</div>
                  </div>
                )}
              </div>

              {/* Tiempos alerta/atención */}
              {r.horaAlerta&&r.horaAtencion&&(
                <div style={{background:"#0c1018",borderRadius:8,padding:"7px 10px",marginTop:8,display:"flex",gap:12,alignItems:"center"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:8,fontWeight:800,color:"var(--text3,#5a7a9a)",marginBottom:1}}>ALERTA</div>
                    <div style={{fontSize:11,fontWeight:900,color:"#f97316"}}>{r.horaAlerta}</div>
                  </div>
                  <div style={{fontSize:14,color:"var(--border)"}}>→</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:8,fontWeight:800,color:"var(--text3,#5a7a9a)",marginBottom:1}}>ATENDIDA</div>
                    <div style={{fontSize:11,fontWeight:900,color:"#22c55e"}}>{r.horaAtencion}</div>
                  </div>
                  {mins!=null&&mins>=0&&mins<999&&(
                    <div style={{background:colorTiempo(mins)+"20",border:`1px solid ${colorTiempo(mins)}50`,borderRadius:8,padding:"4px 10px",textAlign:"center"}}>
                      <div style={{fontSize:13,fontWeight:900,color:colorTiempo(mins)}}>{mins}m</div>
                    </div>
                  )}
                </div>
              )}

              {/* Descripción de anomalía */}
              {!esOK&&r.notas&&r.notas.trim()&&(
                <div style={{background:"#1a0808",border:"1px solid #ef444425",borderRadius:8,padding:"8px 10px",marginTop:8,display:"flex",gap:8,alignItems:"flex-start"}}>
                  <span style={{fontSize:14,flexShrink:0}}>📝</span>
                  <div style={{fontSize:11,color:"#fca5a5",lineHeight:1.5}}>{r.notas}</div>
                </div>
              )}

              {!r.horaAlerta&&r.hora&&(
                <div style={{fontSize:9,color:"var(--text3,#5a7a9a)",marginTop:4}}>🕒 {r.hora}</div>
              )}
            </div>
          );
        })}

      </div>
    </div>
  );
}


// ── Tarjeta de OT de cámara en home de Monitoreo ──
function MonitoreoCamOT({ot, usuario, clock, fb, openMod, hoy}){
  const[step,setStep]=useState(null);
  const[saving,setSaving]=useState(false);
  const[done,setDone]=useState(null);
  const[notaAnomalia,setNotaAnomalia]=useState("");
  const CC="#06b6d4";

  const cerrar=async(opcion)=>{
    const _fb=fb||window._fb;
    if(!_fb){console.error("fb undefined in MonitoreoCamOT");return;}
    setSaving(true);
    try{
      const ahora=new Date();
      const hora=ahora.toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
      const fecha=ahora.toLocaleDateString("es");
      const {db,ref,push,remove}=_fb;
      const nota=opcion==="ok"
        ?"Revisión completada — Sin novedad"
        :`Anomalía detectada — OT generada para técnicos${notaAnomalia.trim()?` — Detalle: ${notaAnomalia.trim()}`:""}`;
      await push(ref(db,"registros"),{
        USUARIO:usuario.nombre,ROL:usuario.rol||"Monitoreo",
        FECHA:fecha,HORA:hora,
        MODULO:"Cámaras Perimetrales",
        ACCION:opcion==="ok"?"REVISIÓN OK":"ANOMALÍA DETECTADA",
        UBICACION:"Cámaras Perimetrales",
        ORDEN_ID:ot.ot_id,
        NOTAS:nota,_ts:Date.now()
      });
      await push(ref(db,"cam_revisiones"),{
        estado:opcion==="ok"?"ok":"anomalia",
        horaAlerta:ot.hora||hora,
        horaAtencion:hora,
        notas:opcion==="ok"?"":notaAnomalia.trim(),
        fecha,usuario:usuario.nombre,ts:Date.now()
      });
      if(window._camArrancar) window._camArrancar();
      if(opcion!=="ok"){
        const otMod=MODS.find(m=>m.id==="ot");
        if(otMod&&openMod) setTimeout(()=>openMod(otMod),50);
      } else {
        setDone("ok");
      }
    }catch(err){
      console.error("Error cerrando OT cámara:",err);
      alert("Error al guardar. Intente de nuevo.");
    }
    setSaving(false);
  };

  if(done==="ok") return(
    <div style={{background:"#071f12",border:"2px solid #22c55e",borderRadius:14,padding:"16px",marginBottom:10,textAlign:"center"}}>
      <div style={{fontSize:28,marginBottom:6}}>✅</div>
      <div style={{fontSize:13,fontWeight:900,color:"#22c55e",marginBottom:4}}>Revisión completada — Sin novedad</div>
      <div style={{fontSize:9,color:"var(--muted)"}}>🕒 {clock} · El marcador se reiniciará pronto</div>
    </div>
  );

  return(
    <div style={{background:"#071a22",border:`2px solid ${CC}`,borderRadius:14,padding:"14px",marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div>
          <div style={{fontSize:9,fontWeight:900,color:CC,marginBottom:2}}>{ot.ot_id}</div>
          <div style={{fontSize:14,fontWeight:900,color:"#e2ecf8"}}>📹 Revisión de Cámaras</div>
          <div style={{fontSize:10,color:"var(--muted)",marginTop:2}}>Generada: {ot.hora} · {ot.fecha}</div>
        </div>
        <span style={{fontSize:9,fontWeight:800,padding:"3px 8px",borderRadius:10,background:"#ef444425",color:"#ef4444",animation:"blink 1.5s infinite"}}>PENDIENTE</span>
      </div>
      {!step&&(
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setStep("ok")}
            style={{flex:1,padding:"12px",background:"#22c55e20",border:"2px solid #22c55e",borderRadius:12,color:"#22c55e",fontWeight:900,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            <span>✅</span> Sin novedad
          </button>
          <button onClick={()=>setStep("falla")}
            style={{flex:1,padding:"12px",background:"#ef444420",border:"2px solid #ef4444",borderRadius:12,color:"#ef4444",fontWeight:900,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            <span>⚠️</span> Anomalía
          </button>
        </div>
      )}
      {step==="ok"&&(
        <div>
          <div style={{background:"#22c55e12",border:"1px solid #22c55e40",borderRadius:10,padding:"10px",marginBottom:8,textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:900,color:"#22c55e"}}>✅ Sin novedad · {clock}</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setStep(null)} style={{flex:1,padding:"10px",background:"var(--border)",border:"none",borderRadius:10,color:"var(--text)",fontWeight:900,fontSize:11,cursor:"pointer"}}>← ATRÁS</button>
            <button onClick={()=>cerrar("ok")} disabled={saving}
              style={{flex:2,padding:"10px",background:"#22c55e",border:"none",borderRadius:10,color:"white",fontWeight:900,fontSize:12,cursor:"pointer",opacity:saving?0.5:1}}>
              {saving?"⏳...":"✅ CONFIRMAR"}
            </button>
          </div>
        </div>
      )}
      {step==="falla"&&(
        <div>
          <div style={{fontSize:11,fontWeight:800,color:"#ef4444",marginBottom:6}}>⚠️ DESCRIBE LA ANOMALÍA</div>
          <textarea
            rows={2}
            placeholder="¿Qué se observó? (opcional pero útil para los técnicos)"
            value={notaAnomalia}
            onChange={e=>setNotaAnomalia(e.target.value)}
            style={{width:"100%",background:"#0c1018",border:"1px solid #ef444440",borderRadius:8,padding:"9px",color:"white",fontSize:12,outline:"none",resize:"none",fontFamily:"inherit",marginBottom:8,lineHeight:1.5}}
          />
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setStep(null)} style={{flex:1,padding:"10px",background:"var(--border)",border:"none",borderRadius:10,color:"var(--text)",fontWeight:900,fontSize:11,cursor:"pointer"}}>← ATRÁS</button>
            <button onClick={()=>cerrar("falla")} disabled={saving}
              style={{flex:2,padding:"10px",background:"#ef4444",border:"none",borderRadius:10,color:"white",fontWeight:900,fontSize:12,cursor:"pointer",opacity:saving?0.5:1}}>
              {saving?"⏳...":"⚠️ CONFIRMAR ANOMALÍA"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}


// ══════════════════════════════════════════════════════
// NOTIFICATION CENTER COMPONENT
// ══════════════════════════════════════════════════════
function NotifCenter({notifs,notifOpen,setNotifOpen,markRead,markAllRead,clearNotif,setScreen,usuario}){
  const unread=notifs.filter(n=>!n.leido).length;
  const handleClick=(n)=>{
    markRead(n.id);
    setNotifOpen(false);
    if(n.screen) setScreen(n.screen);
  };
  const fmt=(ts)=>{
    const diff=Math.floor((Date.now()-ts)/1000);
    if(diff<60) return "ahora";
    if(diff<3600) return Math.floor(diff/60)+"m";
    if(diff<86400) return Math.floor(diff/3600)+"h";
    return Math.floor(diff/86400)+"d";
  };
  return(
    <div style={{position:"relative"}}>
      <button className="notif-btn" onClick={()=>setNotifOpen(o=>!o)} aria-label="Notificaciones">
        <span style={{fontSize:16}}>🔔</span>
        {unread>0&&<span className="notif-badge">{unread>9?"9+":unread}</span>}
      </button>
      {notifOpen&&(
        <>
          <div style={{position:"fixed",inset:0,zIndex:8999}} onClick={()=>setNotifOpen(false)}/>
          <div className="notif-panel">
            <div className="notif-panel-hdr">
              <div>
                <div style={{fontSize:13,fontWeight:800,color:"var(--text)"}}>Notificaciones</div>
                {unread>0&&<div style={{fontSize:10,color:"var(--accent)",fontWeight:700,marginTop:2}}>{unread} sin leer</div>}
              </div>
              <div style={{display:"flex",gap:8}}>
                {unread>0&&<button onClick={markAllRead} style={{fontSize:10,fontWeight:700,background:"var(--info)",color:"var(--accent)",border:"1px solid var(--info-border)",padding:"4px 8px",borderRadius:"var(--r-sm)",cursor:"pointer"}}>Marcar todo</button>}
                <button onClick={()=>setNotifOpen(false)} style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
              </div>
            </div>
            <div style={{maxHeight:320,overflowY:"auto"}}>
              {notifs.length===0&&(
                <div style={{padding:"28px 16px",textAlign:"center",color:"var(--text3)"}}>
                  <div style={{fontSize:28,marginBottom:8}}>🔕</div>
                  <div style={{fontSize:12,fontWeight:700}}>Sin notificaciones</div>
                </div>
              )}
              {notifs.map(n=>(
                <div key={n.id} className={`notif-item${n.leido?"":" unread"}`} onClick={()=>handleClick(n)}>
                  <div className="notif-dot" style={{background:n.color||"var(--accent)"}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                      <div style={{fontSize:12,fontWeight:800,color:n.leido?"var(--text2)":"var(--text)"}}>{n.titulo}</div>
                      <div style={{fontSize:10,color:"var(--text3)",flexShrink:0}}>{fmt(n.ts)}</div>
                    </div>
                    <div style={{fontSize:11,color:"var(--text3)",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.msg}</div>
                  </div>
                  <button onClick={e=>{e.stopPropagation();clearNotif(n.id);}} style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:14,padding:"0 2px",opacity:.6,flexShrink:0}}>×</button>
                </div>
              ))}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

function ToastStack({toasts,onClose}){
  if(!toasts||toasts.length===0) return null;
  return(
    <div className="toast-stack">
      {toasts.map(t=>(
        <div key={t.id} className="toast" style={{borderLeft:`3px solid ${t.color||"var(--accent)"}`}}>
          <span style={{fontSize:20,flexShrink:0}}>{t.icon||"🔔"}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:800,color:"var(--text)"}}>{t.titulo}</div>
            <div style={{fontSize:11,color:"var(--text2)",marginTop:1}}>{t.msg}</div>
          </div>
          <button className="toast-close" onClick={()=>onClose(t.id)}>×</button>
        </div>
      ))}
    </div>
  );
}

function App(){
  const[usuario,setUsuario]=useState(null);

  const[history,setHistory]=useState([]);
  const[activeOTs,setActiveOTs]=useState([]);
  const[vales,setVales]=useState([]);
  const[timer,setTimer]=useState(0);
  const[timerOn,setTimerOn]=useState(false);
  const[sync,setSync]=useState("ok");
  const[otAlert,setOtAlert]=useState(null);
  // ── Notification Center
  const[notifOpen,setNotifOpen]=useState(false);
  // Expose addNotif globally after mount — used by cam engine and other async contexts
  useEffect(()=>{ window._addNotif=addNotif; },[addNotif]);
  const[notifs,setNotifs]=useState([]);
  const[toasts,setToasts]=useState([]);
  const toastIdRef=useRef(0);

  },[]);
  const closeToast=(id)=>setToasts(prev=>prev.filter(t=>t.id!==id)); // [{id,tipo,titulo,msg,ts,leido,screen,color,icon}]
  const notifIdRef=useRef(0);
  const addNotif=useCallback((notif)=>{
    const id=++notifIdRef.current;
    setNotifs(prev=>[{id,...notif,ts:Date.now(),leido:false},...prev].slice(0,50));
    return id;
  },[]);
  const markRead=(id)=>setNotifs(prev=>prev.map(n=>n.id===id?{...n,leido:true}:n));
  const markAllRead=()=>setNotifs(prev=>prev.map(n=>({...n,leido:true})));
  const clearNotif=(id)=>setNotifs(prev=>prev.filter(n=>n.id!==id));
  const[onlineU,setOnlineU]=useState([]);
  const[selMod,setSelMod]=useState(null);
  const[lastRecord,setLastRecord]=useState(null);
  const[rafagaRegistros,setRafagaRegistros]=useState([]); // tiempos de la sesión ráfaga actual
  const[rafagaLimpieza,setRafagaLimpieza]=useState([]); // ubicaciones de la sesión ráfaga limpieza
  const[rafagaRecorrido,setRafagaRecorrido]=useState([]); // revisiones de la sesión ráfaga cajero/entrada/salida
  const bp=useBreakpoint();
  const isDesktop=bp==="desktop";
  const isTablet=bp==="tablet"||bp==="desktop";
  const[clock,setClock]=useState("");
  const[diaTab,setDiaTab]=useState("hoy");
  // Tick cada 60s para actualizar tiempos en tarjetas OT
  const[otTick,setOtTick]=useState(0);
  useEffect(()=>{
    const id=setInterval(()=>setOtTick(t=>t+1),60000);
    return()=>clearInterval(id);
  },[]);
  // Ref para scroll al área de OTs desde el banner
  const otAreaRef=useRef(null);
  const irAOTs=useCallback(()=>{
    setScreen("home");
    setTimeout(()=>{
      if(otAreaRef.current) otAreaRef.current.scrollIntoView({behavior:"smooth",block:"start"});
    },80);
  },[]);
  const[permisosDB,setPermisosDB]=useState({});
  // ── Módulo Cámaras Monitoreo
  const[camConfig,setCamConfig]=useState({intervalo:40,escalamiento:10,horaInicio:9,horaFin:21.5});
  const[camSiguiente,setCamSiguiente]=useState(null);
  const[camPendiente,setCamPendiente]=useState(false);
  const[camRevisiones,setCamRevisiones]=useState([]);
  const camTimerRef=useRef(null);
  const camPrevPendiente=useRef(false);

  // Cargar permisos dinámicos de Firebase → window._permisos
  useEffect(()=>{
    if(!window._fb)return;
    const unsub=window._fb.onValue(window._fb.ref(window._fb.db,"permisos"),snap=>{
      const d=snap.val()||{};
      window._permisos=d;
      setPermisosDB(d);
    });
    return()=>unsub();
  },[]);

  // ── Cargar config de cámaras desde Firebase
  useEffect(()=>{
    if(!window._fb)return;
    const unsub=window._fb.onValue(window._fb.ref(window._fb.db,"cam_config"),snap=>{
      const d=snap.val();
      if(d) setCamConfig(d);
    });
    return()=>unsub();
  },[]);

  // ── Cargar revisiones de cámaras
  useEffect(()=>{
    if(!window._fb)return;
    const unsub=window._fb.onValue(window._fb.ref(window._fb.db,"cam_revisiones"),snap=>{
      const d=snap.val();
      if(d){
        const arr=Object.entries(d).map(([k,v])=>({...v,_fbKey:k})).sort((a,b)=>(b.ts||0)-(a.ts||0));
        setCamRevisiones(arr);
      } else {setCamRevisiones([]);}
    });
    return()=>unsub();
  },[]);

  // ── Motor del temporizador de cámaras — persistido en Firebase
  // ══════════════════════════════════════════════════════════
  // TIMER ENGINE — completamente basado en Firebase
  // cam_estado = {siguiente: timestamp, pendiente: bool}
  // Un tick cada 10s verifica si vención y crea la OT
  // ══════════════════════════════════════════════════════════
  const camConfigRef=useRef(camConfig);
  useEffect(()=>{ camConfigRef.current=camConfig; },[camConfig]);

  // 1. Leer cam_estado en tiempo real → actualizar camSiguiente
  useEffect(()=>{
    if(!window._fb)return;
    const{db,ref,onValue:ov,set,push,get}=window._fb;

    // Inicializar si no existe
    get(ref(db,"cam_estado")).then(snap=>{
      if(!snap.val()){
        const sig=Date.now()+camConfigRef.current.intervalo*60*1000;
        set(ref(db,"cam_estado"),{siguiente:sig,pendiente:false,ts:Date.now()});
      }
    });

    const unsub=ov(ref(db,"cam_estado"),snap=>{
      const d=snap.val();
      if(!d)return;
      if(d.siguiente) setCamSiguiente(d.siguiente);
      const isPend=!!d.pendiente;
      setCamPendiente(isPend);

      // ── Alertas SOLO para Monitoreo y Vicente ──
      const uActual=window._usuarioActual; // referencia al usuario activo
      const esMonitoreo=uActual&&(uActual.rol==="Monitoreo"||uActual.nombre==="Vicente");

      if(isPend&&!camPrevPendiente.current&&esMonitoreo){
        camPrevPendiente.current=true;

        // 1. Sonido diferenciado para cámaras (3 tonos graves + pausa + tono agudo)
        try{
          const ctx=new(window.AudioContext||window.webkitAudioContext)();
          const secuencia=[
            {f:440,t:0,dur:0.3},{f:440,t:0.35,dur:0.3},{f:880,t:0.8,dur:0.5}
          ];
          secuencia.forEach(({f,t,dur})=>{
            const o=ctx.createOscillator(),g=ctx.createGain();
            o.connect(g);g.connect(ctx.destination);
            o.type="sine";o.frequency.value=f;
            const at=ctx.currentTime+t;
            g.gain.setValueAtTime(0,at);
            g.gain.linearRampToValueAtTime(0.6,at+0.04);
            g.gain.exponentialRampToValueAtTime(0.001,at+dur);
            o.start(at);o.stop(at+dur+0.05);
          });
          navigator.vibrate&&navigator.vibrate([300,100,300,100,100,50,600]);
        }catch(e){}

        // 2. Notificación del sistema operativo
        const notifBody=`Hora: ${d.horaAlerta||"--:--"} — Ingresa al módulo para registrar la revisión`;
        if(window.Notification&&Notification.permission==="granted"){
          new Notification("📹 REVISIÓN DE CÁMARAS PENDIENTE",{
            body:notifBody,tag:"cam-revision",requireInteraction:true,
            icon:"/favicon.ico",silent:false
          });
        } else if(window.Notification&&Notification.permission!=="denied"){
          Notification.requestPermission().then(p=>{
            if(p==="granted") new Notification("📹 REVISIÓN DE CÁMARAS PENDIENTE",{
              body:notifBody,tag:"cam-revision",requireInteraction:true
            });
          });
        }

        // 3. Agregar al centro de notificaciones de la app
        if(window._addNotif){
          window._addNotif({
            icon:"📹",
            titulo:"Revisión de cámaras pendiente",
            msg:`Generada a las ${d.horaAlerta||"--:--"} · Ingresa al módulo para registrar`,
            color:"#06b6d4",
            screen:"camaras",
          });
        }
      }
      if(!isPend){
        camPrevPendiente.current=false;
        // Cerrar notificación del SO si existe
        try{ if(window.Notification) new Notification("📹 Cámaras",{tag:"cam-revision",silent:true}); }catch(e){}
      }
    });
    return()=>unsub();
  },[]);

  // ── Motor de revisión de cámaras ──────────────────────────────────────
  // Reglas:
  //   • Intervalo fijo: 30 min (siempre)
  //   • Al vencer: marcar pendiente=true, reprogramar INMEDIATAMENTE el siguiente ciclo
  //   • El pendiente queda hasta que Monitoreo lo atienda manualmente
  //   • Sin OTs, sin escalamiento — solo estado en cam_estado y alertas locales
  // ───────────────────────────────────────────────────────────────────────
  const CAM_INTERVALO_MS = 30 * 60 * 1000; // 30 minutos fijos

  useEffect(()=>{
    if(!window._fb)return;
    const{db,ref,set,get}=window._fb;

    const tick=async()=>{
      try{
        const snap=await get(ref(db,"cam_estado"));
        const d=snap.val();
        if(!d||!d.siguiente)return;
        const ahora=Date.now();

        if(d.siguiente<=ahora){
          // Venció — reprogramar +30 min y marcar pendiente
          // El onValue de cam_estado se encarga de disparar sonido/vibración/notificación
          const horaAlerta=new Date().toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
          await set(ref(db,"cam_estado"),{
            siguiente:ahora+CAM_INTERVALO_MS,
            pendiente:true,
            horaAlerta,
            ts:ahora,
          });
        }
      }catch(e){}
    };

    const id=setInterval(tick,10000);
    tick();
    return()=>clearInterval(id);
  },[]);

  // Reprogramar después de atender — solo limpia pendiente, mantiene ciclo de 30 min
  window._camArrancar=()=>{
    if(!window._fb)return;
    const{db,ref,set}=window._fb;
    // El siguiente ciclo ya fue programado por el tick cuando venció.
    // Solo marcamos pendiente=false para apagar la alerta.
    set(ref(db,"cam_estado"),{
      siguiente:Date.now()+CAM_INTERVALO_MS,
      pendiente:false,
      ts:Date.now(),
    });
  };


  const[passwords,setPasswords]=useState({});
  // Cerrar sesión explícito (sin timeout automático)
  const[confirmLogout,setConfirmLogout]=useState(false);
  // Exponer usuario activo globalmente para que el engine de cámaras pueda verificar el rol
  useEffect(()=>{ window._usuarioActual=usuario; },[usuario]);

  // ── Sistema de actualización remota ──
  // Vicente escribe en Firebase: set(ref(db,"app_version"),{v:"8.3",msg:"Mejoras en módulo OT"})
  // Todos los clientes ven el banner inmediatamente
  const[updateAvail,setUpdateAvail]=useState(null); // {v, msg}
  const[updateDismissed,setUpdateDismissed]=useState(false);
  useEffect(()=>{
    if(!window._fb)return;
    const{db,ref,onValue:ov}=window._fb;
    const unsub=ov(ref(db,"app_version"),snap=>{
      const d=snap.val();
      if(!d)return;
      const remota=d.v||d;
      // Si la versión remota es mayor que la local → mostrar banner
      if(typeof remota==="string"&&remota!==APP_VERSION){
        setUpdateAvail({v:remota,msg:d.msg||"Nueva versión disponible"});
        setUpdateDismissed(false);
      } else {
        setUpdateAvail(null);
      }
    });
    return()=>unsub();
  },[]);

  const cerrarSesion=useCallback(()=>{
    if(window._fb&&window._fb.presenceRef) window._fb.remove(window._fb.presenceRef);
    setUsuario(null);
    setScreen("home");
    setConfirmLogout(false);
  },[]);
  const[dynCajeros,setDynCajeros]=useState(null);
  const[dynEntradas,setDynEntradas]=useState(null);
  const[dynSalidas,setDynSalidas]=useState(null);
  const[dynLimCajeros,setDynLimCajeros]=useState(null);
  const[dynLimSalidas,setDynLimSalidas]=useState(null);
  const[dynVP,setDynVP]=useState(null);
  const[anuncio,setAnuncio]=useState(null);
  const tRef=useRef(null);
  const pLen=useRef(0);
  const pOTLen=useRef(0);
  const actx=useRef(null);
  const [migrando, setMigrando] = useState(false);
  const [recargarVales, setRecargarVales] = useState(0);

  useEffect(()=>{
    const check=setInterval(()=>{
      if(window._fb && window._fb.db && window._fbReady){
        clearInterval(check);
        setFirebaseReady(true);
      }
    },50);
    return()=>clearInterval(check);
  },[]);

  useEffect(()=>{
    const fn=()=>setClock(new Date().toLocaleTimeString("es",{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
    fn();const id=setInterval(fn,1000);return()=>clearInterval(id);
  },[]);

  useEffect(()=>{
    const u=()=>{if(!actx.current)actx.current=new(window.AudioContext||window.webkitAudioContext)();if(actx.current.state==='suspended')actx.current.resume();};
    document.addEventListener('touchstart',u,{passive:true});document.addEventListener('click',u);
    return()=>{document.removeEventListener('touchstart',u);document.removeEventListener('click',u);};
  },[]);

  const migrarPasswordsAHash = async () => {
    if(migrando) return;
    setMigrando(true);
    try {
      const { db, ref, get, set } = window._fb;
      const snapshot = await get(ref(db, "passwords"));
      const datosActuales = snapshot.val() || {};
      
      let cambios = false;
      const nuevosPasswords = { ...datosActuales };
      
      for (const user of USUARIOS_ORIGINALES) {
        const passwordActual = datosActuales[user.nombre];
        if (passwordActual && passwordActual.length !== 64) {
          const hash = await hashPassword(user.password);
          nuevosPasswords[user.nombre] = hash;
          cambios = true;
        }
        if (!passwordActual) {
          const hash = await hashPassword(user.password);
          nuevosPasswords[user.nombre] = hash;
          cambios = true;
        }
      }
      
      if (cambios) {
        await set(ref(db, "passwords"), nuevosPasswords);
      }
    } catch (error) {
      console.error("Error en migración:", error);
    } finally {
      setMigrando(false);
    }
  };

  const marcarRegreso = async (vale) => {
    if(!window._fb) return;
    const { db, ref, set } = window._fb;
    const ahora = new Date();
    const horaRegreso = ahora.toLocaleTimeString("es", {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    
    const minPermitido = vale.tipo === "almuerzo" ? 65 : 15;
    const [sh, sm, ss] = vale.salida.split(":").map(Number);
    const [rh, rm, rs] = horaRegreso.split(":").map(Number);
    const aTiempo = ((rh*60+rm)*60+(rs||0) - (sh*60+sm)*60-(ss||0)) <= minPermitido*60;
    
    const { _fbKey, ...rest } = vale;
    await set(ref(db, `vales/${_fbKey}`), { ...rest, regreso: horaRegreso, aTiempo });
    setRecargarVales(prev => prev + 1);
  };

  useEffect(()=>{
    if(!firebaseReady)return;
    const{db,ref,onValue,set}=window._fb;
    
    migrarPasswordsAHash();
    
    const s1=onValue(ref(db,"registros"),snap=>{
      const d=snap.val();if(!d){setHistory([]);pLen.current=0;return;}
      const arr=Object.entries(d).map(([k,v])=>({...v,_fbKey:k})).sort((a,b)=>(b._ts||0)-(a._ts||0));
      pLen.current=arr.length;setHistory(arr);
    });
    const s2=onValue(ref(db,"activeOTs"),snap=>{
      const d=snap.val();if(!d){setActiveOTs([]);pOTLen.current=0;return;}
      const arr=Object.entries(d).map(([k,v])=>({...v,_fbKey:k}));
      // Detectar OTs nuevas (no de cámara) y notificar
      if(pOTLen.current>0){
        const nuevas=arr.filter(o=>o.tipo!=="cam_revision"&&o.tipo!=="cam_escalamiento"&&!notifiedOTsRef.current.has(o.ot_id||o._fbKey));
        nuevas.forEach(n=>{
          notifiedOTsRef.current.add(n.ot_id||n._fbKey);
          playSound("ot_nueva");
          setOtAlert({loc:n?.loc,det:n?.det,id:n?.ot_id});
          setTimeout(()=>setOtAlert(null),8000);
          // Notificación persistente en el centro
          addNotif({
            icon:"🔧",
            titulo:`Nueva OT · ${n.ot_id||""}`,
            msg:`📍 ${n.loc||"Sin ubicación"}${n.det&&n.det!==n.loc?" — "+n.det.slice(0,60):""}`,
            color:"#ef4444",
            screen:"home",
          });
        });
      } else {
        // Primera carga: registrar OTs ya existentes como "ya notificadas" para no disparar al login
        arr.forEach(o=>notifiedOTsRef.current.add(o.ot_id||o._fbKey));
      }
      pOTLen.current=arr.length;setActiveOTs(arr);
    });
    const s3=onValue(ref(db,"presencia"),snap=>{
      const d=snap.val();
      const list=d?Object.values(d).filter(v=>v.nombre&&v.nombre!==""&&v.nombre!=="Vicente"):[];
      setOnlineU(list.map(v=>v.nombre));
    });
    const s4=onValue(ref(db,"vales"),snap=>{
      const d=snap.val();if(!d){setVales([]);return;}
      setVales(Object.entries(d).map(([k,v])=>({...v,_fbKey:k})));
    });
    const s5=onValue(ref(db,"passwords"),snap=>{
      const d=snap.val();
      if(d)setPasswords(d);
      else{const def={};USUARIOS_ORIGINALES.forEach(async u=>{def[u.nombre]=await hashPassword(u.password);});set(ref(db,"passwords"),def);setPasswords(def);}
    });
    const s6=onValue(ref(db,"config_listas"),snap=>{
      const d=snap.val()||{};
      if(d.cajeros) setDynCajeros(d.cajeros);

      if(tipo==="ot_nueva"){
        // 4 tonos ascendentes — OT nueva
        [523,659,784,1047].forEach((f,i)=>{
          const o=ctx.createOscillator(),g=ctx.createGain();
          o.connect(g);g.connect(ctx.destination);o.type="sine";o.frequency.value=f;
          const t=ctx.currentTime+i*0.18;

      if(tieneRapido) return 100;
      if(tieneDetalle) return 100;

              const ct=min<5?"#22c55e":min<15?"#f59e0b":min<30?"#f97316":"#ef4444";
              return(
                <div key={o._fbKey} style={{background:"var(--bg)",borderRadius:10,padding:"9px 11px",marginBottom:6,borderLeft:`3px solid ${ct}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontSize:9,fontWeight:800,color:ct}}>{o.ot_id}</div>
                    <div style={{fontSize:10,fontWeight:900,color:ct}}>{min<1?"Ahora":`${min}m`}</div>
                  </div>
                  <div style={{fontSize:11,fontWeight:800,color:"var(--text)",marginTop:2,lineHeight:1.3}}>{o.loc}</div>
                </div>
              );
            })}
            {otsPendientes.length>4&&<div style={{fontSize:9,color:"var(--muted)",textAlign:"center",marginTop:4}}>+{otsPendientes.length-4} más</div>}
          </div>
        )}

        {/* Tendencia 7 días mini */}
        {(()=>{
          const dias=[];
          for(let i=6;i>=0;i--){
            const d=new Date();d.setDate(d.getDate()-i);
            const f=d.toLocaleDateString("es");
            dias.push({f,n:history.filter(h=>h.FECHA===f).length,d:d.toLocaleDateString("es",{weekday:"short"})});
          }
          const mx=Math.max(...dias.map(x=>x.n),1);
          return(
            <div className="rp-card">
              <div className="rp-title">📈 7 días</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:4,height:48}}>
                {dias.map((d,i)=>(
                  <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                    <div style={{width:"100%",height:Math.round((d.n/mx)*42)+2,background:d.f===hoy?"var(--accent)":"#a855f7",borderRadius:3,minHeight:2,opacity:d.f===hoy?1:0.5}}/>
                    <div style={{fontSize:7,fontWeight:700,color:d.f===hoy?"var(--accent)":"var(--muted)"}}>{d.f===hoy?"hoy":d.d}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        })()}

        {/* Módulos activos rápidos */}
        {(()=>{
          const mods=[...new Set(hoyH.map(r=>r.MODULO))].slice(0,6);
          if(mods.length===0) return null;
          return(
            <div className="rp-card">
              <div className="rp-title">📦 Actividad por módulo</div>
              {mods.map(mod=>{
                const m=MODS.find(x=>x.label===mod);
                const n=hoyH.filter(r=>r.MODULO===mod).length;
                const mx2=Math.max(...mods.map(mod2=>hoyH.filter(r=>r.MODULO===mod2).length),1);
                return(
                  <div key={mod} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <span style={{fontSize:14,flexShrink:0}}>{m?.icon||"📋"}</span>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                        <span style={{fontSize:9,fontWeight:700,color:"var(--text)"}}>{mod}</span>
                        <span style={{fontSize:10,fontWeight:900,color:m?.color||"var(--accent)"}}>{n}</span>
                      </div>
                      <div style={{height:3,background:"var(--border)",borderRadius:2,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${Math.round((n/mx2)*100)}%`,background:m?.color||"var(--accent)",borderRadius:2}}/>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })()}

      </div>
    )}{/* end .desktop-right */}

  </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
