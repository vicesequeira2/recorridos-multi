        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

        const app = initializeApp(firebaseConfig);
        const db  = getDatabase(app);

        // Presencia: registrar este usuario y borrar al desconectarse

        set(presenceRef, { activo: true, ts: Date.now(), nombre: "" });

        window._fb = { db, ref, push, onValue, remove, set, get, sessionId, presenceRef };

        .btn-sec{width:100%;padding:12px;margin-top:10px;background:transparent;border-radius:10px;font-weight:700;cursor:pointer;}

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Datos ─────────────────────────────────────────────────────────── */
const CAJEROS  = ["Siman Sotano","Hooligan's Izq","Holligan's Cen","Hooligan's Der","Siman Terraza","Rosti","Katrin izq","Universal","Chilis izq","Chilis der","Katrin der"];
const ENTRADAS = ["Entrada Nesting","Entrada 2 Zapote","Entrada 1 Zapote","Entrada 1 Arturo Calle","Entrada 2 Arturo Calle","Entrada 2 Rosti","Entrada 1 Katrin","Entrada 2 Katrin","Entrada 1 Rosti"];
const SALIDAS  = ["SALIDA NESTING","SALIDA 2 ZAPOTE","SALIDA 1 ZAPOTE","Salida 1 Arturo Calle","Salida 2 Arturo Calle","SALIDA REVERSIBLE ARTURO CALLE","SALIDA 1 ROSTI","Salida 2 Roti","SALIDA UNIVERSAL"];

const MODULOS = [
    {id:"cajero",    label:"Cajero",           icon:"🏧", color:"#0ea5e9"},
    {id:"entrada",   label:"Entrada",           icon:"🚗", color:"#22c55e"},
    {id:"salida",    label:"Salida",            icon:"🚦", color:"#f97316"},
    {id:"indicador", label:"Indicador",         icon:"⏱",  color:"#a855f7"},
    {id:"ot",        label:"Orden Trabajo (OT)",icon:"🔧", color:"#f43f5e"},
    {id:"limpieza",  label:"Limpieza",          icon:"🧹", color:"#fbbf24"},
];

const CHECKS_CAJERO  = [{id:'ups',label:'UPS'},{id:'dat',label:'Datafono'},{id:'mini',label:'Mini PC'},{id:'qr',label:'Lector QR'},{id:'imp',label:'Impresora'},{id:'pap',label:'Papel'},{id:'lim_chk',label:'Limpieza'},{id:'anc',label:'Anclaje'},{id:'pan',label:'Pantalla'},{id:'int',label:'Intercom'}];
const CHECKS_ENTRADA = [{id:'asta',label:'Asta'},{id:'loop',label:'Loop'},{id:'imp_ent',label:'Impresora'},{id:'tiq',label:'Tiquetes'},{id:'lpr_ent',label:'LPR'},{id:'ctr',label:'Cam Trasera'},{id:'cfr',label:'Cam Frontal'},{id:'ups_ent',label:'UPS'}];
const CHECKS_SALIDA  = [{id:'asta_sal',label:'Asta'},{id:'loop_sal',label:'Loop'},{id:'qr_sal',label:'Lector QR'},{id:'lpr_sal',label:'LPR'},{id:'ctr_sal',label:'Cam Trasera'},{id:'cfr_sal',label:'Cam Frontal'},{id:'ups_sal',label:'UPS'}];
const ALL_CHECKS = [...CHECKS_CAJERO,...CHECKS_ENTRADA,...CHECKS_SALIDA];

// Sanitizar claves para Firebase (elimina . # $ / [ ])
const fbKey = str => str.replace(/[.#$\/\[\]]/g, '_');

/* ── Usuarios ───────────────────────────────────────────────────────── */
const USUARIOS = [
    { nombre: "Christopher", password: "1",    rol: "Técnico"      },
    { nombre: "Gustavo",     password: "2",    rol: "Ciclo"        },
    { nombre: "Vicente",     password: "admi", rol: "Administrador"},
    { nombre: "Joel",        password: "3",    rol: "Coordinador"  },
    { nombre: "Geovanny",    password: "4",    rol: "Recorridos"   },
    { nombre: "Monitoreo",   password: "5",    rol: "Monitoreo"    },
];

/* ── App ────────────────────────────────────────────────────────────── */
function App() {
    const [usuario,  setUsuario]  = useState(null);      // usuario logueado
    const [activeUsers, setActiveUsers] = useState(1);
    const [onlineUsers, setOnlineUsers] = useState([]);
    const [selectedModDash, setSelectedModDash] = useState(null);
    const [ready,   setReady]   = useState(false);   // Firebase listo
    const [screen,  setScreen]  = useState("home");
    const [modulo,  setModulo]  = useState(null);
    const [form,    setForm]    = useState({});
    const [history, setHistory] = useState([]);
    const [activeOTs, setActiveOTs] = useState([]);
    const [timer,   setTimer]   = useState(0);
    const [timerOn, setTimerOn] = useState(false);
    const [sync,    setSync]    = useState("ok");     // ok | busy | err
    const [newKeys, setNewKeys] = useState(new Set());

    const timerRef = useRef(null);
    const prevLen  = useRef(0);
    const fbReady  = useRef(false);

    /* Esperar a que Firebase module cargue */
    useEffect(() => {
        const check = setInterval(() => {
            if (window._fb) {
                clearInterval(check);
                fbReady.current = true;
                setReady(true);
            }
        }, 100);
        return () => clearInterval(check);
    }, []);

    /* Notificación del sistema */
    const sendNotification = useCallback((titulo, cuerpo) => {
        // En GitHub Pages usar solo alerta visual interna (sin Notification API)
        // El sonido y vibración se manejan por playOTSound
    }, []);

    const [otAlert, setOtAlert] = useState(null); // {loc, det}
    const prevOTCount = useRef(0);
    const audioCtxRef = useRef(null);

    /* Desbloquear AudioContext en primer toque de usuario */
    useEffect(() => {
        const unlock = () => {
            if (!audioCtxRef.current) {
                audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtxRef.current.state === 'suspended') {
                audioCtxRef.current.resume();
            }
            document.removeEventListener('touchstart', unlock);
            document.removeEventListener('click', unlock);
        };
        document.addEventListener('touchstart', unlock, { passive: true });
        document.addEventListener('click', unlock);
        return () => {
            document.removeEventListener('touchstart', unlock);
            document.removeEventListener('click', unlock);
        };
    }, []);

    /* Sonido OT — funciona en móvil */
    const playOTSound = useCallback(() => {
        // Método 1: AudioContext (si ya fue desbloqueado)
        try {
            const ctx = audioCtxRef.current || new (window.AudioContext || window.webkitAudioContext)();
            audioCtxRef.current = ctx;
            if (ctx.state === 'suspended') ctx.resume();

            const notes = [523, 659, 784, 1047];
            notes.forEach((freq, i) => {
                const osc  = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.value = freq;
                const t = ctx.currentTime + i * 0.18;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.5, t + 0.05);
                gain.gain.linearRampToValueAtTime(0, t + 0.2);
                osc.start(t);
                osc.stop(t + 0.22);
            });
        } catch(e) {}

        // Método 2: Audio HTML elemento como respaldo
        try {
            // Genera un tono simple en base64 WAV (beep 880Hz)
            const wav = "UklGRnoGAABXQVZFZm10IBAAAA" +
                "EAAQAAgD4AAACAACABAAEASWH" +
                "ZmYmJiYmJiYmJiYmJiYmJiYm" +
                "JiYmJiYmJiYmJiYmJiYmJiYm" +
                "JiYmJiYmJiYmJiYmJiYmJiYm";
            const audio = new Audio();
            // Tono generado dinámicamente
            const sampleRate = 44100;
            const duration = 0.3;
            const frequency = 880;
            const numSamples = sampleRate * duration;
            const buffer = new ArrayBuffer(44 + numSamples * 2);
            const view = new DataView(buffer);
            const writeStr = (o, s) => { for(let i=0;i<s.length;i++) view.setUint8(o+i, s.charCodeAt(i)); };
            writeStr(0, 'RIFF');
            view.setUint32(4, 36 + numSamples * 2, true);
            writeStr(8, 'WAVE');
            writeStr(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeStr(36, 'data');
            view.setUint32(40, numSamples * 2, true);
            for (let i = 0; i < numSamples; i++) {
                const t2 = i / sampleRate;
                const envelope = Math.min(1, (duration - t2) / 0.1);
                const sample = Math.sin(2 * Math.PI * frequency * t2) * 0.6 * envelope;
                view.setInt16(44 + i * 2, sample * 32767, true);
            }
            const blob = new Blob([buffer], { type: 'audio/wav' });
            audio.src = URL.createObjectURL(blob);
            audio.volume = 1.0;
            audio.play().catch(() => {});
        } catch(e) {}

        // Método 3: Vibración
        try { navigator.vibrate && navigator.vibrate([150, 80, 150, 80, 300]); } catch(e) {}
    }, []);

    /* Suscripción en tiempo real a Firebase */
    useEffect(() => {
        if (!ready) return;
        const { db, ref, onValue } = window._fb;

        // Historial
        const unsubH = onValue(ref(db, "registros"), snap => {
            const data = snap.val();
            if (!data) { setHistory([]); prevLen.current = 0; return; }
            const arr = Object.entries(data)
                .map(([k,v]) => ({...v, _fbKey: k}))
                .sort((a,b) => (b._ts||0) - (a._ts||0));

            // Resaltar registros nuevos
            if (arr.length > prevLen.current && prevLen.current > 0) {
                const fresh = arr.slice(0, arr.length - prevLen.current).map(r => r._fbKey);
                setNewKeys(new Set(fresh));
                setTimeout(() => setNewKeys(new Set()), 2500);
            }
            prevLen.current = arr.length;
            setHistory(arr);
        });

        // OTs activas
        const unsubOT = onValue(ref(db, "activeOTs"), snap => {
            const data = snap.val();
            if (!data) { setActiveOTs([]); prevOTCount.current = 0; return; }
            const arr = Object.entries(data).map(([k,v]) => ({...v, _fbKey: k}));
            if (arr.length > prevOTCount.current && prevOTCount.current > 0) {
                playOTSound();
                const nueva = arr[arr.length - 1];
                sendNotification("🔧 NUEVA ORDEN DE TRABAJO", `📍 ${nueva?.loc || ""}\n${nueva?.det || ""}`);
                setOtAlert({ loc: nueva?.loc, det: nueva?.det });
                setTimeout(() => setOtAlert(null), 6000);
            }
            prevOTCount.current = arr.length;
            setActiveOTs(arr);
        });

        // Presencia en tiempo real
        const unsubP = onValue(ref(db, "presencia"), snap => {
            const data = snap.val();
            const list = data ? Object.values(data) : [];
            setActiveUsers(list.length || 1);
            setOnlineUsers(list.map(v => v.nombre).filter(Boolean));
        });

        return () => { unsubH(); unsubOT(); unsubP(); };
    }, [ready]);

    /* Helpers */
    const setField = (k,v) => setForm(f => ({...f,[k]:v}));

    const openModule = (m, preData={}) => {
        setModulo(m);
        const otId = preData.ot_id || (m.id==='ot' ? "OT-"+Math.random().toString(36).substr(2,4).toUpperCase() : null);
        setForm({ot_tipo: preData.ot_tipo||"ABRIR ORDEN DE TRABAJO", ot_id: otId, ...preData});
        setTimer(0); setTimerOn(false);
        if(timerRef.current) clearInterval(timerRef.current);
        setScreen("form");
    };

    const toggleTimer = () => {
        if (timerOn) {
            clearInterval(timerRef.current);
            setField("timer_val", (timer/1000).toFixed(2));
        } else {
            const s = Date.now() - timer;
            timerRef.current = setInterval(() => setTimer(Date.now()-s), 10);
        }
        setTimerOn(!timerOn);
    };

    const calcProgress = () => {
        if (!modulo) return 0;
        if (form.ot_tipo==="CERRAR ORDEN DE TRABAJO") return form.ot_detalle ? 100 : 50;
        let total=1, answered=0;
        if (form.cajero||form.entrada||form.salida||form.lim_loc||form.ot_ubicacion||form.ind_loc) answered++;
        if (modulo.id==='limpieza'){total+=2; if(form.lim_cat) answered++; if(form.lim_estado) answered++;}
        const chk = modulo.id==='cajero'?CHECKS_CAJERO:modulo.id==='entrada'?CHECKS_ENTRADA:modulo.id==='salida'?CHECKS_SALIDA:[];
        chk.forEach(c=>{total++; if(form[c.id]) answered++;});
        if(modulo.id==='indicador'){total++; if(form.timer_val) answered++;}
        if(modulo.id==='ot'){total++; if(form.ot_detalle) answered++;}
        return Math.round((answered/total)*100);
    };

    /* Guardar en Firebase */
    const save = async () => {
        if (!fbReady.current) { alert("Firebase aún no listo, intenta de nuevo."); return; }
        setSync("busy");
        const { db, ref, push, set, get } = window._fb;
        const now = new Date();
        const loc = form.lim_loc||form.ot_ubicacion||form.cajero||form.entrada||form.salida||form.ind_loc||"General";
        const checkRes = {};
        ALL_CHECKS.forEach(c => { if(form[c.id]) checkRes[fbKey(c.label)]=form[c.id]; });

        const record = {
            _ts:      Date.now(),
            USUARIO:  usuario.nombre,
            ROL:      usuario.rol,
            ORDEN_ID: form.ot_id||"-",
            FECHA:    now.toLocaleDateString("es"),
            HORA:     now.toLocaleTimeString("es"),
            MODULO:   modulo.label,
            ACCION:   modulo.id==='ot' ? form.ot_tipo : "REVISIÓN",
            UBICACION:loc,
            RESULTADO:modulo.id==='indicador' ? `${form.timer_val}s` : (modulo.id==='limpieza'?"LIMPIO":"OK"),
            NOTAS:    form.ot_detalle||form.obs||"-",
            ...checkRes
        };

        try {
            // Guardar registro
            await push(ref(db,"registros"), record);

            // Manejar OTs
            if (modulo.id==='ot') {
                if (form.ot_tipo==="CERRAR ORDEN DE TRABAJO") {
                    // Buscar y eliminar la OT activa
                    const snap = await get(ref(db,"activeOTs"));
                    if(snap.val()) {
                        Object.entries(snap.val()).forEach(async ([k,v]) => {
                            if(v.ot_id===form.ot_id) {
                                const { remove } = window._fb;
                                await remove(ref(db,`activeOTs/${k}`));
                            }
                        });
                    }
                } else {
                    await push(ref(db,"activeOTs"), {
                        ot_id: form.ot_id, loc, det: form.ot_detalle||form.ot_tipo,
                        fecha: record.FECHA, _ts: Date.now()
                    });
                    playOTSound();
                    sendNotification(
                        "🔧 ORDEN DE TRABAJO ABIERTA",
                        `📍 ${loc}\n${form.ot_detalle||form.ot_tipo||""}`
                    );
                }
            }
            setSync("ok");
            setScreen("success");
        } catch(e) {
            console.error(e);
            setSync("err");
            alert("Error al guardar: " + e.message);
        }
    };

    /* Descargar Excel y limpiar Firebase */
    const handleDownload = async () => {
        const pw = prompt("Ingrese la clave de acceso:");
        if (pw !== "2026") { if(pw!==null) alert("Clave incorrecta."); return; }

        // Columnas fijas en orden
        const COLS = ["USUARIO","ROL","FECHA","HORA","MODULO","ACCION","ORDEN_ID","UBICACION","RESULTADO","NOTAS"];

        // Construir filas ordenadas
        const rows = history.map(({_fbKey,_ts,...r}) => {
            const row = {};
            COLS.forEach(c => { row[c] = r[c] || "-"; });
            // Checks adicionales al final
            Object.keys(r).forEach(k => { if (!COLS.includes(k)) row[k] = r[k]; });
            return row;
        });

        const ws = XLSX.utils.json_to_sheet(rows, { header: [...COLS, ...Object.keys(rows[0]||{}).filter(k=>!COLS.includes(k))] });

        // Ancho de columnas
        const colWidths = Object.keys(rows[0]||{}).map(k => ({ wch: Math.max(k.length, 14) }));
        ws['!cols'] = colWidths;

        // Estilo de encabezado (fila 1)
        const range = XLSX.utils.decode_range(ws['!ref'] || "A1");
        for (let C = range.s.c; C <= range.e.c; C++) {
            const cell = XLSX.utils.encode_cell({ r: 0, c: C });
            if (!ws[cell]) continue;
            ws[cell].s = {
                font:    { bold: true, color: { rgb: "FFFFFF" } },
                fill:    { fgColor: { rgb: "0D6EFD" } },
                alignment: { horizontal: "center", vertical: "center" },
                border: {
                    top:    { style: "thin", color: { rgb: "CCCCCC" } },
                    bottom: { style: "thin", color: { rgb: "CCCCCC" } },
                    left:   { style: "thin", color: { rgb: "CCCCCC" } },
                    right:  { style: "thin", color: { rgb: "CCCCCC" } },
                }
            };
        }

        // Bordes en todas las celdas de datos
        for (let R = range.s.r + 1; R <= range.e.r; R++) {
            for (let C = range.s.c; C <= range.e.c; C++) {
                const cell = XLSX.utils.encode_cell({ r: R, c: C });
                if (!ws[cell]) ws[cell] = { t: "s", v: "-" };
                ws[cell].s = {
                    alignment: { vertical: "center" },
                    fill: { fgColor: { rgb: R % 2 === 0 ? "EBF3FF" : "FFFFFF" } },
                    border: {
                        top:    { style: "thin", color: { rgb: "CCCCCC" } },
                        bottom: { style: "thin", color: { rgb: "CCCCCC" } },
                        left:   { style: "thin", color: { rgb: "CCCCCC" } },
                        right:  { style: "thin", color: { rgb: "CCCCCC" } },
                    }
                };
            }
        }

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Reporte");
        XLSX.writeFile(wb, `recorridos_${new Date().toLocaleDateString("es").replace(/\//g,"-")}.xlsx`, { cellStyles: true });

        // Borrar de Firebase
        const { db, ref, set } = window._fb;
        await set(ref(db,"registros"), null);
        await set(ref(db,"activeOTs"), null);
    };

    const progress  = calcProgress();
    const isStrict  = ["cajero","entrada","salida","limpieza"].includes(modulo?.id);
    const dotClass  = sync==="busy"?"dot-busy":sync==="err"?"dot-err":"dot-ok";

    /* Reloj en tiempo real */
    const [clock, setClock] = useState("");
    useEffect(() => {
        const tick = () => {
            const n = new Date();
            setClock(n.toLocaleTimeString("es", {hour:'2-digit', minute:'2-digit', second:'2-digit'}));
        };
        tick();
        const id = setInterval(tick, 1000);
        return () => clearInterval(id);
    }, []);

    if (!ready) return (
        <div className="centered">
            <div style={{fontSize:36}}>🔄</div>
            <p style={{marginTop:16,color:'var(--muted)',fontWeight:700}}>Conectando con Firebase...</p>
        </div>
    );

    if (!usuario) return <LoginScreen onLogin={(u) => {
        setUsuario(u);
        if (window._fb) {
            const { presenceRef, set } = window._fb;
            set(presenceRef, { activo: true, ts: Date.now(), nombre: u.nombre });
        }
    }} />;

    const MODULOS_RESTRINGIDOS = ["cajero","entrada","salida"];
    const USUARIOS_PERMITIDOS  = ["Vicente","Geovanny","Christopher"];
    const SOLO_OT              = ["Monitoreo"];
    const puedeAcceder = (m) => {
        if (SOLO_OT.includes(usuario.nombre)) return m.id === "ot";
        return !MODULOS_RESTRINGIDOS.includes(m.id) || USUARIOS_PERMITIDOS.includes(usuario.nombre);
    };

    return (
        <div className="shell">

            {/* ── BANNER ALERTA OT ─────────────────────────────────── */}
            {otAlert && (
                <div className="fade-in" style={{position:'absolute',top:0,left:0,right:0,zIndex:999,background:'linear-gradient(135deg,#ef4444,#b91c1c)',padding:'14px 18px',boxShadow:'0 4px 20px #ef444460',display:'flex',alignItems:'center',gap:12}}>
                    <div style={{fontSize:26,animation:'pulse 0.5s infinite'}}>🔧</div>
                    <div style={{flex:1}}>
                        <div style={{fontSize:12,fontWeight:900,color:'white',letterSpacing:0.5}}>¡NUEVA ORDEN DE TRABAJO!</div>
                        <div style={{fontSize:11,color:'#fecaca',marginTop:2}}>📍 {otAlert.loc}</div>
                        {otAlert.det && <div style={{fontSize:10,color:'#fca5a5',marginTop:1}}>{otAlert.det}</div>}
                    </div>
                    <button onClick={()=>setOtAlert(null)} style={{background:'#ffffff30',border:'none',color:'white',fontWeight:900,fontSize:12,padding:'6px 10px',borderRadius:8,cursor:'pointer'}}>✕</button>
                </div>
            )}
            {screen==="home" && (
                <div className="fade-in" style={{height:'100%',display:'flex',flexDirection:'column'}}>
        <div className="watermark">— VICENTE.S —</div>
                    <div className="hdr">
                        <div className="hdr-row">
                            <div className="brand">RECORRIDO <span>MULTI</span> <span style={{fontSize:9,color:'var(--muted)',fontWeight:600}}>v2.1</span></div>
                            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
                                <div className="sync-row">
                                    <div className={`dot ${dotClass}`}></div>
                                    <span className="sync-label">EN VIVO</span>
                                    <span style={{fontSize:10,color:'#22c55e',fontWeight:900,marginLeft:8}}>{history.length} REG</span>
                                    <span style={{fontSize:10,fontWeight:900,marginLeft:8,color:'#a855f7',background:'#a855f715',padding:'2px 7px',borderRadius:20}}>👤 {activeUsers}</span>

                                <div style={{display:'flex',alignItems:'center',gap:6}}>

                                    </div>

                                        <p style={{fontSize:12,color:'#94a3b8'}}>{o.det}</p>

                        {/* ── MINI DASHBOARD ── */}
                        {(() => {

                                label: m.label, icon: m.icon, color: m.color,

                            })).filter(m => m.total > 0);
                            const porUsuario = {};
                            hoy_h.forEach(h => { if(h.USUARIO) porUsuario[h.USUARIO] = (porUsuario[h.USUARIO]||0)+1; });
                            const otsPend = activeOTs.length;
                            const detalleMod = selectedModDash ? hoy_h.filter(h => h.MODULO === selectedModDash) : [];
                            return (
                                <div style={{marginTop:18}}>
                                    <div className="label-sec">📊 RESUMEN DEL DÍA</div>
                                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
                                        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:'12px 8px',textAlign:'center'}}>
                                            <div style={{fontSize:22,fontWeight:900,color:'var(--accent)'}}>{hoy_h.length}</div>
                                            <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,marginTop:2}}>TOTAL HOY</div>
                                        </div>
                                        <div style={{background:'var(--card)',border:'1px solid #ef444440',borderRadius:12,padding:'12px 8px',textAlign:'center'}}>
                                            <div style={{fontSize:22,fontWeight:900,color:'#ef4444'}}>{otsPend}</div>
                                            <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,marginTop:2}}>OTs ABIERTAS</div>
                                        </div>
                                        <div style={{background:'var(--card)',border:'1px solid #22c55e40',borderRadius:12,padding:'12px 8px',textAlign:'center'}}>
                                            <div style={{fontSize:22,fontWeight:900,color:'#22c55e'}}>{Object.keys(porUsuario).length}</div>
                                            <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,marginTop:2}}>USUARIOS</div>
                                        </div>
                                    </div>

                                    {/* Actividad por módulo — clickable */}
                                    {porModulo.length > 0 && (
                                        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:'12px 14px',marginBottom:10}}>
                                            <div style={{fontSize:9,fontWeight:900,color:'var(--muted)',letterSpacing:1,marginBottom:8}}>ACTIVIDAD POR MÓDULO · toca para ver detalle</div>
                                            {porModulo.map(m => (
                                                <div key={m.label}
                                                    onClick={()=>setSelectedModDash(selectedModDash===m.label?null:m.label)}
                                                    style={{display:'flex',alignItems:'center',gap:8,marginBottom:6,cursor:'pointer',padding:'4px 6px',borderRadius:8,background:selectedModDash===m.label?`${m.color}15`:'transparent',border:selectedModDash===m.label?`1px solid ${m.color}40`:'1px solid transparent'}}>
                                                    <span style={{fontSize:14}}>{m.icon}</span>
                                                    <span style={{fontSize:11,fontWeight:700,flex:1,color:selectedModDash===m.label?m.color:'var(--text)'}}>{m.label}</span>
                                                    <div style={{flex:2,background:'var(--border)',borderRadius:10,height:6,overflow:'hidden'}}>
                                                        <div style={{height:'100%',borderRadius:10,background:m.color,width:`${Math.min((m.total/Math.max(...porModulo.map(x=>x.total)))*100,100)}%`,transition:'width .5s'}}></div>
                                                    </div>
                                                    <span style={{fontSize:11,fontWeight:900,color:m.color,minWidth:16,textAlign:'right'}}>{m.total}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {/* Detalle del módulo seleccionado */}
                                    {selectedModDash && detalleMod.length > 0 && (
                                        <div className="fade-in" style={{background:'var(--card)',border:`1px solid ${porModulo.find(m=>m.label===selectedModDash)?.color||'var(--border)'}40`,borderRadius:12,padding:'12px 14px',marginBottom:10}}>
                                            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                                                <div style={{fontSize:9,fontWeight:900,color:'var(--muted)',letterSpacing:1}}>DETALLE · {selectedModDash}</div>
                                                <button onClick={()=>setSelectedModDash(null)} style={{background:'none',border:'none',color:'var(--muted)',fontSize:12,cursor:'pointer'}}>✕ cerrar</button>

                                                    <div style={{flex:2,background:'var(--border)',borderRadius:10,height:6,overflow:'hidden'}}>

                                                    <span style={{fontSize:11,fontWeight:900,color:'#a855f7',minWidth:16,textAlign:'right'}}>{n}</span>

                                        {form.ind_cat && <SelectorEstado
                                            label="Equipo"
                                            items={form.ind_cat==="Cajeros"?CAJEROS:form.ind_cat==="Entradas"?ENTRADAS:SALIDAS}
                                            active={form.ind_loc}
                                            onSelect={v=>setField('ind_loc',v)}
                                            done={history
                                                .filter(h => h.USUARIO===usuario.nombre && h.MODULO==="Indicador")
                                                .map(h => h.UBICACION)}
                                        />}
                                        <div className="timer-val">{(timer/1000).toFixed(2)}s</div>
                                        <button className={`btn-timer ${timerOn?'stop':'start'}`} onClick={toggleTimer}>{timerOn?'DETENER':'INICIAR'}</button>
                                    </>
                                )}
                                {modulo.id==='ot' && (
                                    <>
                                        <Selector label="Acción" items={["ABRIR ORDEN DE TRABAJO","CAMBIO DE TIQUETE","CAMBIO DE ROLLO"]} active={form.ot_tipo} onSelect={v=>{setField('ot_tipo',v);setField('ot_area',v.includes("TIQUETE")?"ENTRADAS":v.includes("ROLLO")?"CAJEROS":null);}} />
                                        {form.ot_tipo==="ABRIR ORDEN DE TRABAJO" && <Selector label="Área" items={["CAJEROS","ENTRADAS","SALIDAS","GUIADO","OTRO"]} active={form.ot_area} onSelect={v=>{setField('ot_area',v);setField('ot_ubicacion',null);}} />}
                                        {form.ot_area && !["GUIADO","OTRO"].includes(form.ot_area) && <Selector label="Equipo" items={form.ot_area==="CAJEROS"?CAJEROS:form.ot_area==="ENTRADAS"?ENTRADAS:SALIDAS} active={form.ot_ubicacion} onSelect={v=>setField('ot_ubicacion',v)} />}
                                        <div className="label-sec">DETALLE TÉCNICO</div>
                                        <textarea className="input-f" placeholder="Describe el problema técnico..." onChange={e=>setField('ot_detalle',e.target.value)}></textarea>
                                    </>
                                )}
                                {modulo.id==='limpieza' && (
                                    <>
                                        <Selector label="Categoría" items={["Cajeros","Salidas"]} active={form.lim_cat} onSelect={v=>{setField('lim_cat',v);setField('lim_loc',null);}} />
                                        {form.lim_cat && <SelectorConteo
                                            label="Equipo"
                                            items={form.lim_cat==="Cajeros"?["Katrin","Rosti","Hooligan","Chillis","Universal","Siman"]:["ZAPOTE","Arturo Calle","Rosti","universal"]}
                                            active={form.lim_loc}
                                            onSelect={v=>setField('lim_loc',v)}
                                            counts={history
                                                .filter(h => h.USUARIO===usuario.nombre && h.MODULO==="Limpieza")
                                                .reduce((acc,h)=>{ acc[h.UBICACION]=(acc[h.UBICACION]||0)+1; return acc; }, {})}
                                        />}
                                        <Selector label="Estado" items={["LIMPIO"]} active={form.lim_estado} onSelect={v=>setField('lim_estado',v)} />
                                    </>
                                )}
                                {["cajero","entrada","salida"].includes(modulo.id) && (
                                    <>
                                        <SelectorEstado
                                            label="Ubicación"
                                            items={modulo.id==='cajero'?CAJEROS:modulo.id==='entrada'?ENTRADAS:SALIDAS}
                                            active={form[modulo.id]}
                                            onSelect={v=>setField(modulo.id,v)}
                                            done={history
                                                .filter(h => h.USUARIO===usuario.nombre && h.MODULO===modulo.label)
                                                .map(h => h.UBICACION)}
                                        />
                                        {(modulo.id==='cajero'?CHECKS_CAJERO:modulo.id==='entrada'?CHECKS_ENTRADA:CHECKS_SALIDA).map(c=>(
                                            <div key={c.id} className="check-card">
                                                <b>{c.label}</b>
                                                <div className="check-btns">
                                                    <button className={form[c.id]==='SI'?'active-si':''} onClick={()=>setField(c.id,'SI')}>SI</button>
                                                    <button className={form[c.id]==='NO'?'active-no':''} onClick={()=>setField(c.id,'NO')}>NO</button>
                                                </div>
                                            </div>
                                        ))}
                                    </>
                                )}
                                {modulo.id !== 'ot' && (
                                    <textarea className="input-f" rows="3" placeholder="Observaciones..." onChange={e=>setField('obs',e.target.value)}></textarea>
                                )}
                            </>
                        )}
                    </div>

                    <div className="footer-fixed">
                        <button className="btn-save" disabled={isStrict?progress<100:progress<40} onClick={save}>
                            {sync==='busy' ? '⏳ GUARDANDO...' : 'GUARDAR REGISTRO ✓'}
                        </button>
                        {/* Botón flotante extra de salida visible siempre */}
                        <button onClick={()=>setScreen("home")} style={{width:'100%',marginTop:10,padding:'13px',background:'transparent',border:'2px solid #ef444460',color:'#ef4444',borderRadius:14,fontWeight:900,fontSize:14,cursor:'pointer'}}>
                            ← VOLVER SIN GUARDAR
                        </button>
                    </div>
                </div>
            )}

            {/* ── ÉXITO ────────────────────────────────────────────── */}
            {screen==="success" && (
                <div className="centered fade-in">
                    <div style={{fontSize:70,marginBottom:8}}>✅</div>
                    <h2 style={{marginTop:12,fontSize:24}}>GUARDADO</h2>
                    <p style={{color:'var(--green)',fontSize:12,marginTop:8,fontWeight:700}}>
                        🟢 SINCRONIZADO · Todos lo ven ahora
                    </p>
                    <button className="btn-save" style={{marginTop:30,maxWidth:300,width:'100%'}} onClick={()=>setScreen("home")}>
                        ← VOLVER AL INICIO
                    </button>
                </div>
            )}

        </div>
    );
}

function Selector({label,items,active,onSelect}) {
    return (
        <div>
            <div className="label-sec">{label}</div>
            <div className="pill-grid">
                {items.map(i => (
                    <button key={i} className={`pill ${active===i?'active':''}`} onClick={()=>onSelect(i)}>{i}</button>
                ))}
            </div>
        </div>
    );
}

function SelectorEstado({label, items, active, onSelect, done=[]}) {
    return (
        <div>
            <div className="label-sec" style={{display:'flex',alignItems:'center',gap:8}}>
                {label}
                <span style={{fontSize:9,color:'var(--green)',fontWeight:700}}>
                    ✓ {done.length} realizado{done.length!==1?'s':''}
                </span>
            </div>
            <div className="pill-grid">
                {items.map(i => {
                    const hecho   = done.includes(i);
                    const selecto = active === i;
                    return (
                        <button key={i}
                            onClick={()=>onSelect(i)}
                            style={{
                                padding:'9px 13px',
                                borderRadius:20,
                                fontSize:11,
                                fontWeight:700,
                                cursor:'pointer',
                                border: selecto
                                    ? '2px solid var(--accent)'
                                    : hecho
                                    ? '1px solid #22c55e80'
                                    : '1px solid var(--border)',
                                background: selecto
                                    ? 'var(--accent)'
                                    : hecho
                                    ? '#22c55e18'
                                    : 'var(--card)',
                                color: selecto
                                    ? 'white'
                                    : hecho
                                    ? 'var(--green)'
                                    : 'var(--muted)',
                                position:'relative'
                            }}>
                            {hecho && !selecto && <span style={{marginRight:4}}>✓</span>}
                            {i}
                        </button>
                    );
                })}
            </div>
        </div>
    );
}

// Colores según número de veces: 0=gris, 1=verde, 2=azul, 3=naranja, 4+=morado
function SelectorConteo({label, items, active, onSelect, counts={}}) {
    const COLORES = [
        { bg:'var(--card)',   border:'var(--border)', text:'var(--muted)'  },  // 0
        { bg:'#22c55e18',    border:'#22c55e80',     text:'#22c55e'       },  // 1
        { bg:'#0ea5e918',    border:'#0ea5e980',     text:'#0ea5e9'       },  // 2
        { bg:'#f9731618',    border:'#f9731680',     text:'#f97316'       },  // 3
        { bg:'#a855f718',    border:'#a855f780',     text:'#a855f7'       },  // 4+
    ];
    return (
        <div>
            <div className="label-sec" style={{display:'flex',alignItems:'center',gap:8}}>
                {label}
                <span style={{fontSize:9,color:'var(--muted)',fontWeight:700}}>
                    🧹 = veces limpiado hoy
                </span>
            </div>
            <div className="pill-grid">
                {items.map(i => {
                    const n       = counts[i] || 0;
                    const col     = COLORES[Math.min(n, COLORES.length-1)];
                    const selecto = active === i;
                    return (
                        <button key={i}
                            onClick={()=>onSelect(i)}
                            style={{
                                padding:'9px 13px',
                                borderRadius:20,
                                fontSize:11,
                                fontWeight:700,
                                cursor:'pointer',
                                border:   selecto ? '2px solid var(--accent)' : `1px solid ${col.border}`,
                                background: selecto ? 'var(--accent)' : col.bg,
                                color:    selecto ? 'white' : col.text,
                                position: 'relative'
                            }}>
                            {i}
                            {n > 0 && !selecto && (
                                <span style={{
                                    position:'absolute', top:-6, right:-6,
                                    background: col.text, color:'white',
                                    borderRadius:'50%', width:16, height:16,
                                    fontSize:9, fontWeight:900,
                                    display:'flex', alignItems:'center', justifyContent:'center'
                                }}>{n}</span>
                            )}
                        </button>
                    );
                })}
            </div>
            <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
                {[{n:0,label:'Sin limpiar'},{n:1,label:'1 vez'},{n:2,label:'2 veces'},{n:3,label:'3 veces'},{n:'4+',label:'4+ veces'}].map(({n,label})=>{
                    const col = COLORES[Math.min(typeof n==='string'?4:n, COLORES.length-1)];
                    return <span key={n} style={{fontSize:9,fontWeight:700,color:col.text,background:col.bg,border:`1px solid ${col.border}`,padding:'2px 7px',borderRadius:10}}>{label}</span>;
                })}
            </div>
        </div>
    );
}

function LoginScreen({onLogin}) {
    const [selected, setSelected] = useState(null);
    const [password, setPassword] = useState("");
    const [error,    setError]    = useState("");
    const [showPw,   setShowPw]   = useState(false);

    const selectUser = (u) => { setSelected(u); setPassword(""); setError(""); };

    const handleLogin = () => {
        if (!selected) return;
        if (selected.password === password.trim()) { onLogin(selected); }
        else { setError("Contraseña incorrecta"); setTimeout(()=>setError(""), 2500); }
    };

    const ICONS = { "Técnico":"🔧", "Ciclo":"🔄", "Administrador":"👑", "Coordinador":"📋", "Recorridos":"🚶", "Monitoreo":"🖥" };

    return (
        <div className="shell" style={{overflowY:'auto'}}>
            <div className="watermark">— VICENTE.S —</div>
            <div className="fade-in" style={{padding:'24px 20px 40px'}}>
                <div style={{textAlign:'center',marginBottom:28}}>
                    <div style={{fontSize:38,marginBottom:6}}>🔐</div>
                    <div style={{fontSize:22,fontWeight:900}}>RECORRIDO <span style={{color:'var(--accent)'}}>MULTI</span></div>
                    <div style={{fontSize:11,color:'var(--muted)',marginTop:4,fontWeight:700}}>Selecciona tu usuario</div>
                    <div style={{fontSize:9,color:'#ffffff20',marginTop:2,fontWeight:700,letterSpacing:1}}>v2.1</div>
                </div>

                {/* Grid de usuarios */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:24}}>
                    {USUARIOS.map(u => {
                        const INFO = {
                            "Christopher": { icon:"🔧", color:"#0ea5e9", bg:"#0ea5e912" },
                            "Gustavo":      { icon:"🔄", color:"#22c55e", bg:"#22c55e12" },
                            "Vicente":      { icon:"🧠", color:"#f59e0b", bg:"#f59e0b12" },
                            "Joel":         { icon:"📋", color:"#a855f7", bg:"#a855f712" },
                            "Geovanny":     { icon:"👁",  color:"#f97316", bg:"#f9731612" },
                            "Monitoreo":    { icon:"🖥",  color:"#06b6d4", bg:"#06b6d412" },
                        };
                        const sel = selected?.nombre === u.nombre;
                        const inf = INFO[u.nombre] || { icon:"👤", color:"var(--accent)", bg:"#0ea5e912" };
                        return (
                            <div key={u.nombre}
                                onClick={()=>selectUser(u)}
                                style={{
                                    padding:'20px 10px 16px',
                                    borderRadius:16,
                                    border: sel ? `2px solid ${inf.color}` : '1px solid var(--border)',
                                    background: sel ? inf.bg : 'var(--card)',
                                    textAlign:'center',
                                    cursor:'pointer',
                                    transition:'all .2s',
                                    boxShadow: sel ? `0 0 16px ${inf.color}40` : 'none'
                                }}>
                                <div style={{
                                    fontSize:32,
                                    marginBottom:8,
                                    width:56,height:56,
                                    borderRadius:'50%',
                                    background: sel ? inf.bg : '#ffffff08',
                                    border:`2px solid ${sel?inf.color:'var(--border)'}`,
                                    display:'flex',alignItems:'center',justifyContent:'center',
                                    margin:'0 auto 10px'
                                }}>{inf.icon}</div>
                                <div style={{fontSize:13,fontWeight:900,color: sel ? inf.color : 'var(--text)'}}>{u.nombre}</div>
                            </div>
                        );
                    })}
                </div>

                {/* Campo contraseña — solo si hay usuario seleccionado */}
                {selected && (
                    <div className="fade-in">
                        <div style={{background:'#0ea5e910',border:'1px solid #0ea5e930',borderRadius:10,padding:'10px 14px',marginBottom:16,display:'flex',alignItems:'center',gap:10}}>
                            <div style={{fontSize:13,fontWeight:900,color:'var(--accent)'}}>{selected.nombre}</div>
                            <button onClick={()=>setSelected(null)} style={{marginLeft:'auto',background:'#ef444425',border:'1px solid #ef444460',color:'#ef4444',fontSize:14,fontWeight:900,cursor:'pointer',borderRadius:8,padding:'4px 10px'}}>✕ CAMBIAR</button>
                        </div>

                        <div className="label-sec">CONTRASEÑA</div>
                        <form onSubmit={e=>{e.preventDefault();handleLogin();}} autoComplete="on">
                            <input type="text" name="username" value={selected.nombre} readOnly style={{display:'none'}} autoComplete="username" />
                            <div style={{position:'relative',marginBottom:12}}>
                                <input
                                    className="input-f"
                                    style={{marginBottom:0,paddingRight:50}}
                                    type={showPw?"text":"password"}
                                    name="password"
                                    placeholder="Ingresa tu contraseña..."
                                    value={password}
                                    autoFocus
                                    autoComplete="current-password"
                                    onChange={e=>{setPassword(e.target.value);setError("");}}
                                    onKeyDown={e=>e.key==='Enter'&&handleLogin()}
                                />
                                <button type="button" onClick={()=>setShowPw(!showPw)} style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--muted)',fontSize:18,cursor:'pointer'}}>
                                    {showPw?'🙈':'👁'}
                                </button>
                            </div>
                            {error && (
                                <div style={{background:'#ef444420',border:'1px solid #ef444450',borderRadius:10,padding:'10px 15px',marginBottom:12,fontSize:12,fontWeight:700,color:'#ef4444',textAlign:'center'}}>
                                    ⚠️ {error}
                                </div>
                            )}
                            <button type="submit" className="btn-save">INGRESAR →</button>
                        </form>
                    </div>
                )}
            </div>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
