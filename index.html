<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ═══════ TOKENS ═══════ */
:root{
  /* Paleta profesional unificada */
  --bg:#05080f;--card:#0b1220;--accent:#38bdf8;--border:#162035;
  --text:#ddeeff;--muted:#4e6a85;--green:#22c55e;--red:#ef4444;
  --orange:#f97316;--purple:#a78bfa;--yellow:#fbbf24;
  /* Aliases */
  --card2:#0f1929;--border2:#1e3050;--text2:#a8c4d8;--text3:#4e6a85;
  --accent2:#38bdf8;--red2:#ef4444;
  --info:#38bdf808;--info-border:#38bdf825;
  /* Radii */
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:18px;--r-full:9999px;
  /* Typography */
  --font-xs:10px;--font-sm:12px;
  /* Shadows */
  --shadow-md:0 4px 24px #00000060;
  --shadow-accent:0 0 20px #38bdf820;
  /* Module card height */
  --mod-h:84px;
}

/* ═══════ RESET ═══════ */
*{box-sizing:border-box;margin:0;padding:0;font-family:'Barlow',sans-serif;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
input,textarea,select{user-select:text;-webkit-user-select:text;}
html,body{height:100%;height:100dvh;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-size:13px;}

/* ═══════ LAYOUT ═══════ */
.desktop-wrapper{display:flex;height:100vh;height:100dvh;width:100%;overflow:hidden;background:var(--bg);}
/* Shell: fill 100% on small phones, cap at 420px on larger */
.shell{
  width:100%;max-width:420px;margin:0 auto;
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;flex-shrink:0;
}
.desktop-sidebar{display:none;flex-direction:column;width:260px;flex-shrink:0;padding:24px 18px;background:#060b11;border-right:1px solid var(--border);overflow-y:auto;}
.desktop-right{display:none;flex:1;flex-direction:column;align-items:center;padding:24px 20px;overflow-y:auto;gap:14px;background:#060b11;border-left:1px solid var(--border);min-width:260px;max-width:380px;}

/* TABLET ≥ 600px */
@media(min-width:600px){
  .shell{max-width:600px;border-left:1px solid var(--border);border-right:1px solid var(--border);box-shadow:0 0 40px #0ea5e910;}
  .mod-grid{grid-template-columns:repeat(3,1fr)!important;}
  .scrollable{padding:16px;padding-bottom:140px;}
}

/* DESKTOP ≥ 1024px */
@media(min-width:1024px){
  .shell{max-width:540px;border-left:1px solid var(--border);border-right:1px solid var(--border);box-shadow:0 0 60px #0ea5e915;}
  .desktop-sidebar{display:flex;}
  .desktop-right{display:flex;}
  .mod-item:hover{transform:translateY(-2px);box-shadow:0 6px 20px #0ea5e920;}
}

/* ── Very small phones (≤ 375px) ── */
@media(max-width:375px){
  body{font-size:12px;}
  .check-card{padding:9px 10px;}
  .chk-btns button{padding:9px 11px;font-size:10px;}
  .label-sec{font-size:9px;margin:12px 0 8px;}
  .pill{padding:7px 10px;font-size:10px;}
  .btn-save{padding:12px;font-size:13px;}
  .scrollable{padding:10px;padding-bottom:130px;}
  .mod-item{padding:14px 8px 10px;}
  .mod-icon{font-size:20px;}
  .mod-name{font-size:10px;}
}

/* ═══════ WATERMARK ═══════ */
.watermark{font-size:11px;font-weight:900;color:#0ea5e9;letter-spacing:3px;text-align:center;padding:5px 0;background:#0ea5e912;border-bottom:1px solid #0ea5e930;}

/* ═══════ HEADER ═══════ */
.hdr{padding:10px 14px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;}
/* Home hero — compacto pero rico */
.home-hero{
  background:linear-gradient(160deg,#050b16 0%,#071220 60%,#09182e 100%);
  border-bottom:1px solid var(--border);
  padding:10px 14px 10px;
  flex-shrink:0;position:relative;overflow:hidden;
  transition:padding .25s ease;
}
.home-hero.collapsed{padding:0 14px;}
.home-hero.collapsed .hero-body{
  max-height:0;opacity:0;overflow:hidden;margin:0;padding:0;
  pointer-events:none;
}
.hero-body{
  max-height:200px;opacity:1;
  transition:max-height .28s ease,opacity .2s ease;
  overflow:hidden;
}
.home-hero::before{
  content:"";position:absolute;top:-60px;right:-40px;
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,#38bdf812 0%,transparent 70%);
  pointer-events:none;
}
/* Status bar — thin summary when collapsed */
.status-bar{
  display:flex;align-items:center;gap:8px;
  padding:5px 0;overflow:hidden;
  transition:max-height .25s ease,opacity .2s ease;
  max-height:0;opacity:0;
}
.home-hero.collapsed .status-bar{max-height:28px;opacity:1;}
/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;height:44px;}
.topbar-brand{display:flex;align-items:center;gap:8px;}
.topbar-logo{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,#0ea5e9,#6366f1);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;box-shadow:0 0 14px #0ea5e940;flex-shrink:0;
}
.topbar-title{font-size:15px;font-weight:900;letter-spacing:.5px;line-height:1;}
.topbar-title span{color:var(--accent);}
.topbar-sub{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:2px;margin-top:1px;}
.topbar-actions{display:flex;align-items:center;gap:6px;}

/* ═══════ SCROLLABLE ═══════ */
.scrollable{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;padding-bottom:150px;overscroll-behavior-y:contain;}
/* KPI cards */
.kpi-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px;}
.kpi-card{
  background:var(--card2);border:1px solid var(--border);
  border-radius:12px;padding:10px 6px;text-align:center;
  transition:border-color .15s;
}
.kpi-card.alert{border-color:#ef444440;background:#ef44440a;}
.kpi-val{font-size:20px;font-weight:900;line-height:1;}
.kpi-lbl{font-size:8px;font-weight:800;color:var(--muted);margin-top:3px;letter-spacing:.5px;text-transform:uppercase;}
/* User card */
.user-card{
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,#0f1e3020,#0f1e3010);
  border:1px solid #38bdf818;border-radius:12px;
  padding:9px 11px;margin-top:8px;
}
.user-avatar{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:19px;
}
/* Section header */
.sec-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin:16px 0 10px;
}
.sec-hdr-title{
  font-size:9px;font-weight:900;color:var(--muted);
  letter-spacing:1.5px;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;
}
.sec-hdr-title::after{content:"";width:30px;height:1px;background:var(--border);}
/* Admin panel scrollable — no footer button so less pb needed */
.admin-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;padding-bottom:24px;}

/* ═══════ LABELS ═══════ */
.label-sec{font-size:var(--font-xs);font-weight:800;color:var(--text3);margin:20px 0 12px;letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.label-sec::after{content:"";flex:1;height:1px;background:var(--border);}
/* Alerts summary pill */
.status-pill{
  display:flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:20px;
  font-size:9px;font-weight:900;letter-spacing:.3px;
  flex-shrink:0;
}
/* Donut chart container */
.donut-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.donut-label{position:absolute;text-align:center;line-height:1.1;}

/* ═══════ MODULE GRID ═══════ */
.mod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(min-width:480px){.mod-grid{grid-template-columns:repeat(3,1fr);gap:12px;}}
.mod-item{
  padding:0;border-radius:var(--r-xl);border:1px solid var(--border);
  text-align:center;cursor:pointer;background:var(--card);
  position:relative;transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease;
  overflow:hidden;height:var(--mod-h);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
}
.mod-item:active{transform:scale(.95);transition:transform .08s;}
.mod-item.accessible:hover{transform:translateY(-3px);box-shadow:0 8px 28px #00000050;}
.mod-icon{font-size:28px;line-height:1;display:block;}
.mod-name{font-size:11px;font-weight:800;letter-spacing:.3px;}
/* Screen transition */
.screen-enter{animation:screenIn .22s ease forwards;}
@keyframes screenIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
/* Save feedback */
@keyframes saveFlash{0%{background:#22c55e30;}50%{background:#22c55e60;}100%{background:transparent;}}
.save-flash{animation:saveFlash .6s ease forwards;}

/* ═══════ OT CARDS ═══════ */
.ot-card{background:#1e1111;border:1px solid #451010;padding:14px;border-radius:12px;margin-bottom:10px;border-left:4px solid #ef4444;position:relative;}
.ot-urgente{animation:otP 1.2s ease-in-out infinite;}
@keyframes otP{0%,100%{background:#1e1111;box-shadow:none}50%{background:#2d0a0a;box-shadow:0 0 20px #ef444460;}}
.ot-id-badge{position:absolute;top:8px;right:8px;font-size:9px;font-weight:900;color:#ef4444;background:#ef444420;padding:2px 6px;border-radius:4px;}
.btn-ot-close{background:var(--green);color:white;border:none;padding:10px;border-radius:8px;font-weight:800;font-size:11px;cursor:pointer;width:100%;margin-top:8px;}

/* ═══════ CHECK CARDS ═══════ */
.check-card{background:var(--card);border:1px solid var(--border);padding:11px 12px;border-radius:10px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.chk-btns{display:flex;gap:5px;flex-shrink:0;}
.check-card b{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;}
.chk-btns button{padding:10px 13px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-weight:800;font-size:11px;cursor:pointer;}
.asi{background:#22c55e15!important;border-color:var(--green)!important;color:var(--green)!important;}
.ano{background:#ef444415!important;border-color:var(--red)!important;color:var(--red)!important;}

/* ═══════ PILLS ═══════ */
.pill-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;max-width:100%;}
/* Extra space after last pill group so footer doesn't cover it */
.pill-grid:last-of-type{margin-bottom:28px;}
.pill{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:12px 16px;border-radius:22px;font-size:12px;font-weight:700;cursor:pointer;min-height:44px;display:inline-flex;align-items:center;}
.pill.active{background:var(--accent);color:white;border-color:var(--accent);}

/* ═══════ INPUTS ═══════ */
.inp{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;color:white;font-size:15px;margin-bottom:14px;outline:none;resize:none;}

/* ═══════ BUTTONS ═══════ */
.footer-fixed{
  position:absolute;bottom:0;left:0;right:0;
  padding:8px 12px;
  background:linear-gradient(transparent,var(--bg) 20%);
  z-index:10;
  padding-bottom:max(16px,env(safe-area-inset-bottom,16px));
}
.btn-save{
  width:100%;padding:13px;
  background:var(--green);color:white;border:none;
  border-radius:13px;font-weight:900;font-size:14px;
  cursor:pointer;letter-spacing:.2px;
}
.btn-save:disabled{opacity:.2;filter:grayscale(1);cursor:not-allowed;}
.btn-xl{width:100%;padding:14px;background:var(--accent);color:white;border-radius:12px;border:none;font-weight:800;margin-top:10px;cursor:pointer;}
.btn-lote-group{display:flex;gap:10px;margin-bottom:16px;}
.btn-lote{background:linear-gradient(135deg,#22c55e,#16a34a);color:white;border:none;padding:10px 16px;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;flex:1;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-lote-limpiar{background:linear-gradient(135deg,#64748b,#475569);}
.btn-lote:active{transform:scale(0.98);}
.btn-primary{background:var(--accent2);color:white;border:none;border-radius:var(--r-md);font-weight:800;cursor:pointer;transition:opacity .15s,transform .1s;}
.btn-primary:hover{opacity:.9;}
.btn-primary:active{transform:scale(.98);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:var(--r-md);font-weight:700;cursor:pointer;transition:all .15s;}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);background:var(--card2);}

/* ═══════ PROGRESS ═══════ */
.prog-wrap{position:sticky;top:0;background:var(--bg);z-index:5;padding:6px 0 10px;}
.prog-bar{height:8px;background:var(--border);border-radius:10px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);transition:width .3s;}

/* ═══════ TIMER ═══════ */
.t-val{font-size:50px;font-weight:900;text-align:center;margin:10px 0;}
.t-btn{width:100%;padding:15px;border-radius:10px;border:none;font-weight:900;cursor:pointer;margin-top:8px;}
.tstart{background:var(--accent);color:white;}.tstop{background:var(--red);color:white;}

/* ═══════ BADGES & STATES ═══════ */
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.dok{background:var(--green);animation:blink 2s infinite;}
.dbsy{background:#f59e0b;}
.derr{background:var(--red);}
.badge-ok{background:#22c55e20;color:#22c55e;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;}
.badge-no{background:#ef444420;color:#ef4444;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;}
.badge-warning{background:#f9731620;color:#f97316;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;}
.security-badge{background:#22c55e20;border:1px solid #22c55e40;border-radius:20px;padding:2px 8px;font-size:9px;color:#22c55e;font-weight:700;margin-left:6px;}
.stat-pill{background:var(--card2);border:1px solid var(--border);border-radius:var(--r-full);padding:5px 12px;font-size:var(--font-sm);font-weight:700;display:inline-flex;align-items:center;gap:5px;}

/* ═══════ NOTIFICATION CENTER ═══════ */
.notif-btn{position:relative;background:rgba(14,165,233,0.12);border:1px solid rgba(14,165,233,0.25);border-radius:var(--r-md);padding:7px 10px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;}
.notif-btn:hover{background:rgba(14,165,233,0.22);border-color:rgba(14,165,233,0.45);}
.notif-badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;border-radius:var(--r-full);background:var(--red2);color:white;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 3px;border:2px solid var(--bg);animation:pop .3s ease;}
.notif-panel{
  position:fixed;
  top:60px;
  right:16px;
  width:min(360px,calc(100vw - 32px));
  background:var(--card);
  border:1px solid var(--border2);
  border-radius:var(--r-xl);
  box-shadow:0 8px 32px #00000070;
  z-index:9500;
  overflow:hidden;
  max-height:calc(100dvh - 80px);
  display:flex;
  flex-direction:column;
}
.notif-panel-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.notif-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;display:flex;gap:12px;align-items:flex-start;}
.notif-item:hover{background:var(--card2);}
.notif-item.unread{background:#38bdf808;}
.notif-item:last-child{border-bottom:none;}
.notif-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px;}

/* ═══════ TOASTS ═══════ */
.toast-stack{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:8000;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:min(380px,calc(100vw - 32px));}
.toast{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r-lg);padding:12px 14px;display:flex;align-items:center;gap:10px;pointer-events:all;box-shadow:var(--shadow-md);animation:slideDown .25s ease;}
.toast-close{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px 4px;border-radius:4px;}
.toast-close:hover{color:var(--text);background:var(--border);}

/* ═══════ CARDS ═══════ */
.card-pro{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;transition:border-color .2s;}
.card-pro:hover{border-color:var(--border2);}
.stat-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid var(--border);}
.stat-number{font-size:28px;font-weight:900;color:var(--accent);}
.stat-label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;}

/* ═══════ TIMELINE ═══════ */
.timeline-item{background:var(--card);border-radius:10px;padding:10px;margin-bottom:8px;border-left:3px solid var(--accent);}
.section-header{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;border:1px solid var(--border);transition:all .2s;}
.section-header:hover{background:var(--border);}
.ot-subsection{margin-top:8px;margin-left:8px;border-left:2px solid var(--border);padding-left:12px;}

/* ═══════ MISC ═══════ */
.tab-btn{flex:1;padding:11px;border:none;background:transparent;font-weight:900;font-size:12px;cursor:pointer;border-bottom:3px solid transparent;}
.filtro-group{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.filtro-select{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:12px;font-weight:600;flex:1;min-width:100px;}
.filtro-select:focus{outline:none;border-color:var(--accent);}
.filtro-reset{background:#ef444420;border:1px solid #ef444460;color:#ef4444;padding:8px 12px;border-radius:8px;font-weight:800;font-size:11px;cursor:pointer;}
.recordatorio-card{background:linear-gradient(135deg,#f9731620,#f9731605);border:1px solid #f9731640;border-left:4px solid #f97316;border-radius:12px;padding:12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.recordatorio-tiempo{font-size:11px;color:#f97316;font-weight:800;font-family:monospace;}
.recordatorio-boton{background:#22c55e;border:none;color:white;padding:8px 14px;border-radius:8px;font-weight:800;font-size:11px;cursor:pointer;}
.ejecutivo-kpi{background:linear-gradient(135deg,var(--card),var(--border));border-radius:16px;padding:16px;text-align:center;border:1px solid var(--accent);}
.ejecutivo-numero{font-size:32px;font-weight:900;color:var(--accent);}
.ejecutivo-label{font-size:10px;color:var(--muted);font-weight:700;margin-top:4px;}
.ejecutivo-tendencia{font-size:10px;margin-top:6px;padding:2px 8px;border-radius:12px;display:inline-block;}
.limpieza-stats{background:linear-gradient(135deg,#0ea5e910,#0ea5e905);border-radius:12px;padding:12px;margin-bottom:12px;border-left:4px solid #0ea5e9;}
.fallo-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.fallo-nombre{font-size:12px;font-weight:700;color:var(--text);}
.fallo-count{background:#ef444420;color:#ef4444;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:800;}

/* ═══════ SIDEBAR (desktop) ═══════ */
.sb-logo-title{font-size:18px;font-weight:900;letter-spacing:1px;margin-bottom:3px;}
.sb-logo-title span{color:var(--accent);}
.sb-logo-sub{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.sb-version{font-size:9px;color:#22c55e;margin-top:3px;font-weight:700;}
.sb-section{margin-top:20px;}
.sb-section-title{font-size:9px;font-weight:800;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.sb-stat{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--card);border-radius:10px;border:1px solid var(--border);margin-bottom:6px;transition:border-color .15s;cursor:default;}
.sb-stat:hover{border-color:var(--accent);}
.sb-stat-icon{font-size:16px;flex-shrink:0;}
.sb-stat-label{font-size:9px;color:var(--muted);font-weight:700;}
.sb-stat-val{font-size:14px;font-weight:900;}
.sb-user{display:flex;align-items:center;gap:9px;padding:10px;background:var(--card);border-radius:11px;border:1px solid var(--border);margin-bottom:6px;}
.sb-user-icon{font-size:18px;width:34px;height:34px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-user-name{font-size:12px;font-weight:900;}
.sb-user-rol{font-size:9px;color:var(--muted);font-weight:700;}
.sb-online-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;margin-left:auto;flex-shrink:0;animation:blink 2s infinite;}
.sb-nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid transparent;background:transparent;color:var(--muted);border-radius:10px;cursor:pointer;font-size:12px;font-weight:700;transition:all .15s;text-align:left;margin-bottom:4px;}
.sb-nav-btn:hover{background:var(--card);color:var(--text);border-color:var(--border);}
.sb-nav-btn.active{background:var(--card);border-color:var(--accent);color:var(--accent);}
.sb-footer{font-size:8px;color:#ffffff15;font-weight:700;text-align:center;padding-top:16px;margin-top:auto;}

/* RIGHT PANEL (desktop) */
.rp-card{width:100%;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
.rp-title{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.rp-title::after{content:"";flex:1;height:1px;background:var(--border);}
.rp-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.rp-kpi{background:var(--bg);border-radius:11px;padding:12px;text-align:center;border:1px solid var(--border);}
.rp-kpi-num{font-size:22px;font-weight:900;color:var(--accent);}
.rp-kpi-lbl{font-size:8px;color:var(--muted);font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}

/* ═══════ ANIMATIONS ═══════ */
.fi{animation:fadeIn .3s ease;}
.centered{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:30px;text-align:center;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes splashIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes splashOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(1.04)}}
@keyframes wSlide{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes wPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.splash{
  position:fixed;inset:0;z-index:99999;
  background:linear-gradient(160deg,#030608 0%,#060e1a 60%,#040b14 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;transition:opacity .35s ease;
}
.splash.in{animation:splashIn .4s ease forwards;}
.splash.out{animation:splashOut .35s ease forwards;}
.splash-logo{
  width:80px;height:80px;border-radius:22px;
  background:linear-gradient(135deg,#0ea5e9,#6366f1);
  display:flex;align-items:center;justify-content:center;font-size:38px;
  box-shadow:0 0 40px #0ea5e960,0 0 80px #6366f130;
  animation:wPulse 2s ease infinite;margin-bottom:22px;
}
.splash-title{font-size:26px;font-weight:900;letter-spacing:1px;animation:wSlide .5s ease .15s both;}
.splash-title span{color:#38bdf8;}
.splash-sub{font-size:10px;font-weight:800;color:#4e6a85;letter-spacing:3px;margin-top:4px;animation:wSlide .5s ease .25s both;}
.splash-bar{
  width:120px;height:3px;background:#162035;border-radius:2px;
  margin-top:36px;overflow:hidden;animation:wSlide .5s ease .4s both;
}
.splash-bar-fill{height:100%;background:linear-gradient(90deg,#38bdf8,#a78bfa);border-radius:2px;animation:splashLoad 1.4s ease forwards;}
@keyframes splashLoad{from{width:0}to{width:100%}}
/* Welcome overlay after login */
.welcome{
  position:fixed;inset:0;z-index:9998;
  background:#05080f;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  pointer-events:none;
}
.welcome.hiding{animation:splashOut .4s ease forwards;}
.w-avatar{
  width:86px;height:86px;border-radius:22px;
  display:flex;align-items:center;justify-content:center;font-size:44px;
  margin-bottom:20px;border:2px solid transparent;
  animation:wSlide .4s ease .05s both, wPulse 2s ease .5s infinite;
}
.w-greet{font-size:14px;color:#4e6a85;font-weight:700;animation:wSlide .4s ease .1s both;}
.w-name{font-size:30px;font-weight:900;margin-top:4px;animation:wSlide .45s ease .18s both;}
.w-role{
  margin-top:8px;font-size:10px;font-weight:800;letter-spacing:2px;
  padding:3px 14px;border-radius:20px;animation:wSlide .4s ease .28s both;
}
.w-dots{display:flex;gap:7px;margin-top:30px;animation:wSlide .4s ease .38s both;}
.w-dot{width:6px;height:6px;border-radius:50%;background:#162035;}
.w-dot.a{background:#38bdf8;animation:blink 1.2s infinite;}
.w-dot.b{background:#38bdf880;animation:blink 1.2s .2s infinite;}
.w-dot.c{background:#38bdf840;animation:blink 1.2s .4s infinite;}
@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes otP{0%,100%{background:#1e1111;box-shadow:none}50%{background:#2d0a0a;box-shadow:0 0 20px #ef444460;}}
