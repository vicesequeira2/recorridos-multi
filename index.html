<style>
/* ═══════ TOKENS ═══════ */
:root{
  /* Colors */
  --bg:#080d14;--card:#0d1520;--accent:#0ea5e9;--border:#1a2940;
  --text:#e2ecf8;--muted:#5a7a9a;--green:#22c55e;--red:#ef4444;
  --orange:#f97316;--purple:#a855f7;--yellow:#fbbf24;
  /* Aliases */
  --card2:#111d2e;--border2:#243550;--text2:#b8cfe8;--text3:#5a7a9a;
  --accent2:#0ea5e9;--red2:#ef4444;
  --info:#0ea5e910;--info-border:#0ea5e930;
  /* Radii */
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:18px;--r-full:9999px;
  /* Typography */
  --font-xs:10px;--font-sm:12px;
  /* Shadows */
  --shadow-md:0 4px 20px #00000040;
}

/* ═══════ RESET ═══════ */
*{box-sizing:border-box;margin:0;padding:0;font-family:'Barlow',sans-serif;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
input,textarea,select{user-select:text;-webkit-user-select:text;}
html,body{height:100%;height:100dvh;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-size:13px;}

/* ═══════ LAYOUT ═══════ */
.desktop-wrapper{display:flex;height:100vh;height:100dvh;width:100%;overflow:hidden;background:var(--bg);}
/* Shell: fill 100% on small phones, cap at 420px on larger */
.shell{
  width:100%;max-width:420px;margin:0 auto;
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;flex-shrink:0;
}
.desktop-sidebar{display:none;flex-direction:column;width:260px;flex-shrink:0;padding:24px 18px;background:#060b11;border-right:1px solid var(--border);overflow-y:auto;}
.desktop-right{display:none;flex:1;flex-direction:column;align-items:center;padding:24px 20px;overflow-y:auto;gap:14px;background:#060b11;border-left:1px solid var(--border);min-width:260px;max-width:380px;}

/* TABLET ≥ 600px */
@media(min-width:600px){
  .shell{max-width:600px;border-left:1px solid var(--border);border-right:1px solid var(--border);box-shadow:0 0 40px #0ea5e910;}
  .mod-grid{grid-template-columns:repeat(3,1fr)!important;}
  .scrollable{padding:20px;padding-bottom:160px;}
}

/* DESKTOP ≥ 1024px */
@media(min-width:1024px){
  .shell{max-width:540px;border-left:1px solid var(--border);border-right:1px solid var(--border);box-shadow:0 0 60px #0ea5e915;}
  .desktop-sidebar{display:flex;}
  .desktop-right{display:flex;}
  .mod-item:hover{transform:translateY(-2px);box-shadow:0 6px 20px #0ea5e920;}
}

/* ── Very small phones (≤ 375px) ── */
@media(max-width:375px){
  body{font-size:12px;}
  .check-card{padding:9px 10px;}
  .chk-btns button{padding:9px 11px;font-size:10px;}
  .label-sec{font-size:9px;margin:12px 0 8px;}
  .pill{padding:7px 10px;font-size:10px;}
  .btn-save{padding:14px;font-size:14px;}
  .scrollable{padding:12px;padding-bottom:130px;}
  .mod-item{padding:14px 8px 10px;}
  .mod-icon{font-size:20px;}
  .mod-name{font-size:10px;}
}

/* ═══════ WATERMARK ═══════ */
.watermark{font-size:11px;font-weight:900;color:#0ea5e9;letter-spacing:3px;text-align:center;padding:5px 0;background:#0ea5e912;border-bottom:1px solid #0ea5e930;}

/* ═══════ HEADER ═══════ */
.hdr{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;}

/* ═══════ SCROLLABLE ═══════ */
.scrollable{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;padding-bottom:150px;}
/* Admin panel scrollable — no footer button so less pb needed */
.admin-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;padding-bottom:24px;}

/* ═══════ LABELS ═══════ */
.label-sec{font-size:var(--font-xs);font-weight:800;color:var(--text3);margin:18px 0 10px;letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.label-sec::after{content:"";flex:1;height:1px;background:var(--border);}

/* ═══════ MODULE GRID ═══════ */
.mod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(min-width:480px){.mod-grid{grid-template-columns:repeat(3,1fr);}}
.mod-item{padding:18px 10px 14px;border-radius:var(--r-lg);border:1px solid var(--border);text-align:center;cursor:pointer;background:var(--card);position:relative;transition:all .2s;}
.mod-item:hover{border-color:var(--border2);background:var(--card2);transform:translateY(-1px);}
.mod-item:active{transform:scale(.97);}
.mod-icon{font-size:24px;margin-bottom:5px;display:block;}
.mod-name{font-size:11px;font-weight:700;}

/* ═══════ OT CARDS ═══════ */
.ot-card{background:#1e1111;border:1px solid #451010;padding:14px;border-radius:12px;margin-bottom:10px;border-left:4px solid #ef4444;position:relative;}
.ot-urgente{animation:otP 1.2s ease-in-out infinite;}
@keyframes otP{0%,100%{background:#1e1111;box-shadow:none}50%{background:#2d0a0a;box-shadow:0 0 20px #ef444460;}}
.ot-id-badge{position:absolute;top:8px;right:8px;font-size:9px;font-weight:900;color:#ef4444;background:#ef444420;padding:2px 6px;border-radius:4px;}
.btn-ot-close{background:var(--green);color:white;border:none;padding:10px;border-radius:8px;font-weight:800;font-size:11px;cursor:pointer;width:100%;margin-top:8px;}

/* ═══════ CHECK CARDS ═══════ */
.check-card{background:var(--card);border:1px solid var(--border);padding:11px 12px;border-radius:10px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.chk-btns{display:flex;gap:5px;flex-shrink:0;}
.check-card b{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;}
.chk-btns button{padding:10px 13px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-weight:800;font-size:11px;cursor:pointer;}
.asi{background:#22c55e15!important;border-color:var(--green)!important;color:var(--green)!important;}
.ano{background:#ef444415!important;border-color:var(--red)!important;color:var(--red)!important;}

/* ═══════ PILLS ═══════ */
.pill-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;max-width:100%;}
.pill{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:9px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;}
.pill.active{background:var(--accent);color:white;border-color:var(--accent);}

/* ═══════ INPUTS ═══════ */
.inp{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;color:white;font-size:15px;margin-bottom:14px;outline:none;resize:none;}

/* ═══════ BUTTONS ═══════ */
.footer-fixed{position:absolute;bottom:0;left:0;right:0;padding:12px 14px;background:linear-gradient(transparent,var(--bg) 35%);z-index:10;}
.btn-save{width:100%;padding:15px;background:var(--green);color:white;border:none;border-radius:14px;font-weight:900;font-size:15px;cursor:pointer;}
.btn-save:disabled{opacity:.2;filter:grayscale(1);cursor:not-allowed;}
.btn-xl{width:100%;padding:14px;background:var(--accent);color:white;border-radius:12px;border:none;font-weight:800;margin-top:10px;cursor:pointer;}
.btn-lote-group{display:flex;gap:10px;margin-bottom:16px;}
.btn-lote{background:linear-gradient(135deg,#22c55e,#16a34a);color:white;border:none;padding:10px 16px;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;flex:1;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-lote-limpiar{background:linear-gradient(135deg,#64748b,#475569);}
.btn-lote:active{transform:scale(0.98);}
.btn-primary{background:var(--accent2);color:white;border:none;border-radius:var(--r-md);font-weight:800;cursor:pointer;transition:opacity .15s,transform .1s;}
.btn-primary:hover{opacity:.9;}
.btn-primary:active{transform:scale(.98);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:var(--r-md);font-weight:700;cursor:pointer;transition:all .15s;}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);background:var(--card2);}

/* ═══════ PROGRESS ═══════ */
.prog-wrap{position:sticky;top:0;background:var(--bg);z-index:5;padding:6px 0 10px;}
.prog-bar{height:6px;background:var(--border);border-radius:10px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);transition:width .3s;}

/* ═══════ TIMER ═══════ */
.t-val{font-size:50px;font-weight:900;text-align:center;margin:10px 0;}
.t-btn{width:100%;padding:15px;border-radius:10px;border:none;font-weight:900;cursor:pointer;margin-top:8px;}
.tstart{background:var(--accent);color:white;}.tstop{background:var(--red);color:white;}

/* ═══════ BADGES & STATES ═══════ */
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.dok{background:var(--green);animation:blink 2s infinite;}
.dbsy{background:#f59e0b;}
.derr{background:var(--red);}
.badge-ok{background:#22c55e20;color:#22c55e;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;}
.badge-no{background:#ef444420;color:#ef4444;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;}
.badge-warning{background:#f9731620;color:#f97316;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;}
.security-badge{background:#22c55e20;border:1px solid #22c55e40;border-radius:20px;padding:2px 8px;font-size:9px;color:#22c55e;font-weight:700;margin-left:6px;}
.stat-pill{background:var(--card2);border:1px solid var(--border);border-radius:var(--r-full);padding:5px 12px;font-size:var(--font-sm);font-weight:700;display:inline-flex;align-items:center;gap:5px;}

/* ═══════ NOTIFICATION CENTER ═══════ */
.notif-btn{position:relative;background:rgba(14,165,233,0.12);border:1px solid rgba(14,165,233,0.25);border-radius:var(--r-md);padding:7px 10px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;}
.notif-btn:hover{background:rgba(14,165,233,0.22);border-color:rgba(14,165,233,0.45);}
.notif-badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;border-radius:var(--r-full);background:var(--red2);color:white;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 3px;border:2px solid var(--bg);animation:pop .3s ease;}
.notif-panel{position:absolute;top:52px;right:0;width:min(360px,calc(100vw - 32px));background:var(--card);border:1px solid var(--border2);border-radius:var(--r-xl);box-shadow:var(--shadow-md);z-index:9000;overflow:hidden;}
.notif-panel-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;display:flex;gap:12px;align-items:flex-start;}
.notif-item:hover{background:var(--card2);}
.notif-item.unread{background:#38bdf808;}
.notif-item:last-child{border-bottom:none;}
.notif-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px;}

/* ═══════ TOASTS ═══════ */
.toast-stack{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:8000;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:min(380px,calc(100vw - 32px));}
.toast{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r-lg);padding:12px 14px;display:flex;align-items:center;gap:10px;pointer-events:all;box-shadow:var(--shadow-md);animation:slideDown .25s ease;}
.toast-close{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px 4px;border-radius:4px;}
.toast-close:hover{color:var(--text);background:var(--border);}

/* ═══════ CARDS ═══════ */
.card-pro{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;transition:border-color .2s;}
.card-pro:hover{border-color:var(--border2);}
.stat-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid var(--border);}
.stat-number{font-size:28px;font-weight:900;color:var(--accent);}
.stat-label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;}

/* ═══════ TIMELINE ═══════ */
.timeline-item{background:var(--card);border-radius:10px;padding:10px;margin-bottom:8px;border-left:3px solid var(--accent);}
.section-header{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;border:1px solid var(--border);transition:all .2s;}
.section-header:hover{background:var(--border);}
.ot-subsection{margin-top:8px;margin-left:8px;border-left:2px solid var(--border);padding-left:12px;}

/* ═══════ MISC ═══════ */
.tab-btn{flex:1;padding:11px;border:none;background:transparent;font-weight:900;font-size:12px;cursor:pointer;border-bottom:3px solid transparent;}
.filtro-group{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.filtro-select{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:12px;font-weight:600;flex:1;min-width:100px;}
.filtro-select:focus{outline:none;border-color:var(--accent);}
.filtro-reset{background:#ef444420;border:1px solid #ef444460;color:#ef4444;padding:8px 12px;border-radius:8px;font-weight:800;font-size:11px;cursor:pointer;}
.recordatorio-card{background:linear-gradient(135deg,#f9731620,#f9731605);border:1px solid #f9731640;border-left:4px solid #f97316;border-radius:12px;padding:12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.recordatorio-tiempo{font-size:11px;color:#f97316;font-weight:800;font-family:monospace;}
.recordatorio-boton{background:#22c55e;border:none;color:white;padding:8px 14px;border-radius:8px;font-weight:800;font-size:11px;cursor:pointer;}
.ejecutivo-kpi{background:linear-gradient(135deg,var(--card),var(--border));border-radius:16px;padding:16px;text-align:center;border:1px solid var(--accent);}
.ejecutivo-numero{font-size:32px;font-weight:900;color:var(--accent);}
.ejecutivo-label{font-size:10px;color:var(--muted);font-weight:700;margin-top:4px;}
.ejecutivo-tendencia{font-size:10px;margin-top:6px;padding:2px 8px;border-radius:12px;display:inline-block;}
.limpieza-stats{background:linear-gradient(135deg,#0ea5e910,#0ea5e905);border-radius:12px;padding:12px;margin-bottom:12px;border-left:4px solid #0ea5e9;}
.fallo-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.fallo-nombre{font-size:12px;font-weight:700;color:var(--text);}
.fallo-count{background:#ef444420;color:#ef4444;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:800;}

/* ═══════ SIDEBAR (desktop) ═══════ */
.sb-logo-title{font-size:18px;font-weight:900;letter-spacing:1px;margin-bottom:3px;}
.sb-logo-title span{color:var(--accent);}
.sb-logo-sub{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.sb-version{font-size:9px;color:#22c55e;margin-top:3px;font-weight:700;}
.sb-section{margin-top:20px;}
.sb-section-title{font-size:9px;font-weight:800;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.sb-stat{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--card);border-radius:10px;border:1px solid var(--border);margin-bottom:6px;transition:border-color .15s;cursor:default;}
.sb-stat:hover{border-color:var(--accent);}
.sb-stat-icon{font-size:16px;flex-shrink:0;}
.sb-stat-label{font-size:9px;color:var(--muted);font-weight:700;}
.sb-stat-val{font-size:14px;font-weight:900;}
.sb-user{display:flex;align-items:center;gap:9px;padding:10px;background:var(--card);border-radius:11px;border:1px solid var(--border);margin-bottom:6px;}
.sb-user-icon{font-size:18px;width:34px;height:34px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-user-name{font-size:12px;font-weight:900;}
.sb-user-rol{font-size:9px;color:var(--muted);font-weight:700;}
.sb-online-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;margin-left:auto;flex-shrink:0;animation:blink 2s infinite;}
.sb-nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid transparent;background:transparent;color:var(--muted);border-radius:10px;cursor:pointer;font-size:12px;font-weight:700;transition:all .15s;text-align:left;margin-bottom:4px;}
.sb-nav-btn:hover{background:var(--card);color:var(--text);border-color:var(--border);}
.sb-nav-btn.active{background:var(--card);border-color:var(--accent);color:var(--accent);}
.sb-footer{font-size:8px;color:#ffffff15;font-weight:700;text-align:center;padding-top:16px;margin-top:auto;}

/* RIGHT PANEL (desktop) */
.rp-card{width:100%;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
.rp-title{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.rp-title::after{content:"";flex:1;height:1px;background:var(--border);}
.rp-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.rp-kpi{background:var(--bg);border-radius:11px;padding:12px;text-align:center;border:1px solid var(--border);}
.rp-kpi-num{font-size:22px;font-weight:900;color:var(--accent);}
.rp-kpi-lbl{font-size:8px;color:var(--muted);font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}

/* ═══════ ANIMATIONS ═══════ */
.fi{animation:fadeIn .3s ease;}
.centered{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:30px;text-align:center;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes otP{0%,100%{background:#1e1111;box-shadow:none}50%{background:#2d0a0a;box-shadow:0 0 20px #ef444460;}}

<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;

// ── Hook de breakpoints responsive ──
function useBreakpoint(){
  const get=()=>{
    const w=window.innerWidth;
    if(w>=1024) return "desktop";
    if(w>=600)  return "tablet";
    return "mobile";
  };
  const[bp,setBp]=useState(get);
  useEffect(()=>{
    const h=()=>setBp(get());
    window.addEventListener("resize",h);
    return()=>window.removeEventListener("resize",h);
  },[]);
  return bp;
}

const SALT_SECRETO = "R3c0rr1d0Mult1-S4lt-S3gur0-2024";

const hashPassword = async (password) => {
  try {
    const passwordConSalt = password + SALT_SECRETO;
    const encoder = new TextEncoder();
    const data = encoder.encode(passwordConSalt);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  } catch (error) {
    console.error("Error generando hash:", error);
    let hash = 0;
    for (let i = 0; i < password.length; i++) {
      hash = ((hash << 5) - hash) + password.charCodeAt(i);
      hash |= 0;
    }
    return (hash + SALT_SECRETO.length).toString(16);
  }
};

function LoginScreen({passwords,onLogin}){
  const[sel,setSel]=useState(null);
  const[pw,setPw]=useState("");
  const[err,setErr]=useState("");
  const[show,setShow]=useState(false);
  const[verificando,setVerificando]=useState(false);
  const[bloqInfo,setBloqInfo]=useState({});
  const[,setTick]=useState(0);
  useEffect(()=>{const id=setInterval(()=>setTick(t=>t+1),1000);return()=>clearInterval(id);},[]);
  const segsRestantes=(nombre)=>{const i=bloqInfo[nombre];if(!i||!i.until)return 0;return Math.max(0,Math.ceil((i.until-Date.now())/1000));};

  const hashPasswordLogin = async (password) => {
    const passwordConSalt = password + SALT_SECRETO;
    const encoder = new TextEncoder();
    const data = encoder.encode(passwordConSalt);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  };

  const go = async () => {
    if(!sel) return;
    const segs=segsRestantes(sel.nombre);
    if(segs>0){setErr("🔒 Bloqueado "+segs+"s. Intenta luego.");return;}
    setVerificando(true);
    try {
      const hashIngresado = await hashPasswordLogin(pw);
      const hashGuardado = passwords[sel.nombre];
      if(hashIngresado === hashGuardado) {
        setBloqInfo(p=>({...p,[sel.nombre]:{count:0,until:null}}));
        onLogin(sel);
      } else {
        setBloqInfo(prev=>{
          const cur=prev[sel.nombre]||{count:0,until:null};
          const nc=cur.count+1;
          const bloq=nc>=5?Date.now()+2*60*1000:null;
          const msg=bloq?"🔒 5 intentos fallidos. Bloqueado 2 min":`Contraseña incorrecta · ${5-nc} intento${5-nc!==1?'s':''} restante${5-nc!==1?'s':''}`;
          setErr(msg);setTimeout(()=>setErr(""),3500);
          setPw("");
          return {...prev,[sel.nombre]:{count:nc,until:bloq}};
        });
      }
    } catch (error) {
      setErr("Error al verificar");
      setTimeout(()=>setErr(""),2500);
    } finally {
      setVerificando(false);
    }
  };

  return(
    <div className="shell" style={{overflowY:'auto'}}>
      <div className="watermark">— VICENTE.S —</div>
      <div className="fi" style={{padding:'24px 20px 40px'}}>
        <div style={{textAlign:'center',marginBottom:22}}>
          <div style={{fontSize:36,marginBottom:6}}>🔐</div>
          <div style={{fontSize:22,fontWeight:900}}>RECORRIDO <span style={{color:'var(--accent)'}}>MULTI</span></div>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:3,fontWeight:700}}>Selecciona tu usuario</div>
          <div style={{fontSize:9,color:'#ffffff15',marginTop:2}}>v8.2 · SHA-256 Security</div>
          <div style={{fontSize:8,color:'#22c55e',marginTop:4}}>🔒 Contraseñas encriptadas</div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
          {USUARIOS_ORIGINALES.map(u=>{
            const s=sel?.nombre===u.nombre;const c=CU[u.nombre]||'var(--accent)';
            return(
              <div key={u.nombre} onClick={()=>{setSel(u);setPw("");setErr("");}} style={{padding:'18px 10px',borderRadius:16,textAlign:'center',cursor:'pointer',transition:'all .2s',border:s?`2px solid ${c}`:'1px solid var(--border)',background:s?`${c}15`:'var(--card)',boxShadow:s?`0 0 14px ${c}40`:'none'}}>
                <div style={{fontSize:28,marginBottom:7,width:50,height:50,borderRadius:'50%',border:`2px solid ${s?c:'var(--border)'}`,background:s?`${c}20`:'#ffffff08',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 8px'}}>{IU[u.nombre]||'👤'}</div>
                <div style={{fontSize:13,fontWeight:900,color:s?c:'var(--text)'}}>{u.nombre}</div>
              </div>
            );
          })}
        </div>
        {sel&&(
          <div className="fi">
            <div style={{background:'#0ea5e910',border:'1px solid #0ea5e930',borderRadius:10,padding:'10px 14px',marginBottom:12,display:'flex',alignItems:'center',gap:10}}>
              <div style={{fontSize:13,fontWeight:900,color:'var(--accent)'}}>{sel.nombre}</div>
              <button onClick={()=>setSel(null)} style={{marginLeft:'auto',background:'#ef444425',border:'1px solid #ef444460',color:'#ef4444',fontSize:13,fontWeight:900,cursor:'pointer',borderRadius:8,padding:'4px 10px'}}>✕</button>
            </div>
            <div className="label-sec">CONTRASEÑA</div>
            <form onSubmit={e=>{e.preventDefault();go();}} autoComplete="on">
              <input type="text" name="username" value={sel.nombre} readOnly style={{display:'none'}} autoComplete="username"/>
              <div style={{position:'relative',marginBottom:12}}>
                <input className="inp" style={{marginBottom:0,paddingRight:46}} type={show?"text":"password"} name="password" placeholder="Contraseña..." value={pw} autoFocus autoComplete="current-password" onChange={e=>{setPw(e.target.value);setErr("");}} onKeyDown={e=>e.key==='Enter'&&go()}/>
                <button type="button" onClick={()=>setShow(!show)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--muted)',fontSize:18,cursor:'pointer'}}>{show?'🙈':'👁'}</button>

      </div>

}

/* ── Renderizador agrupado por zona ──
   grupos = { "NombreZona": ["item1","item2",...] }  (orden manual)
   Si grupos es null → render plano sin separadores (fallback)
   renderItem(item, idx) → JSX del botón
*/
function SelGrupo({label,grupos,items,renderItem,header}){
  // Si no hay grupos, render plano
  if(!grupos){
    const sorted=[...items].sort((a,b)=>a.localeCompare(b,"es"));
    return(
      <div>
        <div className="label-sec">{label}{header}</div>
        <div className="pill-grid">{sorted.map((i,idx)=>renderItem(i,idx))}</div>
      </div>
    );
  }
  // Render agrupado
  return(
    <div>
      <div className="label-sec">{label}{header}</div>
      {Object.entries(grupos).map(([zona,equipos])=>(
        <div key={zona} style={{marginBottom:10}}>
          {/* Separador de zona */}
          <div style={{
            display:"flex",alignItems:"center",gap:6,marginBottom:6,

          </div>
          <div className="pill-grid">{equipos.map((i,idx)=>renderItem(i,idx))}</div>

  );
}

        </span>

  const renderItemCnt=(i)=>{

  return(
    <>
      <SelGrupo label={label} grupos={grupos} items={items} renderItem={renderItemCnt} header={header}/>
      {/* Leyenda */}
      {total>0&&(
        <div style={{display:'flex',gap:8,marginTop:4,flexWrap:'wrap'}}>
          {totalMios>0&&<span style={{fontSize:8,color:'#22c55e',display:'flex',alignItems:'center',gap:3}}>

          </span>}
          {total>totalMios&&<span style={{fontSize:8,color:'#0ea5e9',display:'flex',alignItems:'center',gap:3}}>
            <span style={{width:8,height:8,borderRadius:'50%',background:'#0ea5e9',display:'inline-block'}}/>Por equipo
          </span>}

          </span>}

}

function AlmuerzoScreen({vales,soloLec,onVolver,fb,hoy,onRegreso,vpData}){
  const[clock,setClock]=useState("");
  const[saving,setSaving]=useState(null);
  const[tab,setTab]=useState("almuerzo");
  useEffect(()=>{const t=()=>setClock(new Date().toLocaleTimeString("es",{hour:'2-digit',minute:'2-digit',second:'2-digit'}));t();const id=setInterval(t,1000);return()=>clearInterval(id);},[]);
  const vpList=vpData||VP;
  const personas=tab==="cafe"?vpList.filter(p=>p.cafe):vpList;
  const getV=(n,t)=>vales.find(v=>v.persona===n&&v.fecha===hoy&&v.tipo===t&&!v.regreso);
  const TC=tab==="almuerzo"?"#f97316":"#06b6d4";
  const regSal=async n=>{if(!fb)return;setSaving(n+tab);const h=new Date().toLocaleTimeString("es",{hour:'2-digit',minute:'2-digit',second:'2-digit'});await fb.push(fb.ref(fb.db,"vales"),{persona:n,fecha:hoy,tipo:tab,salida:h,regreso:null,_ts:Date.now()});setSaving(null);};
  const regReg=async(v,min)=>{if(!fb)return;setSaving(v.persona+tab);const h=new Date().toLocaleTimeString("es",{hour:'2-digit',minute:'2-digit',second:'2-digit'});const[sh,sm,ss]=v.salida.split(":").map(Number);const[rh,rm,rs]=h.split(":").map(Number);const ok=((rh*60+rm)*60+(rs||0)-(sh*60+sm)*60-(ss||0))<=min*60;const{_fbKey,...rest}=v;await fb.set(fb.ref(fb.db,`vales/${_fbKey}`),{...rest,regreso:h,aTiempo:ok});setSaving(null);};
  const hist=vales.filter(v=>v.fecha===hoy&&v.regreso&&v.tipo===tab);
  const aT=hist.filter(v=>v.aTiempo).length;const tard=hist.filter(v=>!v.aTiempo).length;
  return(
    <div className="fi" style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{background:'var(--card)',borderBottom:'3px solid #e879f9',flexShrink:0}}>
        <div style={{background:'#ef444418',borderBottom:'1px solid #ef444430',padding:'10px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <button onClick={onVolver} style={{background:'#ef4444',border:'none',color:'white',fontSize:13,fontWeight:900,padding:'10px 16px',borderRadius:12,cursor:'pointer'}}>← SALIR</button>
          <div style={{fontWeight:900,fontSize:13}}>🍽 ALMUERZOS VALET</div>
          <div style={{fontSize:12,fontWeight:900,color:'#e879f9'}}>{clock}</div>
        </div>
        <div style={{display:'flex'}}>
          <button className="tab-btn" onClick={()=>setTab("almuerzo")} style={{color:tab==="almuerzo"?'#f97316':'var(--muted)',borderBottomColor:tab==="almuerzo"?'#f97316':'transparent'}}>🍽 ALMUERZO</button>
          <button className="tab-btn" onClick={()=>setTab("cafe")} style={{color:tab==="cafe"?'#06b6d4':'var(--muted)',borderBottomColor:tab==="cafe"?'#06b6d4':'transparent'}}>☕ CAFÉ</button>
        </div>
      </div>
      <div className="scrollable">
        <div className="label-sec">📊 RESUMEN · {hoy}</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
          <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:'12px 8px',textAlign:'center'}}><div style={{fontSize:22,fontWeight:900,color:TC}}>{hist.length}</div><div style={{fontSize:9,color:'var(--muted)',fontWeight:700,marginTop:2}}>REGISTROS</div></div>
          <div style={{background:'#22c55e12',border:'1px solid #22c55e40',borderRadius:12,padding:'12px 8px',textAlign:'center'}}><div style={{fontSize:22,fontWeight:900,color:'#22c55e'}}>{aT}</div><div style={{fontSize:9,color:'var(--muted)',fontWeight:700,marginTop:2}}>A TIEMPO</div></div>
          <div style={{background:'#ef444412',border:'1px solid #ef444440',borderRadius:12,padding:'12px 8px',textAlign:'center'}}><div style={{fontSize:22,fontWeight:900,color:'#ef4444'}}>{tard}</div><div style={{fontSize:9,color:'var(--muted)',fontWeight:700,marginTop:2}}>TARDE</div></div>
        </div>
        <div className="label-sec">PERSONAL</div>
        {personas.map(p=>{
          const min=tab==="almuerzo"?p.minA:p.minC;
          const v=getV(p.nombre,tab);const fuera=!!v;const sv=saving===p.nombre+tab;
          const comp=vales.some(x=>x.persona===p.nombre&&x.fecha===hoy&&x.tipo===tab&&x.regreso);
          if(comp&&!fuera)return null;
          return(
            <div key={p.nombre} style={{borderRadius:14,marginBottom:9,overflow:'hidden',border:fuera?`2px solid ${TC}`:'1px solid var(--border)',background:fuera?`${TC}12`:'var(--card)'}}>
              <div style={{padding:'16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{fontWeight:900,fontSize:15,color:fuera?TC:'var(--text)'}}>{p.nombre}</div>
                <div>
                  {!soloLec?(
                    !v?
                      <button onClick={()=>regSal(p.nombre)} disabled={sv} style={{background:TC,color:'white',border:'none',padding:'11px 16px',borderRadius:12,fontWeight:900,fontSize:12,cursor:'pointer'}}>{sv?'...':tab==="almuerzo"?'SALIDA 🍽':'SALIDA ☕'}</button>:
                      <button onClick={()=>regReg(v,min)} disabled={sv} style={{background:'#22c55e',color:'white',border:'none',padding:'11px 16px',borderRadius:12,fontWeight:900,fontSize:12,cursor:'pointer'}}>{sv?'...':tab==="almuerzo"?'VUELVE 🍽':'VUELVE ☕'}</button>
                  ):(
                    <span style={{fontSize:11,fontWeight:800,padding:'6px 12px',borderRadius:20,color:fuera?TC:'#22c55e',background:fuera?`${TC}20`:'#22c55e15'}}>{fuera?'⏳ FUERA':'✅ EN PUESTO'}</span>
                  )}
                </div>
              </div>
              {fuera&&!soloLec&&<div style={{background:`${TC}18`,padding:'6px 16px',borderTop:`1px solid ${TC}30`}}><div style={{fontSize:10,color:TC,fontWeight:700}}>Salió a las {v.salida}</div></div>}
            </div>
          );
        })}
        {hist.length>0&&(
          <div>
            <div className="label-sec">📋 HISTORIAL · {tab==="almuerzo"?"ALMUERZO":"CAFÉ"}</div>
            {hist.map((v,i)=>(
              <div key={i} style={{background:v.aTiempo?'#22c55e12':'#ef444412',border:`1px solid ${v.aTiempo?'#22c55e40':'#ef444440'}`,borderRadius:10,padding:'10px 14px',marginBottom:7,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div><div style={{fontWeight:900,fontSize:12}}>{v.persona}</div><div style={{fontSize:10,color:'var(--muted)'}}>🚶 {v.salida} → ✅ {v.regreso}</div></div>
                <div style={{fontSize:22}}>{v.aTiempo?'✅':'🔴'}</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

    const unsub=fb.onValue(fb.ref(fb.db,"cam_config"),snap=>{
      const d=snap.val();
      if(d) setCamConfig(d);
    });
    return()=>unsub();
  },[fb]);

  // ── Cargar anuncio actual
  useEffect(()=>{
    if(!fb)return;
    const unsub=fb.onValue(fb.ref(fb.db,"anuncio"),snap=>{
      const d=snap.val();
      if(d) setAnuncioEdit({texto:d.texto||"",urgente:!!d.urgente,activo:!!d.activo});
      else setAnuncioEdit({texto:"",urgente:false,activo:false});
    });
    return()=>unsub();
  },[fb]);

  // ── Cargar notas admin
  useEffect(()=>{
    if(!fb)return;
    const unsub=fb.onValue(fb.ref(fb.db,"admin_notas"),snap=>{
      const d=snap.val();
      if(d) setNotas(Object.entries(d).map(([k,v])=>({...v,_fbKey:k})).sort((a,b)=>(b.ts||0)-(a.ts||0)));
      else setNotas([]);
    });
    return()=>unsub();
  },[fb]);

  // ── Cargar config de alertas
  useEffect(()=>{
    if(!fb)return;
    const unsub=fb.onValue(fb.ref(fb.db,"admin_alertas_config"),snap=>{
      const d=snap.val();
      if(d) setAlertaConfig(d);
    });
    return()=>unsub();
  },[fb]);

  // ── Suscribir cam_revisiones y cam_estado en AdminPanel
  useEffect(()=>{
    if(!fb)return;
    const u1=fb.onValue(fb.ref(fb.db,"cam_revisiones"),snap=>{
      const d=snap.val();
      if(d) setAdminCamRevs(Object.entries(d).map(([k,v])=>({...v,_fbKey:k})).sort((a,b)=>(b.ts||0)-(a.ts||0)));
      else setAdminCamRevs([]);
    });
    const u2=fb.onValue(fb.ref(fb.db,"cam_estado"),snap=>{
      const d=snap.val();
      setAdminCamEstado(d||null);
    });
    return()=>{u1();u2();};
  },[fb]);

  // ── Cargar bitácora de acciones admin
  useEffect(()=>{
    if(!fb)return;
    const unsub=fb.onValue(fb.ref(fb.db,"admin_bitacora"),snap=>{
      const d=snap.val();
      if(d) setBitacora(Object.entries(d).map(([k,v])=>({...v,_fbKey:k})).sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,80));
      else setBitacora([]);
    });
    return()=>unsub();
  },[fb]);

  const showMsg=(t,m)=>{setMsg({t,m});setTimeout(()=>setMsg(null),3200);};

  const logBitacora=async(accion,detalle)=>{
    if(!fb)return;
    const ahora=new Date();
    await fb.push(fb.ref(fb.db,"admin_bitacora"),{accion,detalle,fecha:ahora.toLocaleDateString("es"),hora:ahora.toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"}),ts:Date.now()});
  };

  // ── Permisos individuales por usuario
  const getPermisosU=(nombre)=>{
    const base=(permisosDB||{})[nombre]||{};
    // Si no hay entrada para un módulo, calcular desde la lógica original
    const resultado={};
    MODS.forEach(m=>{
      if(typeof base[m.id]!=="undefined"){resultado[m.id]=base[m.id];}
      else{
        // fallback lógica original
        if(m.id==="almuerzo") resultado[m.id]=ALM_VIS.includes(nombre);
        else if(nombre==="Monitoreo") resultado[m.id]=m.id==="ot"||m.id==="almuerzo";
        else if(["cajero","entrada","salida"].includes(m.id)) resultado[m.id]=["Vicente","Geovanny","Christopher"].includes(nombre);
        else resultado[m.id]=true;
      }
    });
    return resultado;
  };

  const abrirEdicionPermisos=(nombre)=>{

    window._permisos={...(window._permisos||{}),[permEditU]:permLocal};

    setPermEditU(null);
  };

    await fb.remove(fb.ref(fb.db,`permisos/${nombre}`));

    showMsg("ok",`🔄 Permisos de ${nombre} reseteados`);
    setConfirm(null);
    if(permEditU===nombre)setPermEditU(null);
  };

  // ── Guardar lista (cajeros/entradas/salidas/limpieza/vp)
  const guardarLista=async(clave,lista)=>{
    setCfgSaving(true);
    await fb.set(fb.ref(fb.db,`config_listas/${clave}`),lista);
    logBitacora("CONFIG LISTAS",`${clave} actualizado (${lista.length} items)`);
    showMsg("ok",`✅ Lista guardada · ${lista.length} items`);
    setCfgSaving(false);
  };

  const guardarAnuncio=async(datos)=>{
    await fb.set(fb.ref(fb.db,"anuncio"),datos);
    logBitacora("ANUNCIO",datos.activo?`Publicado: "${datos.texto}"`:"Desactivado");
    showMsg("ok",datos.activo?"📢 Anuncio publicado":"🔕 Anuncio desactivado");
  };

  const guardarAlertaConfig=async(cfg)=>{
    if(!fb)return;
    await fb.set(fb.ref(fb.db,"admin_alertas_config"),cfg);
    setAlertaConfig(cfg);
    showMsg("ok","🔔 Configuración de alertas guardada");

// CAMBIAR CONTRASEÑA

function CambiarPw({usuario,passwords,onVolver}){
  const[pwA,setPwA]=useState("");const[pwN,setPwN]=useState("");const[pwC,setPwC]=useState("");
  const[show,setShow]=useState(false);const[msg,setMsg]=useState(null);const[saving,setSaving]=useState(false);
  const pw0=passwords[usuario.nombre]||usuario.password;
  const go=async()=>{
    if(!pwA){setMsg({t:'err',m:'Ingresa tu contraseña actual'});return;}
    if(pwA!==pw0){setMsg({t:'err',m:'Contraseña actual incorrecta'});return;}
    if(!pwN){setMsg({t:'err',m:'Ingresa una nueva contraseña'});return;}
    if(pwN!==pwC){setMsg({t:'err',m:'Las contraseñas no coinciden'});return;}
    if(pwN===pw0){setMsg({t:'err',m:'La nueva debe ser diferente'});return;}
    setSaving(true);
    try{await window._fb.set(window._fb.ref(window._fb.db,`passwords/${usuario.nombre}`),pwN);setMsg({t:'ok',m:'✅ Contraseña actualizada'});setPwA("");setPwN("");setPwC("");setTimeout(()=>onVolver(),2000);}
    catch(e){setMsg({t:'err',m:'Error al guardar'});}
    setSaving(false);
  };
  return(
    <div className="fi" style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{background:'var(--card)',borderBottom:'3px solid var(--accent)',flexShrink:0}}>
        <div style={{background:'#ef444418',borderBottom:'1px solid #ef444430',padding:'10px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <button onClick={onVolver} style={{background:'#ef4444',border:'none',color:'white',fontSize:13,fontWeight:900,padding:'10px 16px',borderRadius:12,cursor:'pointer'}}>← VOLVER</button>
          <div style={{fontWeight:900,fontSize:13}}>🔑 CAMBIAR CONTRASEÑA</div>
          <div style={{width:80}}></div>
        </div>
      </div>
      <div className="scrollable">
        <div style={{marginTop:10,background:'#0ea5e910',border:'1px solid #0ea5e930',borderRadius:12,padding:'14px 16px',marginBottom:20,display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:24}}>{IU[usuario.nombre]||'👤'}</span>
          <div><div style={{fontWeight:900,fontSize:14,color:'var(--accent)'}}>{usuario.nombre}</div><div style={{fontSize:10,color:'var(--muted)',fontWeight:700}}>{usuario.rol}</div></div>
        </div>
        {[{v:pwA,s:setPwA,l:'CONTRASEÑA ACTUAL',p:'Tu contraseña actual...'},{v:pwN,s:setPwN,l:'NUEVA CONTRASEÑA',p:'Nueva contraseña...'},{v:pwC,s:setPwC,l:'CONFIRMAR NUEVA',p:'Repite la nueva contraseña...'}].map(({v,s,l,p})=>(
          <div key={l}>
            <div className="label-sec">{l}</div>
            <input style={{width:'100%',background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:'14px',color:'white',fontSize:15,outline:'none',marginBottom:14}} type={show?"text":"password"} placeholder={p} value={v} onChange={e=>{s(e.target.value);setMsg(null);}}/>
          </div>
        ))}
        <button type="button" onClick={()=>setShow(!show)} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,color:'var(--muted)',fontSize:13,cursor:'pointer',padding:'8px 14px',marginBottom:14,width:'100%'}}>{show?'🙈 Ocultar':'👁 Mostrar contraseñas'}</button>
        {msg&&<div style={{background:msg.t==='ok'?'#22c55e20':'#ef444420',border:`1px solid ${msg.t==='ok'?'#22c55e50':'#ef444450'}`,borderRadius:10,padding:'10px 14px',marginBottom:14,fontSize:13,fontWeight:700,color:msg.t==='ok'?'#22c55e':'#ef4444',textAlign:'center'}}>{msg.m}</div>}
        <button onClick={go} disabled={saving} style={{width:'100%',padding:'17px',background:saving?'var(--border)':'var(--accent)',color:'white',border:'none',borderRadius:16,fontWeight:900,fontSize:15,cursor:saving?'not-allowed':'pointer'}}>{saving?'⏳ GUARDANDO...':'🔑 ACTUALIZAR CONTRASEÑA'}</button>
      </div>
    </div>
  );
}
